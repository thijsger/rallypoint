<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inloggen — RallyPoint</title>
<link rel="icon" href="/img/logo.png">
<script src="/js/theme-init.js"></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c0f12">
<link rel="apple-touch-icon" href="/img/logo.png">
<link rel="stylesheet" href="/account/style.css">
<script src="/account/i18n.js"></script>
<!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7J6B72EYMQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7J6B72EYMQ');
  </script>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <a href="/?stay=1" style="text-decoration:none;color:inherit;display:inline-block">
      <span class="brand-logo"></span>
      <div class="brand-name">Rally<span>Point</span></div>
    </a>
  </div>
  <div class="card">
    <h1 data-i18n="login.h1">Inloggen</h1>
    <div class="sub" data-i18n="login.sub">Welkom terug.</div>
    <form id="loginForm">
      <label for="email" data-i18n="common.email">E-mailadres</label>
      <input type="email" id="email" required autocomplete="email">
      <label for="password" data-i18n="common.password">Wachtwoord</label>
      <input type="password" id="password" required autocomplete="current-password" minlength="8">
      <button class="btn" type="submit" data-i18n="login.submit">Inloggen</button>
      <div class="err" id="err"></div>
    </form>
    <div class="link-row"><a href="/account/forgot" data-i18n="login.forgot">Wachtwoord vergeten?</a></div>
    <div class="link-row"><span data-i18n="login.newHere">Nieuw hier?</span> <a href="/account/signup" data-i18n="login.signup">Account aanmaken</a></div>
  </div>
</div>

<footer class="app-footer">
  <a href="/about" data-i18n="foot.about">Over</a> · <a href="/privacy" data-i18n="foot.privacy">Privacy</a> · <a href="/terms" data-i18n="foot.terms">Voorwaarden</a>
</footer>

<script>
  const next = new URLSearchParams(location.search).get('next') || '/account';
  const form = document.getElementById('loginForm');
  const errEl = document.getElementById('err');
  form.addEventListener('submit', async e => {
    e.preventDefault();
    errEl.textContent = '';
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = form.querySelector('button');
    btn.disabled = true;
    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await r.json();
      if (!r.ok) {
        errEl.textContent = data.error === 'bad_credentials' ? RP.t('login.err.creds') : RP.t('login.err.fail');
        btn.disabled = false; return;
      }
      window.location = next;
    } catch (e) {
      errEl.textContent = RP.t('err.network');
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
