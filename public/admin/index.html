<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats — RallyPoint</title>
<link rel="icon" href="/img/logo.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600&display=swap');
  :root { --bg:#0a0d10; --panel:#181d24; --border:#2a3038; --ink:#fff; --muted:#8b95a3; --ball:#c4ff00; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--ink); min-height:100dvh; padding:2rem 1.5rem; -webkit-font-smoothing:antialiased; }
  h1 { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:2rem; text-transform:uppercase; letter-spacing:.04em; margin-bottom:2rem; }
  h1 span { color:var(--ball); }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem; margin-bottom:2rem; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:1.25rem 1.5rem; }
  .card .label { color:var(--muted); font-size:.72rem; text-transform:uppercase; letter-spacing:.16em; font-weight:500; margin-bottom:.4rem; }
  .card .val { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:2.4rem; line-height:1; }
  .card .val.accent { color:var(--ball); }
  .section { margin-bottom:2rem; }
  .section h2 { font-size:.75rem; text-transform:uppercase; letter-spacing:.18em; color:var(--muted); font-weight:600; margin-bottom:.75rem; }
  .row { display:flex; justify-content:space-between; align-items:center; padding:.6rem 0; border-bottom:1px solid var(--border); font-size:.9rem; gap:1rem; }
  .row:last-child { border-bottom:none; }
  .row .name { color:var(--muted); font-size:.82rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:65%; }
  .row .num { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:1.1rem; flex-shrink:0; }
  .pill { display:inline-flex; align-items:center; gap:5px; color:var(--ball); font-size:.7rem; font-weight:600; text-transform:uppercase; letter-spacing:.14em; padding:.3rem .65rem; border:1px solid var(--ball); border-radius:100px; margin-bottom:1.5rem; }
  .pill .dot { width:6px; height:6px; border-radius:50%; background:var(--ball); box-shadow:0 0 6px var(--ball); animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .back { color:var(--muted); text-decoration:none; font-size:.85rem; display:inline-flex; align-items:center; gap:4px; margin-bottom:1.5rem; }
  .back:hover { color:var(--ball); }
  .err { color:#ff6b54; font-size:.9rem; padding:2rem 0; }
  #updated { color:var(--muted); font-size:.72rem; margin-bottom:1.5rem; }
</style>
</head>
<body>
<a href="/?stay=1" class="back">← Home</a>
<h1>Rally<span>Point</span> Stats</h1>
<div class="pill"><span class="dot"></span>Live</div>
<div id="updated"></div>
<div id="root"><p style="color:var(--muted);font-size:.9rem">Laden…</p></div>

<script>
async function load() {
  try {
    const r = await fetch('/api/admin/stats');
    if (r.status === 403) {
      document.getElementById('root').innerHTML = '<p class="err">Geen toegang — log in als beheerder.</p>';
      return;
    }
    const d = await r.json();
    document.getElementById('updated').textContent = 'Bijgewerkt: ' + new Date(d.now).toLocaleTimeString('nl-NL');

    const viewerRows = d.viewers.length
      ? d.viewers.map(v => `<div class="row"><span class="name">PIN ${v.pin}</span><span class="num accent">${v.count}</span></div>`).join('')
      : '<div class="row"><span class="name" style="color:var(--muted)">Geen actieve kijkers</span></div>';

    const pageRows = d.topPages.length
      ? d.topPages.map(([p, n]) => `<div class="row"><span class="name">${p || '/'}</span><span class="num">${n}</span></div>`).join('')
      : '<div class="row"><span class="name" style="color:var(--muted)">Nog geen data</span></div>';

    document.getElementById('root').innerHTML = `
      <div class="grid">
        <div class="card"><div class="label">Nu live</div><div class="val accent">${d.viewersTotal}</div></div>
        <div class="card"><div class="label">Actieve matches</div><div class="val">${d.activeMatches}</div></div>
        <div class="card"><div class="label">Bezoekers 1u</div><div class="val">${d.unique1h}</div></div>
        <div class="card"><div class="label">Bezoekers 24u</div><div class="val">${d.unique24h}</div></div>
        <div class="card"><div class="label">Pageviews 1u</div><div class="val">${d.visits1h}</div></div>
        <div class="card"><div class="label">Pageviews 24u</div><div class="val">${d.visits24h}</div></div>
      </div>
      <div class="section">
        <h2>Live kijkers per match</h2>
        ${viewerRows}
      </div>
      <div class="section">
        <h2>Meest bezochte pagina's (24u)</h2>
        ${pageRows}
      </div>
    `;
  } catch (e) {
    document.getElementById('root').innerHTML = '<p class="err">Kon stats niet laden.</p>';
  }
}

load();
setInterval(load, 15000);
</script>
</body>
</html>
