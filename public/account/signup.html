<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account aanmaken — RallyPoint</title>
<link rel="icon" href="/img/logo.png">
<script>(function(d){d.dataset.theme=localStorage.getItem('rallypointTheme')||'lime';var b=localStorage.getItem('rallypointBg');if(b&&b!=='auto'){var c=b==='black'?'#000':b==='darker'?'#050608':b==='dark'?'#0a0d10':b;d.style.setProperty('--user-bg',c);d.style.setProperty('--user-bg-image','none');}})(document.documentElement)</script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c0f12">
<link rel="apple-touch-icon" href="/img/logo.png">
<link rel="stylesheet" href="/account/style.css">
</head>
<body>
<div class="wrap">
  <div class="brand">
    <a href="/" style="text-decoration:none;color:inherit;display:inline-block">
      <span class="brand-logo"></span>
      <div class="brand-name">Rally<span>Point</span></div>
    </a>
  </div>
  <div class="card">
    <h1>Account aanmaken</h1>
    <div class="sub">Eén account voor al je watches en stats.</div>
    <form id="signupForm">
      <label for="email">E-mailadres</label>
      <input type="email" id="email" required autocomplete="email">
      <label for="password">Wachtwoord</label>
      <input type="password" id="password" required autocomplete="new-password" minlength="8" placeholder="Minimaal 8 tekens">
      <button class="btn" type="submit">Account aanmaken</button>
      <div class="err" id="err"></div>
    </form>
    <div class="link-row">Heb je al een account? <a href="/account/login">Inloggen</a></div>
  </div>
</div>

<footer class="app-footer">
  <a href="/about">Over</a> · <a href="/privacy">Privacy</a> · <a href="/terms">Voorwaarden</a>
</footer>

<script>
  const next = new URLSearchParams(location.search).get('next') || '/account';
  const form = document.getElementById('signupForm');
  const errEl = document.getElementById('err');
  form.addEventListener('submit', async e => {
    e.preventDefault();
    errEl.textContent = '';
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = form.querySelector('button');
    btn.disabled = true;
    try {
      const r = await fetch('/api/auth/signup', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await r.json();
      if (!r.ok) {
        errEl.textContent =
          data.error === 'email_taken' ? 'Dit e-mailadres is al in gebruik.' :
          data.error === 'bad_email' ? 'Ongeldig e-mailadres.' :
          data.error === 'bad_password' ? 'Wachtwoord moet minstens 8 tekens zijn.' :
          'Aanmaken mislukt.';
        btn.disabled = false; return;
      }
      // Nieuwe users → onboarding flow. Bestaande next-param respecteren als 't expliciet was meegegeven.
      window.location = new URLSearchParams(location.search).get('next') ? next : '/account/onboarding';
    } catch (e) {
      errEl.textContent = 'Netwerkfout.';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
