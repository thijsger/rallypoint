<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>RallyPoint — Match history</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1216">
<link rel="icon" href="/img/logo.png">
<script>(function(d){d.dataset.theme=localStorage.getItem('rallypointTheme')||'lime';var b=localStorage.getItem('rallypointBg');if(b&&b!=='auto'){var c=b==='black'?'#000':b==='darker'?'#050608':b==='dark'?'#0a0d10':b;d.style.setProperty('--user-bg',c);d.style.setProperty('--user-bg-image','none');}})(document.documentElement)</script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c0f12">
<link rel="apple-touch-icon" href="/img/logo.png">
<style>
  :root {
    --bg: #0a0d10;
    --bg-card: #181d24;
    --bg-card-hover: #232830;
    --border: #232a33;
    --text: #ffffff;
    --text-dim: #8b95a3;
    --us: #c4ff00;
    --them: #ff6b54;
    --amber: #c4ff00;
    --green: #4ade80;
    --ball: #c4ff00;
    --bg-glow: rgba(196,255,0,.045);
  }
  html[data-theme="ice"]    { --ball: #00d4ff; --us: #00d4ff; --amber: #00d4ff; --bg-glow: rgba(0,212,255,.045); }
  html[data-theme="sunset"] { --ball: #ff9533; --us: #ff9533; --amber: #ff9533; --bg-glow: rgba(255,149,51,.045); }
  html[data-theme="mono"]   { --ball: #ffffff; --us: #ffffff; --amber: #ffffff; --bg-glow: rgba(255,255,255,.03); }
  html[data-theme="court"]  { --ball: #4ade80; --us: #4ade80; --amber: #4ade80; --bg-glow: rgba(74,222,128,.045); }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background-color: var(--user-bg, #0a0d10);
    background-image: var(--user-bg-image,
      radial-gradient(ellipse 80% 50% at 50% 0%, var(--bg-glow), transparent 60%)
    );
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .pin-label {
    color: var(--text-dim);
    font-size: 14px;
  }
  .pin-value {
    color: var(--ball);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .lang-select {
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
  }
  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .back-link {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    white-space: nowrap;
  }
  .back-link:hover { color: var(--text); border-color: var(--text); }
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 16px 16px 60px;
  }
  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 60px 20px;
    font-size: 15px;
    line-height: 1.6;
    max-width: 360px; margin: 0 auto;
  }
  .empty-icon {
    font-size: 3rem; line-height: 1; margin-bottom: 1rem;
    filter: grayscale(.3);
  }
  .empty strong { color: var(--text); display: block; margin-bottom: 8px; font-size: 17px; }
  .empty .pin {
    color: var(--ball);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .match {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    transition: background 0.15s;
  }
  .match.over { border-left: 3px solid var(--green); }
  .match.in-progress { border-left: 3px solid var(--amber); }
  .match-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px; margin-bottom: 10px;
  }
  .match-sport {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    font-weight: 600;
  }
  .match-sport .icon { margin-right: 6px; }
  .match-date {
    font-size: 13px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .match-score {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
    margin: 10px 0 12px;
  }
  .team {
    font-size: 15px;
    font-weight: 600;
  }
  .team.us { color: var(--us); text-align: right; }
  .team.them { color: var(--them); text-align: left; }
  .team.winner::after {
    content: " 🏆";
    font-size: 14px;
  }
  .sets {
    font-size: 26px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    text-align: center;
    white-space: nowrap;
    color: var(--text);
  }
  .sets .sep { color: var(--text-dim); margin: 0 6px; font-weight: 400; }
  .set-history {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    margin-bottom: 12px;
  }
  .flow-wrap { margin: 4px 0 12px; }
  .flow-title {
    color: var(--text-dim); font-size: 11px;
    text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px;
  }
  .flow-chart { display: block; width: 100%; max-width: 100%; }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap: 8px 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-label {
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .stat-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .actions {
    margin-top: 24px;
    text-align: center;
  }
  .btn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn:hover { color: var(--them); border-color: var(--them); }
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .badge.in-progress { background: rgba(255, 184, 74, 0.15); color: var(--amber); }
  .badge.over { background: rgba(74, 222, 128, 0.15); color: var(--green); }
  .badge.saved { background: rgba(79, 179, 255, 0.15); color: var(--us); }
  .meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .meta-tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    margin-right: 4px;
    font-size: 11px;
  }

  /* --- Overall summary (top of page) --- */
  .summary {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 18px 16px;
    margin-bottom: 20px;
  }
  .summary-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 14px;
  }
  .summary-title {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
  }
  .summary-window {
    font-size: 11px;
    color: var(--text-dim);
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 14px 16px;
    margin-bottom: 16px;
  }
  .summary-stat .num {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .summary-stat .num.us  { color: var(--us); }
  .summary-stat .num.amber { color: var(--amber); }
  .summary-stat .num.green { color: var(--green); }
  .summary-stat .lbl {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 2px;
  }

  .sport-row {
    display: grid;
    grid-template-columns: minmax(80px, auto) 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    border-top: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }
  .sport-row:first-of-type { border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; }
  .sport-row .sport-name { color: var(--text); }
  .sport-row .bar {
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.05);
    overflow: hidden;
    position: relative;
  }
  .sport-row .bar-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--us), var(--ball));
    border-radius: 3px;
  }
  .sport-row .figures {
    color: var(--text-dim);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .sport-row .figures .wins { color: var(--green); font-weight: 600; }

  /* --- Per-set table inside match card --- */
  .set-table {
    margin-top: 12px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .set-table-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .set-row {
    display: grid;
    grid-template-columns: 30px 1fr 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 4px 0;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  .set-row + .set-row { border-top: 1px dashed rgba(255,255,255,0.05); }
  .set-row .set-no { color: var(--text-dim); font-size: 11px; }
  .set-row .games {
    font-weight: 700;
    color: var(--text);
  }
  .set-row .games.us-win { color: var(--us); }
  .set-row .games.them-win { color: var(--them); }
  .set-row .pts {
    color: var(--text-dim);
    font-size: 12px;
  }
  .set-row .streak {
    color: var(--text-dim);
    font-size: 11px;
    white-space: nowrap;
  }
  .set-row .streak .v { color: var(--amber); font-weight: 600; }

  /* --- Cross-match chart bar (matches per week, simple) --- */
  .activity-chart {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 36px;
    margin-top: 8px;
  }
  .activity-chart .bar {
    flex: 1;
    background: var(--us);
    opacity: 0.4;
    border-radius: 2px 2px 0 0;
    min-height: 2px;
  }
  .activity-chart .bar.active { opacity: 1; }

  /* --- Stats page: charts & records --- */
  .stats-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .stats-section-title {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    margin-bottom: 14px;
  }
  .stats-section-sub {
    color: var(--text-dim);
    font-size: 11px;
    margin-top: -10px;
    margin-bottom: 12px;
  }

  /* Filter pills voor tijdsbereik */
  .filter-pills {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-pill {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 12px;
    border-radius: 14px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .filter-pill:hover { color: var(--text); border-color: var(--text-dim); }
  .filter-pill.active {
    background: var(--us);
    color: var(--bg);
    border-color: var(--us);
    font-weight: 600;
  }

  /* SVG-chart base styles */
  .chart-svg {
    width: 100%;
    display: block;
    height: 140px;
  }
  .chart-svg .axis-label {
    font-size: 10px;
    fill: var(--text-dim);
    font-family: inherit;
  }
  .chart-svg .bar-week { fill: var(--us); transition: fill 0.15s; }
  .chart-svg .bar-week.hot { fill: var(--ball); }
  .chart-svg .bar-week.empty { fill: rgba(255,255,255,0.04); }
  .chart-svg .grid-line { stroke: rgba(255,255,255,0.04); stroke-width: 1; }
  .chart-svg .line-trend {
    fill: none;
    stroke: var(--us);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .chart-svg .line-trend-area {
    fill: var(--us);
    opacity: 0.12;
  }
  .chart-svg .dot {
    fill: var(--ball);
    stroke: var(--bg-card);
    stroke-width: 2;
  }
  .chart-svg .donut-bg { fill: rgba(255,255,255,0.06); }

  /* Hour-of-day grid */
  .hour-grid {
    display: grid;
    grid-template-columns: repeat(24, 1fr);
    gap: 2px;
    margin-top: 10px;
  }
  .hour-cell {
    aspect-ratio: 1;
    background: rgba(255,255,255,0.04);
    border-radius: 2px;
    position: relative;
  }
  .hour-cell[data-i] { background: var(--us); }
  .hour-labels {
    display: grid;
    grid-template-columns: repeat(24, 1fr);
    gap: 2px;
    margin-top: 4px;
    color: var(--text-dim);
    font-size: 9px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .hour-labels span { opacity: 0; }
  .hour-labels span:nth-child(7),
  .hour-labels span:nth-child(13),
  .hour-labels span:nth-child(19) { opacity: 0.7; }

  /* Records grid */
  .records-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
    gap: 12px;
  }
  .record {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .record-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .record-value {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .record-value.us { color: var(--us); }
  .record-value.ball { color: var(--ball); }
  .record-value.green { color: var(--green); }
  .record-value.amber { color: var(--amber); }
  .record-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* Donut + sport breakdown */
  .donut-row {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 18px;
    align-items: center;
  }
  @media (max-width: 520px) {
    .donut-row { grid-template-columns: 1fr; }
    .donut-row svg { margin: 0 auto; }
  }

  /* Match-card improvements */
  .match-list-title {
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 4px 4px 10px;
  }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:14px">
    <img src="/img/logo.png" alt="" style="width:42px;height:42px;border-radius:8px;flex-shrink:0">
    <div>
      <h1 id="title">Match history</h1>
      <div class="pin-label"><span id="pinLabel">PIN</span> <span class="pin-value" id="pinValue">—</span></div>
    </div>
  </div>
  <div class="header-actions">
    <a class="back-link" id="backBtn" href="/">← Back</a>
    <select class="lang-select" id="langSelect">
      <option value="en">English</option>
      <option value="nl">Nederlands</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="fr">Français</option>
    </select>
  </div>
</header>
<main id="main">
  <div class="empty" id="empty" style="display:none">
    <div class="empty-icon">🎾</div>
    <strong id="emptyTitle">No matches yet</strong>
    <div id="emptyBody">Save a match on your watch to see it appear here.</div>
  </div>
  <div id="filters" style="display:none"></div>
  <div id="summary" style="display:none"></div>
  <div id="records" style="display:none"></div>
  <div id="charts" style="display:none"></div>
  <div class="match-list-title" id="matchListTitle" style="display:none"></div>
  <div id="list"></div>
  <div class="actions" id="actions" style="display:none">
    <button class="btn" id="clearBtn">Clear history</button>
  </div>
</main>
<script>
const I18N = {

  teamThem:     { nl:'Zij',                   en:'Opp',                   de:'Sie',                   es:'Ellos',                 fr:'Eux' },
  clearBtn:     { nl:'Geschiedenis wissen',   en:'Clear history',         de:'Verlauf löschen',       es:'Borrar historial',      fr:'Effacer l\'historique' },
  clearConfirm: { nl:'Weet je zeker dat je de hele geschiedenis voor deze PIN wilt wissen?',
                  en:'Are you sure you want to clear all match history for this PIN?',
                  de:'Möchtest du wirklich den gesamten Verlauf für diese PIN löschen?',
                  es:'¿Estás seguro de borrar todo el historial de esta PIN?',
                  fr:'Voulez-vous vraiment effacer tout l\'historique de ce PIN?' },
  overallTitle: { nl:'Overzicht',          en:'Overall',            de:'Übersicht',      es:'Resumen',          fr:'Aperçu' },
  totalMatches: { nl:'Wedstrijden',        en:'Matches',            de:'Spiele',         es:'Partidos',         fr:'Matchs' },
  totalWinRate: { nl:'Winratio',           en:'Win rate',           de:'Siegquote',      es:'% victorias',      fr:'Taux victoire' },
  totalTime:    { nl:'Speeltijd',          en:'Play time',          de:'Spielzeit',      es:'Tiempo total',     fr:'Temps jeu' },
  bestStreak:   { nl:'Beste reeks',        en:'Best W-streak',      de:'Beste Serie',    es:'Mejor racha',      fr:'Meilleure série' },

function formatDate(ts) {
  const d = new Date(ts);
  const today = new Date();
  const isToday = d.toDateString() === today.toDateString();
  const yest = new Date(today); yest.setDate(today.getDate() - 1);
  const isYest = d.toDateString() === yest.toDateString();
  const time = d.toLocaleTimeString(currentLang, { hour:'2-digit', minute:'2-digit' });
  if (isToday) return time;
  if (isYest) return { nl:'gisteren', en:'yesterday', de:'gestern', es:'ayer', fr:'hier' }[currentLang] + ' ' + time;
  return d.toLocaleDateString(currentLang, { day:'numeric', month:'short' }) + ' ' + time;
}
function pointLabel(m, p) {
  const o = p === 0 ? 1 : 0;
  if (m.rally || m.tiebreak) return String(m.points[p]);
  if (!m.golden && m.points[p] >= 3 && m.points[o] >= 3) {
    if (m.points[p] === m.points[o]) return '40';
    if (m.points[p] > m.points[o]) return 'Adv';
    return '40';
  }
  return ['0','15','30','40','40'][Math.min(m.points[p], 4)];
}

// Bouw het samenvatting-blok bovenaan met aggregaten over alle wedstrijden.
function renderSummary(matches) {
  const summary = document.getElementById('summary');
  if (!matches.length) { summary.style.display = 'none'; return; }
  summary.style.display = 'block';

  const finished = matches.filter(m => m.over && !m.manuallySaved);
  const wins = finished.filter(m => m.winner === 0).length;
  const winRate = finished.length > 0 ? Math.round((wins / finished.length) * 100) : null;
  const total = matches.length;

  const totalMin = matches.reduce((sum, m) => sum + (Number(m.durationMin) || 0), 0);
  const hours = Math.floor(totalMin / 60);
  const mins = Math.round(totalMin % 60);
  const timeStr = hours > 0 ? `${hours}${t('hours')} ${mins}${t('minutes')}` : `${mins} ${t('minutes')}`;

  // Beste winning streak: chronologisch (oudste eerst), tel opeenvolgende wins
  const chrono = matches.slice().sort((a, b) => a.savedAt - b.savedAt);
  let bestStreak = 0, curStreak = 0;
  for (const m of chrono) {
    if (!m.over || m.manuallySaved) { continue; }
    if (m.winner === 0) {
      curStreak += 1;
      if (curStreak > bestStreak) bestStreak = curStreak;
    } else {
      curStreak = 0;
    }
  }

  const cutoff = Date.now() - 7 * 24 * 60 * 60 * 1000;
  const last7 = matches.filter(m => m.savedAt >= cutoff).length;

  // Aanvullende metrics — totaal punten, gemiddelde duur, grootste comeback
  const totalPoints = matches.reduce((s, m) => s + (Number(m.totalPoints) || 0), 0);
  const matchesWithDuration = matches.filter(m => Number(m.durationMin) > 0);
  const avgDuration = matchesWithDuration.length > 0
    ? Math.round(matchesWithDuration.reduce((s, m) => s + m.durationMin, 0) / matchesWithDuration.length)
    : 0;

  // Beste comeback: grootste deficit (vanuit Us-perspectief) die uiteindelijk
  // werd ingehaald en winst opleverde. Vereist pointLog.
  let bestComeback = 0;
  for (const m of matches) {
    if (!Array.isArray(m.pointLog) || !m.pointLog.length) continue;
    if (!m.over || m.winner !== 0) continue;
    let diff = 0, minDiff = 0;
    for (const t of m.pointLog) {
      diff += (Number(t) === 0 ? 1 : -1);
      if (diff < minDiff) minDiff = diff;
    }
    if (Math.abs(minDiff) > bestComeback) bestComeback = Math.abs(minDiff);
  }

  // Aggregaat per sport voor de breakdown-balkjes
  const sportAgg = {};
  for (const m of matches) {
    const sId = typeof m.sport === 'number' ? m.sport : 0;
    if (!sportAgg[sId]) sportAgg[sId] = { total: 0, wins: 0, finished: 0 };
    sportAgg[sId].total += 1;
    if (m.over && !m.manuallySaved) {
      sportAgg[sId].finished += 1;
      if (m.winner === 0) sportAgg[sId].wins += 1;
    }
  }
  const sportRows = Object.keys(sportAgg)
    .map(sId => {
      const s = SPORTS.find(x => x.id === Number(sId)) || SPORTS[0];
      const a = sportAgg[sId];
      const rate = a.finished > 0 ? Math.round((a.wins / a.finished) * 100) : null;
      const barPct = total > 0 ? Math.round((a.total / total) * 100) : 0;
      return { sport: s, total: a.total, finished: a.finished, rate, barPct };
    })
    .sort((a, b) => b.total - a.total);

  const winRateStr = winRate !== null ? `${winRate}%` : '—';
  const winRateCls = winRate !== null && winRate >= 50 ? 'green' : '';

  let sportsHtml = '';
  if (sportRows.length > 1) {
    sportsHtml = `
      <div class="summary-title" style="margin-top:4px;margin-bottom:6px">${t('bySport')}</div>
      ${sportRows.map(r => `
        <div class="sport-row">
          <div class="sport-name">${r.sport.icon} ${r.sport[currentLang] || r.sport.en}</div>
          <div class="bar"><div class="bar-fill" style="width:${r.barPct}%"></div></div>
          <div class="figures">${r.total}${r.rate !== null ? ` · <span class="wins">${r.rate}%</span>` : ''}</div>
        </div>
      `).join('')}
    `;
  }

  summary.innerHTML = `
    <div class="summary-head">
      <div class="summary-title">${t('overallTitle')}</div>
      <div class="summary-window">${last7} · ${t('last7days')}</div>
    </div>
    <div class="summary-grid">
      <div class="summary-stat"><div class="num">${total}</div><div class="lbl">${t('totalMatches')}</div></div>
      <div class="summary-stat"><div class="num ${winRateCls}">${winRateStr}</div><div class="lbl">${t('totalWinRate')}</div></div>
      <div class="summary-stat"><div class="num">${timeStr}</div><div class="lbl">${t('totalTime')}</div></div>
      <div class="summary-stat"><div class="num amber">${bestStreak || '—'}</div><div class="lbl">${t('bestStreak')}</div></div>
      <div class="summary-stat"><div class="num">${totalPoints || '—'}</div><div class="lbl">${t('totalPointsScored')}</div></div>
      <div class="summary-stat"><div class="num">${avgDuration ? avgDuration + ' ' + t('minutes') : '—'}</div><div class="lbl">${t('avgDuration')}</div></div>
      <div class="summary-stat"><div class="num ${bestComeback ? 'green' : ''}">${bestComeback ? '+' + bestComeback : '—'}</div><div class="lbl">${t('bestComeback')}</div></div>
    </div>
    ${sportsHtml}
  `;
}

// === CHARTS (handgemaakte inline SVG, geen libs) ===

function chartMatchesPerWeek(matches, weeks) {
  if (!matches.length) return '';
  weeks = weeks || 12;
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  const startMs = now.getTime() - (weeks - 1) * 7 * 24 * 60 * 60 * 1000;
  const buckets = new Array(weeks).fill(0);
  for (const m of matches) {
    const offset = Math.floor((m.savedAt - startMs) / (7 * 24 * 60 * 60 * 1000));
    if (offset >= 0 && offset < weeks) buckets[offset] += 1;
  }
  const max = Math.max(1, ...buckets);
  const w = 600, h = 110, pad = 18;
  const barW = (w - pad * 2) / weeks - 4;
  const bars = buckets.map((v, i) => {
    const x = pad + i * ((w - pad * 2) / weeks) + 2;
    const barH = (v / max) * (h - pad - 18);
    const y = h - 18 - barH;
    const cls = v === max && v > 0 ? 'bar-week hot' : (v === 0 ? 'bar-week empty' : 'bar-week');
    return `<rect class="${cls}" x="${x}" y="${y}" width="${barW}" height="${Math.max(2, barH)}" rx="2" ry="2">
      <title>${v} match${v === 1 ? '' : 'es'}</title>
    </rect>`;
  }).join('');
  // Labels: alleen eerste, midden, laatste week tonen
  const labels = [0, Math.floor(weeks / 2), weeks - 1].map(i => {
    const d = new Date(startMs + i * 7 * 24 * 60 * 60 * 1000);
    const x = pad + i * ((w - pad * 2) / weeks) + barW / 2;
    return `<text class="axis-label" x="${x}" y="${h - 4}" text-anchor="middle">${d.getDate()}/${d.getMonth() + 1}</text>`;
  }).join('');
  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${bars}${labels}</svg>`;
}

function chartTempoTrend(matches) {
  // Lijn van pointsPerMinute over de laatste N matches.
  // matches komen newest-first binnen → .slice(0, 20) = recentste 20 → sorteer
  // oplopend zodat de x-as van oud naar nieuw loopt.
  const finished = matches.filter(m => Number(m.ptsPerMin) > 0).slice(0, 20);
  if (finished.length < 3) {
    return `<div style="color:var(--text-dim);font-size:13px;text-align:center;padding:30px 0;">${t('noData')}</div>`;
  }
  finished.sort((a, b) => a.savedAt - b.savedAt);
  const values = finished.map(m => Number(m.ptsPerMin) || 0);
  const max = Math.max(...values);
  const min = Math.min(...values);
  const range = Math.max(0.5, max - min);
  const w = 600, h = 110, pad = 12;
  const xStep = (w - pad * 2) / (values.length - 1);
  const yFor = (v) => pad + (h - pad * 2) * (1 - (v - min) / range);

  const pts = values.map((v, i) => [pad + i * xStep, yFor(v)]);
  const line = 'M ' + pts.map(p => p.join(' ')).join(' L ');
  const area = line + ` L ${pts[pts.length - 1][0]} ${h - pad} L ${pad} ${h - pad} Z`;

  const dots = pts.map(([x, y], i) =>
    `<circle class="dot" cx="${x}" cy="${y}" r="3"><title>${values[i].toFixed(1)} pt/min</title></circle>`
  ).join('');

  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path class="line-trend-area" d="${area}"/>
    <path class="line-trend" d="${line}"/>
    ${dots}
  </svg>`;
}

function chartHourOfDay(matches) {
  const buckets = new Array(24).fill(0);
  for (const m of matches) {
    const d = new Date(m.savedAt);
    buckets[d.getHours()] += 1;
  }
  const max = Math.max(1, ...buckets);
  const cells = buckets.map((v, h) => {
    if (v === 0) return `<div class="hour-cell" title="${h}:00 – ${v}"></div>`;
    const opacity = 0.25 + 0.75 * (v / max);
    return `<div class="hour-cell" data-i style="opacity:${opacity.toFixed(2)}" title="${h}:00 – ${v}"></div>`;
  }).join('');
  const labels = new Array(24).fill(0).map((_, i) => `<span>${i}</span>`).join('');
  return `<div class="hour-grid">${cells}</div><div class="hour-labels">${labels}</div>`;
}

function chartSportDonut(matches) {
  if (!matches.length) return '';
  const sportAgg = {};
  for (const m of matches) {
    const s = typeof m.sport === 'number' ? m.sport : 0;
    sportAgg[s] = (sportAgg[s] || 0) + 1;
  }
  const entries = Object.entries(sportAgg)
    .map(([sId, count]) => ({ sport: SPORTS.find(x => x.id === Number(sId)) || SPORTS[0], count }))
    .sort((a, b) => b.count - a.count);
  const total = entries.reduce((s, e) => s + e.count, 0);
  const r = 50, cx = 60, cy = 60, stroke = 18;
  const circ = 2 * Math.PI * r;
  // Color palette per sport (cycle through theme colors)
  const colors = ['var(--us)', 'var(--ball)', 'var(--them)', 'var(--green)', 'var(--amber)', '#a78bfa'];
  let acc = 0;
  const slices = entries.map((e, i) => {
    const frac = e.count / total;
    const dash = frac * circ;
    const gap = circ - dash;
    const offset = -acc;
    acc += dash;
    return `<circle r="${r}" cx="${cx}" cy="${cy}" fill="none" stroke="${colors[i % colors.length]}"
      stroke-width="${stroke}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${offset}"
      transform="rotate(-90 ${cx} ${cy})"/>`;
  }).join('');
  const list = entries.map((e, i) => {
    const pct = Math.round((e.count / total) * 100);
    return `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13px;">
      <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${colors[i % colors.length]}"></span>
      <span style="flex:1">${e.sport.icon} ${e.sport[currentLang] || e.sport.en}</span>
      <span style="color:var(--text-dim);font-variant-numeric:tabular-nums">${e.count} · ${pct}%</span>
    </div>`;
  }).join('');
  return `<div class="donut-row">
    <svg width="120" height="120" viewBox="0 0 120 120">
      <circle class="donut-bg" r="${r}" cx="${cx}" cy="${cy}"/>
      <g>${slices}</g>
      <text x="${cx}" y="${cy + 2}" text-anchor="middle" style="fill:var(--text);font-size:20px;font-weight:700;font-variant-numeric:tabular-nums">${total}</text>
      <text x="${cx}" y="${cy + 17}" text-anchor="middle" style="fill:var(--text-dim);font-size:9px;text-transform:uppercase;letter-spacing:0.05em">${t('totalMatches')}</text>
    </svg>
    <div>${list}</div>
  </div>`;
}

function renderCharts(matches) {
  const el = document.getElementById('charts');

// === PERSONAL RECORDS ===

function computeRecords(matches) {
  if (!matches.length) return null;
  const recs = {};

  // Langste wedstrijd (duur)
  const byDuration = matches.slice().sort((a, b) => (b.durationMin || 0) - (a.durationMin || 0));
  if (byDuration[0] && byDuration[0].durationMin > 0) {
    recs.longestMatch = { value: byDuration[0].durationMin, m: byDuration[0] };
  }

  // Meeste punten in een wedstrijd
  const byPoints = matches.slice().sort((a, b) => (b.totalPoints || 0) - (a.totalPoints || 0));
  if (byPoints[0] && byPoints[0].totalPoints > 0) {
    recs.mostPoints = { value: byPoints[0].totalPoints, m: byPoints[0] };
  }

  // Langste reeks (binnen één wedstrijd)
  const byStreak = matches.slice().sort((a, b) => {
    const am = Math.max((a.longestStreak || [0,0])[0], (a.longestStreak || [0,0])[1]);
    const bm = Math.max((b.longestStreak || [0,0])[0], (b.longestStreak || [0,0])[1]);
    return bm - am;
  });
  if (byStreak[0]) {
    const ls = byStreak[0].longestStreak || [0, 0];
    const m = Math.max(ls[0], ls[1]);
    if (m > 0) recs.longestStreak = { value: m, m: byStreak[0] };
  }

  // Hoogste tempo (pts/min)
  const byTempo = matches.slice().sort((a, b) => (b.ptsPerMin || 0) - (a.ptsPerMin || 0));
  if (byTempo[0] && byTempo[0].ptsPerMin > 0) {
    recs.highestTempo = { value: byTempo[0].ptsPerMin, m: byTempo[0] };
  }

  // Grootste overwinning (verschil in sets, alleen winst voor "us")
  const wins = matches.filter(m => m.over && !m.manuallySaved && m.winner === 0 && Array.isArray(m.sets));
  wins.sort((a, b) => (b.sets[0] - b.sets[1]) - (a.sets[0] - a.sets[1]));
  if (wins[0]) {
    recs.bestWin = { value: `${wins[0].sets[0]}-${wins[0].sets[1]}`, m: wins[0] };
  }

  // Langste win-streak (over wedstrijden heen)
  const chrono = matches.slice().sort((a, b) => a.savedAt - b.savedAt);
  let cur = 0, best = 0, bestEndMatch = null, curStart = null;
  for (const m of chrono) {
    if (!m.over || m.manuallySaved) continue;
    if (m.winner === 0) {
      if (cur === 0) curStart = m;
      cur += 1;
      if (cur > best) { best = cur; bestEndMatch = m; }
    } else { cur = 0; curStart = null; }
  }
  if (best > 0) recs.winStreak = { value: best, m: bestEndMatch };

  return recs;
}

function recordCard(labelKey, value, sub, colorCls) {
  return `<div class="record">
    <div class="record-label">${t(labelKey)}</div>
    <div class="record-value ${colorCls || ''}">${value}</div>
    ${sub ? `<div class="record-sub">${sub}</div>` : ''}
  </div>`;
}

function renderRecords(matches) {
  const el = document.getElementById('records');
  const recs = computeRecords(matches);
  if (!recs || Object.keys(recs).length === 0) { el.style.display = 'none'; return; }
  el.style.display = 'block';

  const cards = [];
  if (recs.longestMatch) {
    cards.push(recordCard('recLongestMatch',
      `${recs.longestMatch.value} <span style="font-size:14px;color:var(--text-dim)">${t('minutes')}</span>`,
      formatDate(recs.longestMatch.m.savedAt),
      'ball'));
  }
  if (recs.mostPoints) {
    cards.push(recordCard('recMostPoints',
      recs.mostPoints.value,
      formatDate(recs.mostPoints.m.savedAt),
      'us'));
  }
  if (recs.longestStreak) {
    cards.push(recordCard('recLongestStreak',
      recs.longestStreak.value,
      formatDate(recs.longestStreak.m.savedAt),
      'amber'));
  }
  if (recs.highestTempo) {
    cards.push(recordCard('recHighestTempo',
      `${recs.highestTempo.value.toFixed(1)} <span style="font-size:14px;color:var(--text-dim)">${t('ptsMin')}</span>`,
      formatDate(recs.highestTempo.m.savedAt),
      'green'));
  }
  if (recs.bestWin) {
    cards.push(recordCard('recBestWin',
      recs.bestWin.value,
      formatDate(recs.bestWin.m.savedAt) + ' · sets',
      'us'));
  }
  if (recs.winStreak) {
    cards.push(recordCard('recWinStreak',
      `${recs.winStreak.value}×`,
      formatDate(recs.winStreak.m.savedAt),
      'green'));
  }

  el.innerHTML = `
    <div class="stats-section">
      <div class="stats-section-title">${t('recordsTitle')}</div>
      <div class="records-grid">${cards.join('')}</div>
    </div>
  `;
}

// === MAIN RENDER ENTRY ===

function renderStatsAndList(matches) {
  renderSummary(matches);
  renderCharts(matches);
  renderRecords(matches);

  const list = document.getElementById('list');
  const matchListTitle = document.getElementById('matchListTitle');
  matchListTitle.style.display = matches.length ? 'block' : 'none';
  matchListTitle.textContent = t('matchesTitle');
  renderMatchList(list, matches);
}

function render(matches) {
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  const actions = document.getElementById('actions');
  const summary = document.getElementById('summary');
  const filters = document.getElementById('filters');
  const charts = document.getElementById('charts');
  const records = document.getElementById('records');
  const matchListTitle = document.getElementById('matchListTitle');

  allMatches = matches;

  if (!matches.length) {
    empty.style.display = 'block';
    list.innerHTML = '';
    actions.style.display = 'none';
    summary.style.display = 'none';
    filters.style.display = 'none';
    charts.style.display = 'none';
    records.style.display = 'none';
    matchListTitle.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  actions.style.display = 'block';
  renderFilters(matches);

  const filtered = filterByRange(matches, activeRange);
  renderStatsAndList(filtered);
}

function renderMatchList(list, matches) {

  list.innerHTML = matches.map(m => {
    const cls = m.over ? 'over' : (m.inProgress ? 'in-progress' : '');
    const teamUs = m.teamUs || t('teamUs');
    const teamThem = m.teamThem || t('teamThem');
    const realWin = m.over && m.winner !== -1 && !m.manuallySaved;
    const usWin = realWin && m.winner === 0;
    const themWin = realWin && m.winner === 1;
    let badge;
    if (m.manuallySaved) {
      badge = '<span class="badge saved">' + t('saved') + '</span>';
    } else if (m.over) {
      badge = '<span class="badge over">' + t('finished') + '</span>';
    } else {
      badge = '<span class="badge in-progress">' + t('inProgress') + '</span>';
    }

    // Set history string
    let history = '';
    if (m.setHistory && m.setHistory.length) {
      history = m.setHistory.map(s => s[0] + '-' + s[1]).join('  ');
    }
    // Onvoltooide set tonen — ook bij handmatig saven
    const showUnfinished = m.hasUnfinishedSet || m.inProgress;
    if (showUnfinished && !realWin) {
      if (history) history += '  ';
      history += '(' + m.games[0] + '-' + m.games[1];
      const us = pointLabel(m, 0), them = pointLabel(m, 1);
      if (us !== '0' || them !== '0') history += ', ' + us + '-' + them;
      history += ')';
    }

    // Format + golden point tags
    const fmtLabels = { 0: t('format')+': 1 set', 1: t('format')+': Bo3', 2: t('format')+': Bo5', 3: t('format')+': Pro set', 4: t('format')+': ∞' };
    const meta = [];
    if (typeof m.fmt === 'number' && m.fmt in fmtLabels) { meta.push('<span class="meta-tag">' + fmtLabels[m.fmt] + '</span>'); }
    if (m.golden) { meta.push('<span class="meta-tag">⚡ ' + t('golden') + '</span>'); }

    const stats = [];
    stats.push(`<div class="stat"><span class="stat-label">${t('duration')}</span><span class="stat-value">${m.durationMin} ${t('minutes')}</span></div>`);
    stats.push(`<div class="stat"><span class="stat-label">${t('points')}</span><span class="stat-value">${m.totalPoints}</span></div>`);
    stats.push(`<div class="stat"><span class="stat-label">${t('streak')}</span><span class="stat-value">${m.longestStreak[0]} / ${m.longestStreak[1]}</span></div>`);
    if (m.ptsPerMin > 0) {
      stats.push(`<div class="stat"><span class="stat-label">${t('tempo')}</span><span class="stat-value">${m.ptsPerMin.toFixed(1)} ${t('ptsMin')}</span></div>`);
    }
    if (m.avgPtsGame > 0) {
      stats.push(`<div class="stat"><span class="stat-label">${t('avgGame')}</span><span class="stat-value">${m.avgPtsGame.toFixed(1)}</span></div>`);
    }
    if (m.tiebreaks > 0) {
      stats.push(`<div class="stat"><span class="stat-label">${t('tiebreaks')}</span><span class="stat-value">${m.tiebreaks}</span></div>`);
    }
    if (m.deuceGames > 0) {
      stats.push(`<div class="stat"><span class="stat-label">${t('deuces')}</span><span class="stat-value">${m.deuceGames}</span></div>`);
    }
    if (m.sideSwitches > 0) {
      stats.push(`<div class="stat"><span class="stat-label">${t('sideSwitch')}</span><span class="stat-value">${m.sideSwitches}</span></div>`);
    }

    // Match-flow chart: cumulatieve scoreverschuiving per punt (Us+1 / Them-1)
    const flowAttr = (Array.isArray(m.pointLog) && m.pointLog.length > 1)
      ? `data-flow="${m.pointLog.join(',')}"` : '';
    const flowHtml = flowAttr
      ? `<div class="flow-wrap"><div class="flow-title">${t('flowTitle') || 'Match flow'}</div>
           <canvas class="flow-chart" ${flowAttr} height="64"></canvas>
         </div>` : '';

    return `
      <div class="match ${cls}">
        <div class="match-head">
          <div>
            <div class="match-sport">${sportLabel(m.sport)}</div>
            ${meta.length ? `<div class="meta">${meta.join('')}</div>` : ''}
          </div>
          <div class="match-date">${formatDate(m.savedAt)} · ${badge}</div>
        </div>
        <div class="match-score">
          <div class="team us ${usWin ? 'winner' : ''}">${esc(teamUs)}</div>
          <div class="sets">${m.sets[0]}<span class="sep">–</span>${m.sets[1]}</div>
          <div class="team them ${themWin ? 'winner' : ''}">${esc(teamThem)}</div>
        </div>
        ${history ? `<div class="set-history">${history}</div>` : ''}
        ${flowHtml}
        <div class="stats">${stats.join('')}</div>
        ${renderSetTable(m)}
      </div>
    `;
  }).join('');

  // Na render: alle flow-canvasses tekenen
  list.querySelectorAll('canvas.flow-chart').forEach(c => drawFlowChart(c));
}

// Match-flow chart: line van cumulative score-diff (Us = +1, Them = -1).
// Boven de baseline = Us was voor; onder = Them was voor.
function drawFlowChart(canvas) {
  const raw = canvas.getAttribute('data-flow') || '';
  const pl = raw.split(',').map(s => Number(s) === 1 ? 1 : 0);
  if (pl.length < 2) return;

  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || canvas.parentElement.clientWidth || 280;
  const cssH = canvas.height || 64;
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Cumulatieve diff: Us=0 wint → +1, Them=1 wint → -1
  let diff = 0;
  const pts = [0];
  for (const t of pl) { diff += (t === 0 ? 1 : -1); pts.push(diff); }

  const maxAbs = Math.max(1, ...pts.map(p => Math.abs(p)));
  const padX = 6, padY = 6;
  const innerW = cssW - 2 * padX;
  const innerH = cssH - 2 * padY;
  const midY = padY + innerH / 2;

  // Zero-line
  ctx.strokeStyle = 'rgba(127,174,159,.4)';
  ctx.setLineDash([3, 3]);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padX, midY);
  ctx.lineTo(padX + innerW, midY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Area fill (gradient): boven baseline = us color, onder = them color
  const xAt = (i) => padX + (i / (pts.length - 1)) * innerW;
  const yAt = (v) => midY - (v / maxAbs) * (innerH / 2);

  // Subtle area fill
  ctx.fillStyle = 'rgba(212,255,0,.08)';
  ctx.beginPath();
  ctx.moveTo(xAt(0), midY);
  pts.forEach((v, i) => { ctx.lineTo(xAt(i), yAt(v)); });
  ctx.lineTo(xAt(pts.length - 1), midY);
  ctx.closePath();
  ctx.fill();

  // Flow line
  ctx.strokeStyle = '#d4ff00';
  ctx.lineWidth = 1.8;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  pts.forEach((v, i) => {
    const x = xAt(i), y = yAt(v);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Eindmarker
  const lastV = pts[pts.length - 1];
  ctx.fillStyle = lastV >= 0 ? '#d4ff00' : '#ff5a3c';
  ctx.beginPath();
  ctx.arc(xAt(pts.length - 1), yAt(lastV), 3, 0, Math.PI * 2);
  ctx.fill();
}
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function showPinForm() {
  // Als er al een PIN in localStorage staat (vorige sessie of het scoreboard
  // heeft 'm bewaard), direct doorsturen naar de juiste history — geen
  // extra invul-stap nodig.
  const savedPin = localStorage.getItem('rallypointPin');
  if (savedPin && /^\d{4}$/.test(savedPin)) {
    location.replace('/history/' + savedPin);
    return;
  }
  document.getElementById('pinValue').innerHTML =
    '<input type="text" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" id="pinInput" ' +
    'placeholder="0000" style="background:transparent;border:1px solid var(--border);' +
    'border-radius:6px;padding:4px 8px;color:var(--ball);font:inherit;font-weight:600;' +
    'width:80px;font-variant-numeric:tabular-nums;letter-spacing:0.1em;text-align:center;">';
  const inp = document.getElementById('pinInput');
  const remembered = localStorage.getItem('rallypointPin');
  if (remembered && /^\d{4}$/.test(remembered)) { inp.value = remembered; }
  inp.focus();
  inp.addEventListener('input', e => {
    e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4);
    if (e.target.value.length === 4) {
      localStorage.setItem('rallypointPin', e.target.value);
      location.href = '/history/' + e.target.value;
    }
  });
  document.getElementById('emptyTitle').textContent = t('emptyTitle');
  document.getElementById('emptyBody').innerHTML =
    { nl: 'Vul je 4-cijferige PIN in om je wedstrijdgeschiedenis te zien.',
      en: 'Enter your 4-digit PIN above to see your match history.',
      de: 'Gib oben deine 4-stellige PIN ein, um deinen Verlauf zu sehen.',
      es: 'Introduce arriba tu PIN de 4 dígitos para ver tu historial.',
      fr: 'Saisissez votre code PIN à 4 chiffres ci-dessus pour voir votre historique.'
    }[currentLang] || 'Enter your 4-digit PIN above to see your match history.';
  document.getElementById('empty').style.display = 'block';
}

function cacheKey(pin) { return 'rallypoint-history-' + pin; }

function loadCached(pin) {
  try {
    const raw = localStorage.getItem(cacheKey(pin));
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) { return []; }
}

function saveCached(pin, list) {
  try {
    localStorage.setItem(cacheKey(pin), JSON.stringify(list.slice(0, 100)));
  } catch (e) {}
}

// Server + browser-cache mergen: dedupliceren via savedAt-tijdstempel.
// Op die manier blijven wedstrijden zichtbaar zelfs als Render de gratis
// disk wist tussen deploys — de browser onthoudt zijn eigen kopie.
function mergeMatches(server, local) {
  const seen = new Map();
  for (const m of [...server, ...local]) {
    if (!m || typeof m.savedAt !== 'number') continue;
    if (!seen.has(m.savedAt)) { seen.set(m.savedAt, m); }
  }
  return Array.from(seen.values()).sort((a, b) => b.savedAt - a.savedAt).slice(0, 100);
}

async function load() {
  if (!PIN) {
    showPinForm();
    return;
  }
  localStorage.setItem('rallypointPin', PIN);
  document.getElementById('pinValue').textContent = PIN;

  const cached = loadCached(PIN);
  if (cached.length) { render(cached); }  // direct iets tonen terwijl server laadt

  let server = [];
  try {
    const r = await fetch('/history/' + PIN, { headers: { 'Accept': 'application/json' } });
    const data = await r.json();
    server = Array.isArray(data) ? data : [];
  } catch (e) {}

  const merged = mergeMatches(server, cached);
  saveCached(PIN, merged);
  render(merged);
}

document.getElementById('langSelect').addEventListener('change', e => {
  currentLang = e.target.value;
  localStorage.setItem('rallypointLang', currentLang);
  applyLang();
  load();
});
document.getElementById('clearBtn').addEventListener('click', async () => {
  if (!PIN) return;
  if (!confirm(t('clearConfirm'))) return;
  try {
    await fetch('/history/' + PIN, { method: 'DELETE' });
    load();
  } catch (e) {}
});

applyLang();
load();
