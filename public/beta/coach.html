<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AI Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070A08; --card:rgba(255,255,255,.045); --card-strong:rgba(255,255,255,.075);
  --border:rgba(255,255,255,.10); --border-soft:rgba(255,255,255,.06);
  --text:#F4F7F2; --muted:#8E978B; --subtle:#5F695E;
  --lime:#A7F432; --blue:#4EA3FF; --orange:#FFB84D; --red:#FF6B5A; --purple:#A78BFA;
  --radius:22px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro',sans-serif;font-feature-settings:"tnum" 1;line-height:1.5;-webkit-font-smoothing:antialiased}
body{
  min-height:100vh;
  background:
    radial-gradient(900px 500px at 78% -8%, rgba(167,244,50,.06), transparent 60%),
    radial-gradient(800px 600px at 8% 4%, rgba(78,163,255,.05), transparent 55%),
    var(--bg);
}
.wrap{max-width:1320px;margin:0 auto;padding:22px clamp(14px,3vw,32px) 80px}
a{color:inherit;text-decoration:none}
.muted{color:var(--muted)} .subtle{color:var(--subtle)}
small{font-size:.62em;color:var(--muted);font-weight:600}

/* ---------- header ---------- */
.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:22px}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.logo{width:42px;height:42px;border-radius:13px;flex-shrink:0;
  background:linear-gradient(140deg,#bdff4d,#7cc400);display:flex;align-items:center;justify-content:center;font-size:1.35rem;
  box-shadow:0 8px 22px rgba(167,244,50,.22)}
.brand h1{font-size:clamp(22px,3vw,30px);font-weight:800;letter-spacing:-.02em;line-height:1.1}
.brand .sub{font-size:12.5px;color:var(--muted);font-weight:500}
.top-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.exp{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;letter-spacing:.02em;
  color:#d8c772;background:rgba(255,184,77,.10);border:1px solid rgba(255,184,77,.26);padding:6px 11px;border-radius:999px}
.exp .dot{width:6px;height:6px;border-radius:50%;background:var(--orange)}
.ghost-btn{font-size:13px;font-weight:600;color:var(--muted);background:var(--card);border:1px solid var(--border);
  padding:8px 13px;border-radius:11px;cursor:pointer;transition:.15s}
.ghost-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}

/* ---------- session selector ---------- */
.sessions{display:flex;gap:9px;overflow-x:auto;padding:2px 0 6px;margin-bottom:20px;scrollbar-width:none}
.sessions::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;min-width:96px;background:var(--card);border:1px solid var(--border);border-radius:15px;
  padding:11px 14px;cursor:pointer;transition:.16s}
.chip:hover{border-color:rgba(255,255,255,.2)}
.chip.active{background:var(--card-strong);border-color:rgba(167,244,50,.5);box-shadow:0 0 0 1px rgba(167,244,50,.25) inset}
.chip .cd{font-size:12px;color:var(--muted);font-weight:600}
.chip .cn{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-top:1px}
.chip .cs{font-size:11.5px;color:var(--subtle);font-weight:600}
.chip.live .cd{color:var(--lime)}

/* ---------- cards ---------- */
.card{background:linear-gradient(180deg,var(--card-strong),var(--card));border:1px solid var(--border);
  border-radius:var(--radius);padding:22px;box-shadow:0 18px 50px rgba(0,0,0,.35)}
.label{font-size:11.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}

/* hero */
.hero{margin-bottom:18px;padding:clamp(22px,3vw,30px);position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(167,244,50,.12),transparent 65%);pointer-events:none}
.hero .label{color:var(--lime)}
.hero .summary{font-size:clamp(18px,2.4vw,24px);font-weight:700;letter-spacing:-.01em;line-height:1.42;
  margin:13px 0 18px;max-width:760px;position:relative}
.hero .summary b{color:var(--lime);font-weight:700}
.hbadges{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:20px}
.hbadge{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--text);
  background:rgba(255,255,255,.05);border:1px solid var(--border);padding:7px 13px;border-radius:999px}
.hbadge .bi{font-size:15px}
.next{display:flex;align-items:center;gap:13px;background:rgba(167,244,50,.08);border:1px solid rgba(167,244,50,.22);
  border-radius:15px;padding:14px 16px;max-width:560px}
.next .ni{width:36px;height:36px;border-radius:11px;flex-shrink:0;background:rgba(167,244,50,.16);
  display:flex;align-items:center;justify-content:center;font-size:1.05rem}
.next .nl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9fd13e}
.next .nt{font-size:15px;font-weight:600;margin-top:2px}

/* metric row */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.metric{padding:18px 20px}
.metric .mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.metric .mi{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;
  background:rgba(255,255,255,.05)}
.metric .mv{font-size:clamp(26px,3vw,34px);font-weight:800;letter-spacing:-.025em;line-height:1}
.metric .mv small{font-size:.5em;font-weight:700;margin-left:3px}
.metric .mt{font-size:12.5px;color:var(--muted);font-weight:500;margin-top:7px}
.metric .mt b{color:var(--text);font-weight:600}

/* tabs */
.tabs{display:flex;gap:5px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:5px;
  margin-bottom:20px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:max-content;text-align:center;font-size:13.5px;font-weight:600;color:var(--muted);
  padding:9px 16px;border-radius:10px;cursor:pointer;transition:.16s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{background:var(--card-strong);color:var(--text);box-shadow:0 1px 0 rgba(255,255,255,.04) inset}

/* grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid .span2{grid-column:1/-1}
.ctitle{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;
  display:flex;align-items:center;gap:8px}
.ctitle .ci{font-size:14px}

/* donut + legend */
.donut-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.donut{position:relative;width:148px;height:148px;flex-shrink:0}
.donut .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut .center .dv{font-size:26px;font-weight:800;letter-spacing:-.02em}
.donut .center .dl{font-size:11px;color:var(--muted);font-weight:600}
.dlegend{flex:1;min-width:160px;display:flex;flex-direction:column;gap:9px}
.dleg{display:flex;align-items:center;gap:10px;font-size:13.5px}
.dleg .sw{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.dleg .dn{flex:1;color:var(--text);font-weight:500}
.dleg .dp{color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums}
.dleg .dc{color:var(--subtle);font-weight:600;min-width:34px;text-align:right}

/* highlights */
.hls{display:flex;flex-direction:column;gap:11px}
.hlrow{display:flex;align-items:center;gap:13px}
.hlrow .hi{width:38px;height:38px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:1.05rem;background:rgba(255,255,255,.05)}
.hlrow .hv{font-size:17px;font-weight:700;letter-spacing:-.01em}
.hlrow .hl2{font-size:12.5px;color:var(--muted);font-weight:500}

/* bar list */
.barlist{display:flex;flex-direction:column;gap:13px}
.brow{display:grid;grid-template-columns:96px 1fr auto;align-items:center;gap:12px}
.brow .bl{font-size:13.5px;color:var(--text);font-weight:500}
.brow .bt{display:block;height:9px;border-radius:6px;background:rgba(255,255,255,.05);overflow:hidden}
.brow .bf{display:block;height:9px;border-radius:6px;width:var(--fw,0);animation:grow .8s cubic-bezier(.22,1,.36,1)}
@keyframes grow{from{width:0}}
.brow .bv{font-size:13px;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums;text-align:right;min-width:58px}

/* coach tip cards */
.tips{display:flex;flex-direction:column;gap:12px}
.tip{display:flex;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 17px;
  position:relative}
.tip .ti{width:40px;height:40px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.15rem}
.tip .tt{font-size:15px;font-weight:700;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.tip .tin{font-size:13.5px;color:var(--muted);margin-top:4px;line-height:1.5}
.tip .tac{font-size:13.5px;color:var(--text);margin-top:9px;font-weight:500;display:flex;gap:8px;align-items:flex-start}
.tip .tac .ar{color:var(--lime);flex-shrink:0}
.prio{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:999px}
.prio.high{color:#ffb0a6;background:rgba(255,107,90,.14);border:1px solid rgba(255,107,90,.3)}
.prio.med{color:#ffd089;background:rgba(255,184,77,.13);border:1px solid rgba(255,184,77,.28)}
.prio.low{color:#bfe87f;background:rgba(167,244,50,.12);border:1px solid rgba(167,244,50,.26)}

/* stat grid (career / mini) */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:13px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:17px 18px}
.scard .sl{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.scard .sv{font-size:27px;font-weight:800;letter-spacing:-.02em;margin-top:7px}
.scard .sv small{font-size:.5em}
.scard .ss{font-size:12px;color:var(--subtle);font-weight:600;margin-top:3px}

/* compare */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cside{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px}
.cside .ch{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:11px}
.cside .crow{display:flex;justify-content:space-between;font-size:14px;padding:5px 0}
.cside .crow b{font-weight:700}

/* charts */
canvas{display:block;width:100%}
.chart-note{font-size:12px;color:var(--subtle);margin-top:12px;line-height:1.5}
.legend{display:flex;gap:18px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);margin-top:12px}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:7px;vertical-align:-1px}
/* ---- match tab components ---- */
.dscore{display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;padding:6px 0}
.dscore .team{font-size:18px;font-weight:700;flex:1;text-align:center;min-width:80px}
.dscore .sets{font-size:clamp(34px,7vw,46px);font-weight:800;letter-spacing:-.02em}
.dscore .sets .sep{color:var(--muted);margin:0 8px;font-weight:700}
.win-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#0a1400;background:var(--lime);padding:4px 11px;border-radius:999px}
.pwbar{display:flex;height:38px;border-radius:11px;overflow:hidden;font-size:13.5px;font-weight:700;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}
.pwbar .us{background:linear-gradient(180deg,#b6ff45,#8fd400);color:#0a1400;display:flex;align-items:center;padding:0 13px}
.pwbar .them{background:linear-gradient(180deg,#ff7a6a,#e8513f);color:#2a0a08;display:flex;align-items:center;justify-content:flex-end;padding:0 13px}
.setline{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border-soft)}
.setline:last-child{border-bottom:none}
.setline .sn{font-size:12px;font-weight:700;color:var(--muted);width:74px;flex-shrink:0}
.setline .sn b{display:block;color:var(--text);font-size:15px;letter-spacing:-.01em}
.setline .sbar{flex:1;display:flex;height:24px;border-radius:8px;overflow:hidden;font-size:11.5px;font-weight:700}
.setline .sbar .u{background:rgba(167,244,50,.85);color:#0a1400;display:flex;align-items:center;padding:0 8px}
.setline .sbar .t{background:rgba(255,107,90,.85);color:#2a0a08;display:flex;align-items:center;justify-content:flex-end;padding:0 8px}
.setline .sp{font-size:12.5px;color:var(--muted);width:96px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.cmp2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cmp-side{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px 17px}
.cmp-side .ch{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:11px}
.cmp-side .cr{display:flex;justify-content:space-between;align-items:center;font-size:14.5px;padding:5px 0}
.cmp-side .cr b{font-weight:800;font-size:17px;letter-spacing:-.01em}
@media(max-width:560px){.cmp2{grid-template-columns:1fr}.setline .sn{width:60px}.setline .sp{width:74px}}
#tip-pop{position:fixed;pointer-events:none;z-index:50;background:#0d1410;border:1px solid var(--border);
  border-radius:10px;padding:8px 11px;font-size:12.5px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.5);
  opacity:0;transition:opacity .12s;white-space:nowrap}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .ei{font-size:2.4rem;margin-bottom:14px}
#err{color:var(--red);font-size:14px;margin-bottom:14px}
.delbtn{margin-top:24px;font-size:12.5px;font-weight:600;color:var(--subtle);background:none;border:1px solid var(--border-soft);
  padding:9px 15px;border-radius:11px;cursor:pointer;transition:.15s}
.delbtn:hover{color:#ffb0a6;border-color:rgba(255,107,90,.3)}

.fade-up{opacity:0;transform:translateY(10px);animation:fu .5s cubic-bezier(.22,1,.36,1) forwards}
@keyframes fu{to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.fade-up{animation:none;opacity:1;transform:none}.brow .bf{transition:none}}

/* responsive */
@media(max-width:920px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:1fr}
  .compare{grid-template-columns:1fr}
}
@media(max-width:560px){
  /* iPhone: respecteer notch + home-indicator, geen horizontale overflow */
  html,body{overflow-x:hidden}
  .wrap{padding:max(16px,env(safe-area-inset-top)) max(14px,env(safe-area-inset-right)) calc(60px + env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-left))}
  .top{gap:11px;margin-bottom:18px}
  .brand h1{font-size:21px}
  .logo{width:38px;height:38px;border-radius:11px}
  .top-right{width:100%;margin-left:0;justify-content:space-between}
  .exp{font-size:11px;padding:5px 9px}

  .card{padding:18px;border-radius:18px}
  .hero{padding:20px}
  .hero .summary{font-size:17px;line-height:1.45;margin:11px 0 15px}
  .hbadges{gap:7px;margin-bottom:16px}
  .hbadge{font-size:12.5px;padding:6px 11px}
  .next{padding:13px;gap:11px}
  .next .nt{font-size:14px}

  /* metrics: 2 kolommen, compacter */
  .metrics{grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:16px}
  .metric{padding:15px 16px}
  .metric .mv{font-size:25px}
  .metric .mt{font-size:11.5px}

  .tabs{margin-bottom:16px}
  .tab{padding:9px 14px;font-size:13px}

  .grid{gap:12px}
  .ctitle{margin-bottom:14px}

  /* slagmix: donut gecentreerd boven de legenda */
  .donut-wrap{flex-direction:column;align-items:stretch;gap:18px}
  .donut{align-self:center}
  .dlegend{min-width:0}

  /* balken: smaller label, alles blijft passen */
  .brow{grid-template-columns:74px 1fr auto;gap:10px}
  .brow .bl{font-size:13px}
  .brow .bv{min-width:52px;font-size:12.5px}

  .tip{padding:14px;gap:12px}
  .tip .ti{width:36px;height:36px}
  .tip .tt{font-size:14.5px}

  .sgrid{grid-template-columns:1fr 1fr;gap:11px}
  .scard{padding:14px}
  .scard .sv{font-size:23px}

  #tip-pop{display:none}  /* geen hover-tooltip op touch */
}
@media(max-width:380px){
  .metrics{grid-template-columns:1fr 1fr}
  .sgrid{grid-template-columns:1fr}
  .brow{grid-template-columns:66px 1fr auto}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#0a0f08" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9.5" cy="9.5" r="6"/><path d="M13.8 13.8 19 19"/></svg></div>
      <div><h1>AI Coach</h1><div class="sub" id="meta">analyseren…</div></div>
    </div>
    <div class="top-right">
      <span class="exp" id="expBadge" style="display:none"><span class="dot"></span>Experimentele analyse</span>
      <a class="ghost-btn" id="backBtn" href="#">← Terug</a>
      <button class="ghost-btn" id="refreshBtn">Ververs</button>
    </div>
  </div>
  <div id="err"></div>
  <div id="sessionsWrap"></div>
  <div id="root"></div>
</div>
<div id="tip-pop"></div>

<script>
const PIN = new URLSearchParams(location.search).get('pin') || location.pathname.split('/')[3] || '';
const KEY = new URLSearchParams(location.search).get('beta') || '';
let MODEL=null, LIVE=null, SESSIONS=[], SESSIONS_VIEW=[], SELECTED=0, ACTIVE_TAB='overview', MATCHES=[];
// Vind de opgeslagen wedstrijd die qua tijd het dichtst bij deze sessie ligt.
function matchFor(S){
  if(!MATCHES.length) return null;
  const ts=S.savedTs||S.t0||0; let best=null,bd=30*60*1000;
  for(const m of MATCHES){ const d=Math.abs((m.savedAt||0)-ts); if(d<bd){bd=d;best=m;} }
  return best;
}

/* ---------- stroke meta ---------- */
const COL={forehand:'#A7F432',backhand:'#4EA3FF',volley_forehand:'#FFB84D',volley_backhand:'#FF9E6B',service:'#E8C84D',smash:'#FF6B5A',lob:'#A78BFA'};
const ORDER=['forehand','backhand','volley_forehand','volley_backhand','service','smash','lob'];
const NICE={forehand:'Forehand',backhand:'Backhand',volley_forehand:'Volley FH',volley_backhand:'Volley BH',service:'Service',smash:'Smash',lob:'Lob'};
const FH_SIDE={forehand:1,volley_forehand:1}, BH_SIDE={backhand:1,volley_backhand:1};
function lbl(k){ return (MODEL && MODEL.classes[k] && MODEL.classes[k].label) || NICE[k] || k; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------- demo (?demo=1) — verzonnen sessie + wedstrijd om te previewen ---------- */
const DEMO_SESSION={ t0:1782409734000, savedTs:1782409734375, _demo:true,
  totalSwings:289, durationMin:78, swPerMin:3.71, powAvg:7840, powPeak:13420, fatiguePct:-11,
  cls:{forehand:148,backhand:79,volley_forehand:9,volley_backhand:22,smash:18,lob:13,service:0},
  powByCls:{forehand:8600,backhand:6300,volley_forehand:5400,volley_backhand:5100,smash:13420,lob:4200,service:0},
  segments:(function(){const a=[];for(let k=0;k<12;k++)a.push({swings:Math.max(12,24+Math.round(8*Math.sin(k))-(k>8?k:0)),power:Math.max(6800,8200-k*70+Math.round(220*Math.cos(k)))});return a;})() };

  [[0,4],[1,2],[0,3],[1,3],[0,4],[1,1],[0,3],[1,2],[0,2],[1,4],[1,3],[0,2],[1,3],[0,4],[1,4],[1,2],[0,3],[1,3],[0,2],[1,2],[0,4],[0,3],[0,2],[1,2],[0,3],[1,1],[0,4],[0,3]].forEach(([w,n])=>push(w,n));

/* ---------- math + classify (unchanged data logic) ---------- */
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0;}
function pct(n,d){return d?Math.round(100*n/d):0;}
function feats(AX,AY,AZ,GX,GY,GZ,c){
  const n=AX.length,s=Math.max(0,c-12),e=Math.min(n,c+14);
  const pk=a=>{let p=0;for(let i=s;i<e;i++)if(Math.abs(a[i])>Math.abs(p))p=a[i];return p;};
  let dur=0; for(let i=Math.max(0,c-15);i<Math.min(n,c+15);i++){const g=Math.hypot(GX[i],GY[i],GZ[i]);if(g>250)dur++;}
  let amag=0; for(let i=s;i<e;i++){const a=Math.hypot(AX[i],AY[i],AZ[i]);if(a>amag)amag=a;}
  return [pk(GX),pk(GY),pk(GZ),pk(AX),pk(AY),pk(AZ),dur,amag];
}
function classify(f){let best=null,bd=1e18;for(const k in MODEL.classes){
  if(f[0]>150 && BH_SIDE[k]) continue; if(f[0]<-150 && FH_SIDE[k]) continue;
  const c=MODEL.classes[k].centroid;let d=0;for(let i=0;i<8;i++){const z=(f[i]-c[i])/MODEL.scale[i];d+=z*z;}if(d<bd){bd=d;best=k;}}return best;}

async function load(){
  try{
    if(!KEY){ comingSoon(); return; }
    if(!MODEL) MODEL=await (await fetch('/beta/model.json')).json();
    const r=await fetch(`/beta/log/${PIN}?beta=${encodeURIComponent(KEY)}`);
    if(r.status===403){ comingSoon(); return; }
    if(!r.ok){ document.getElementById('err').textContent='Geen toegang.'; return; }
    const j=await r.json();
    const batches=(j.batches||[]).slice().sort((a,b)=>(a.t0||0)-(b.t0||0));
    let AX=[],AY=[],AZ=[],GX=[],GY=[],GZ=[],SW=[],t0=null;
    for(const b of batches){ if(!Array.isArray(b.ax))continue; if(t0===null)t0=b.t0||0;
      const base=AX.length;
      for(let i=0;i<b.ax.length;i++){AX.push(b.ax[i]);AY.push(b.ay[i]);AZ.push(b.az[i]);GX.push((b.gx&&b.gx[i])||0);GY.push((b.gy&&b.gy[i])||0);GZ.push((b.gz&&b.gz[i])||0);}
      for(const m of (b.sw||[]))SW.push(base+m);
    }
    LIVE = SW.length? buildSummary(AX,AY,AZ,GX,GY,GZ,SW,t0) : null;
    const hist=await (await fetch(`/beta/coach-data/${PIN}?beta=${encodeURIComponent(KEY)}`)).json();
    SESSIONS=(hist.sessions||[]).slice().sort((a,b)=>(b.savedTs||b.t0||0)-(a.savedTs||a.t0||0));
    // Wedstrijd-history erbij (voor het matchverloop). Mislukt stil als geen toegang.
    try{ const hr=await fetch(`/history/${PIN}`,{headers:{'Accept':'application/json'}});
      if(hr.ok){ const hd=await hr.json(); MATCHES=Array.isArray(hd)?hd:[]; } }catch(_){}
    // Demo-modus: ?demo=1 toont een verzonnen sessie + wedstrijd om te previewen.
    if(new URLSearchParams(location.search).get('demo')==='1'){ SESSIONS=[DEMO_SESSION,...SESSIONS]; MATCHES=[DEMO_MATCH,...MATCHES]; document.getElementById('expBadge').style.display=''; renderAll(SESSIONS,0); return; }
    const wantT0 = new URLSearchParams(location.search).get('t0');
    // ?ms=<match savedAt> (vanuit history): selecteer de sessie die qua tijd het
    // dichtst bij die wedstrijd ligt.
    const wantMs = new URLSearchParams(location.search).get('ms');
    let preIdx = wantT0 ? Math.max(0, SESSIONS.findIndex(s=>String(s.t0)===String(wantT0))) : 0;
    if(!wantT0 && wantMs){ let bd=Infinity; SESSIONS.forEach((s,i)=>{const d=Math.abs((s.savedTs||s.t0||0)-(+wantMs)); if(d<bd){bd=d;preIdx=i;}}); }
    const liveSaved = LIVE && SESSIONS.some(s=>s.t0===LIVE.t0);
    document.getElementById('expBadge').style.display='';
    if(LIVE && LIVE.totalSwings>=8 && !liveSaved && !wantT0 && !wantMs){ LIVE._live=true; renderAll([LIVE,...SESSIONS],0); }
    else if(SESSIONS.length){ renderAll(SESSIONS, preIdx); }
    else if(LIVE && LIVE.totalSwings>=8){ renderAll([LIVE],0); }
    else { document.getElementById('root').innerHTML=`<div class="card span2 empty"><div class="ei">${svg('racket',34)}</div>Nog geen wedstrijd. Speel een potje met de app actief.</div>`; document.getElementById('expBadge').style.display='none'; }
  }catch(e){ document.getElementById('err').textContent='Fout: '+e.message; }
}

function buildSummary(AX,AY,AZ,GX,GY,GZ,SW,t0){
  const n=AX.length, hz=50, durMin=n/hz/60;
  const sw=SW.map(c=>{const f=feats(AX,AY,AZ,GX,GY,GZ,c);return {pos:c,cls:classify(f),power:f[7]};});
  const N=sw.length;
  const cls={}, powByCls={}; ORDER.forEach(k=>{cls[k]=0;powByCls[k]=[];});
  const allPow=[];
  for(const s of sw){ if(!(s.cls in cls)){cls[s.cls]=0;powByCls[s.cls]=[];} cls[s.cls]++; powByCls[s.cls].push(s.power); allPow.push(s.power); }
  const SEG=12, segs=[];
  for(let k=0;k<SEG;k++){ const lo=n*k/SEG, hi=n*(k+1)/SEG; const ss=sw.filter(s=>s.pos>=lo&&s.pos<hi);
    segs.push({swings:ss.length, power:ss.length?Math.round(avg(ss.map(s=>s.power))):0}); }
  const third=Math.floor(N/3);
  const early=avg(sw.slice(0,third).map(s=>s.power)), late=avg(sw.slice(N-third).map(s=>s.power));
  const fatiguePct=early?Math.round(100*(late-early)/early):0;
  const gaps=[]; for(let i=1;i<SW.length;i++)gaps.push((SW[i]-SW[i-1])/hz); gaps.sort((a,b)=>a-b);
  const medGap=gaps.length?gaps[Math.floor(gaps.length/2)]:0;
  const powAvgByCls={}; ORDER.forEach(k=>powAvgByCls[k]=powByCls[k]&&powByCls[k].length?Math.round(avg(powByCls[k])):0);
  return { t0, durationMin:durMin, totalSwings:N, cls, powByCls:powAvgByCls,
    powAvg:Math.round(avg(allPow)||0), powPeak:Math.round(Math.max(0,...allPow)),
    fatiguePct, segments:segs, medGapS:medGap, swPerMin:durMin?N/durMin:0 };
}

/* ---------- derived insights ---------- */
function insights(S){
  const C=S.cls||{}, N=S.totalSwings||0;
  const fh=C.forehand||0, bh=C.backhand||0, ground=fh+bh;
  const vol=(C.volley_forehand||0)+(C.volley_backhand||0), sm=C.smash||0, lob=C.lob||0, svc=C.service||0;
  const fhp=pct(fh,ground), aggr=pct(vol+sm,N), net=pct(vol,N);
  const segs=(S.segments||[]); const nSeg=Math.max(segs.length,1);
  const segMin=(S.durationMin||0)/nSeg;
  let bi=0; for(let i=0;i<segs.length;i++){ if(segs[i].swings>(segs[bi]?segs[bi].swings:-1))bi=i; }
  let si=0,sp=-1; for(let i=0;i<segs.length;i++){ if(segs[i].power>sp){sp=segs[i].power;si=i;} }
  const half=Math.max(1,Math.floor(nSeg/2));
  const fAct=segs.slice(0,half).reduce((a,s)=>a+s.swings,0);
  const lAct=segs.slice(nSeg-half).reduce((a,s)=>a+s.swings,0);
  const fp=Math.round(avg(segs.slice(0,half).filter(s=>s.power>0).map(s=>s.power)));
  const lp=Math.round(avg(segs.slice(nSeg-half).filter(s=>s.power>0).map(s=>s.power)));
  const tr=i=>{ const a=Math.round(i*segMin), b=Math.round((i+1)*segMin); return a+'–'+b+' min'; };
  const peakRate=segMin>0?Math.round((segs[bi]?segs[bi].swings:0)/segMin):0;
  // strongest / weakest stroke type by power (present only)
  const present=ORDER.filter(k=>(C[k]||0)>0);
  let strongK=null,weakK=null;
  present.forEach(k=>{const p=S.powByCls[k]||0; if(p>0){ if(strongK===null||p>S.powByCls[strongK])strongK=k; if(weakK===null||p<S.powByCls[weakK])weakK=k; }});
  return {C,N,fh,bh,ground,vol,sm,lob,svc,fhp,aggr,net,segs,nSeg,segMin,bi,si,sp,half,fAct,lAct,fp,lp,tr,peakRate,present,strongK,weakK};
}
function careerAvg(){
  const s=SESSIONS; if(!s.length) return null;
  return { sw:Math.round(avg(s.map(x=>x.totalSwings))),
           pow:Math.round(avg(s.map(x=>x.powAvg||0))),
           fhp:Math.round(avg(s.map(x=>{const g=(x.cls.forehand||0)+(x.cls.backhand||0);return g?100*(x.cls.forehand||0)/g:0;}))) };
}

/* ---------- coach intelligence ---------- */
function heroBadges(S,I){
  const b=[];
  if(I.ground>0){
    if(I.fhp>=60) b.push(['arrows','Forehand-dominant']);
    else if(I.fhp<=40) b.push(['arrows','Backhand-sterk']);
    else b.push(['scales','Gebalanceerd']);
  }
  if(Math.abs(S.fatiguePct)<8) b.push(['battery','Stabiele kracht']);
  else if(S.fatiguePct<=-12) b.push(['battery','Kracht zakt']);
  else if(S.fatiguePct>=8) b.push(['chartUp','Eindigt sterk']);
  if(I.fhp>=62 && I.ground>0) b.push(['target','Focus: backhand']);
  else if(I.net<7) b.push(['net','Focus: netspel']);
  return b.slice(0,3);
}
function heroSummary(S,I){
  const sw=`<b>${formatNumber(I.N)} slagen</b> in ${formatMinutes(S.durationMin)} min`;
  if(I.ground===0) return `Sterke sessie met ${sw}. Blijf je slagen variëren en houd je tempo hoog.`;
  if(I.fhp>=60){
    const power = S.fatiguePct<=-12 ? 'maar je kracht zakte tegen het eind' : 'met stabiele kracht';
    return `Je speelde een <b>forehand-zware sessie</b> (${formatPercent(I.fhp)}%) ${power}. Je backhand bleef achter in volume en kracht — daar ligt je grootste winst.`;
  }
  if(I.fhp<=40) return `Backhand-gedreven sessie (${formatPercent(100-I.fhp)}%) met ${sw}. Je backhand draagt het spel — zoek je forehand vaker op als wapen.`;
  return `Mooi gebalanceerde sessie: forehand en backhand in evenwicht over ${sw}. Lastig te bespelen — houd dit vast en bouw aan je netspel.`;
}
function nextDrill(tips){
  const hi=tips.find(t=>t.prio==='high')||tips.find(t=>t.prio==='med')||tips[0];
  return hi?hi.action:'Blijf gevarieerd spelen en houd je tempo hoog.';
}
function coachTips(S,I,A){
  const t=[]; const C=S.cls;
  // backhand volume
  if(I.fhp>=62 && I.ground>0)
    t.push({prio:'high',icon:'arrows',color:'var(--blue)',title:'Backhand heeft volume nodig',
      insight:`Slechts ${formatPercent(100-I.fhp)}% van je slagen kwam van je backhand-kant.`,
      action:'Drill: 3 × 8 min cross-court backhands vóór je gaat spelen.'});
  else if(I.fhp<=38 && I.ground>0)
    t.push({prio:'med',icon:'arrows',color:'var(--lime)',title:'Benut je forehand',
      insight:`Je leunde sterk op je backhand (${formatPercent(100-I.fhp)}%).`,
      action:'Loop om de bal heen en sla meer forehands — vaak je hardste slag.'});
  // backhand power
  if(S.powByCls.backhand&&S.powByCls.forehand&&S.powByCls.backhand<S.powByCls.forehand*0.8)
    t.push({prio:'med',icon:'power',color:'var(--orange)',title:'Backhand-kracht omhoog',
      insight:`Je backhand komt ~${formatPercent(100-100*S.powByCls.backhand/S.powByCls.forehand)}% zachter uit dan je forehand.`,
      action:'Train rotatie en gewichtsoverdracht: 2 × 10 backhands met volledige uitzwaai.'});
  // net play
  if(I.net>=18)
    t.push({prio:'low',icon:'net',color:'var(--lime)',title:'Sterk aan het net',
      insight:`${formatPercent(I.net)}% van je slagen waren volleys — agressief spel.`,
      action:'Blijf naar voren spelen; sluit punten af bij het net.'});
  else if(I.net<7 && I.ground>0)
    t.push({prio:'med',icon:'net',color:'var(--blue)',title:'Vaker naar het net',
      insight:`Weinig volleys (${formatPercent(I.net)}%). Veel punten win je juist aan het net.`,
      action:'Drill: na elke diepe bal direct doorlopen en afronden met een volley.'});
  // smash weapon
  if((C.smash||0)>0 && (S.powByCls.smash||0)>=S.powAvg)
    t.push({prio:'med',icon:'bolt',color:'var(--red)',title:'Smash is een wapen',
      insight:`Je smash-kracht is een van je sterkste categorieën (${formatPower(S.powByCls.smash||S.powPeak)}).`,
      action:'Stap in na elke hoge bal en maak bovenlangs af.'});
  // condition
  if(S.fatiguePct<=-12)
    t.push({prio:'high',icon:'battery',color:'var(--red)',title:'Conditie laat los',
      insight:`Je kracht zakte ${formatPercent(Math.abs(S.fatiguePct))}% in de tweede helft.`,
      action:'Bouw uithoudingsvermogen: intervaltraining of langere oefenpotjes.'});
  else if(S.fatiguePct>=8)
    t.push({prio:'low',icon:'chartUp',color:'var(--lime)',title:'Je eindigt sterk',
      insight:`Je kracht steeg ${formatPercent(S.fatiguePct)}% naar het eind — top conditie.`,
      action:'Houd dit vast; je bent gevaarlijk in lange potjes.'});
  // balance positive
  if(I.fhp>40&&I.fhp<60&&I.ground>0)
    t.push({prio:'low',icon:'scales',color:'var(--lime)',title:'Goede FH/BH-balans',
      insight:'Forehand en backhand in evenwicht — lastig te bespelen.',
      action:'Houd deze balans en varieer je richting om druk te zetten.'});
  if(!t.length)
    t.push({prio:'low',icon:'check',color:'var(--lime)',title:'Sterke sessie',
      insight:'Geen duidelijke zwakke plekken in deze data.',
      action:'Blijf gevarieerd spelen en houd je tempo hoog.'});
  const rank={high:0,med:1,low:2};
  return t.sort((a,b)=>rank[a.prio]-rank[b.prio]);
}

  wrap.innerHTML = list.length>1 ?
    `<div class="sessions">${list.map((s,i)=>`<div class="chip ${i===sel?'active':''} ${s._live?'live':''}" data-i="${i}">

  const I=insights(S), A=careerAvg(), TIPS=coachTips(S,I,A);

  const badges=heroBadges(S,I);

  const hasMatch=!!matchFor(S);

  document.getElementById('root').innerHTML=`

      <div class="next"><div class="ni" style="color:var(--lime)">${svg('target',19)}</div><div><div class="nl">Volgende drill</div><div class="nt">${nextDrill(TIPS)}</div></div></div>
    </div>

      ${metric(svg('racket'),'var(--lime)',formatNumber(S.totalSwings),'Slagen', A?cmp(S.totalSwings,A.sw,'vs gem. potje'):'')}

/* Afgeleide wedstrijd-inzichten uit de puntreeks. */
function matchExtras(m){
  const seq=Array.isArray(m.pointSeq)?m.pointSeq.map(p=>p===1?1:0):[];
  let runU=0,runT=0,curU=0,curT=0, diff=0,maxLead=0,minLead=0;
  for(const p of seq){
    if(p===0){curU++;curT=0;} else {curT++;curU=0;}
    if(curU>runU)runU=curU; if(curT>runT)runT=curT;
    diff+=p===0?1:-1; if(diff>maxLead)maxLead=diff; if(diff<minLead)minLead=diff;
  }
  const half=Math.floor(seq.length/2);
  const fh=[0,0],sh=[0,0];
  seq.forEach((p,i)=>{(i<half?fh:sh)[p===0?0:1]++;});
  return {runU,runT,maxLead,minLead,fh,sh,len:seq.length};
}

function drawMatchFlow(id,m){
  const seq=Array.isArray(m.pointSeq)?m.pointSeq.map(p=>p===1?1:0):[]; if(seq.length<2)return;
  const o=setup(id,150); if(!o)return; const {ctx,W,H}=o;
  const padX=8,padY=14,plotW=W-2*padX,plotH=H-2*padY,midY=padY+plotH/2;
  let diff=0; const pts=[0]; seq.forEach(p=>{diff+=p===0?1:-1;pts.push(diff);});
  const maxA=Math.max(1,...pts.map(p=>Math.abs(p)));
  const xAt=i=>padX+(i/(pts.length-1))*plotW, yAt=v=>midY-(v/maxA)*(plotH/2);
  const lime=getComputedStyle(document.documentElement).getPropertyValue('--lime').trim()||'#A7F432';
  const red=getComputedStyle(document.documentElement).getPropertyValue('--red').trim()||'#FF6B5A';
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(padX,midY);ctx.lineTo(W-padX,midY);ctx.stroke();ctx.setLineDash([]);
  // set-grenzen
  if(Array.isArray(m.setStats)&&m.setStats.length>1){ let acc=0; ctx.strokeStyle='rgba(167,244,50,.4)';
    for(let i=0;i<m.setStats.length-1;i++){acc+=(m.setStats[i].pointsUs||0)+(m.setStats[i].pointsThem||0);const x=xAt(acc);
      ctx.setLineDash([2,3]);ctx.beginPath();ctx.moveTo(x,padY);ctx.lineTo(x,padY+plotH);ctx.stroke();ctx.setLineDash([]);}}
  ctx.fillStyle='rgba(167,244,50,.08)';ctx.beginPath();ctx.moveTo(xAt(0),midY);pts.forEach((v,i)=>ctx.lineTo(xAt(i),yAt(v)));ctx.lineTo(xAt(pts.length-1),midY);ctx.closePath();ctx.fill();
  ctx.strokeStyle=lime;ctx.lineWidth=2;ctx.lineJoin='round';ctx.beginPath();pts.forEach((v,i)=>i?ctx.lineTo(xAt(i),yAt(v)):ctx.moveTo(xAt(i),yAt(v)));ctx.stroke();
  const lv=pts[pts.length-1];ctx.fillStyle=lv>=0?lime:red;ctx.beginPath();ctx.arc(xAt(pts.length-1),yAt(lv),3.5,0,7);ctx.fill();
}
function drawWhoBetter(id,m){
  const seq=Array.isArray(m.pointSeq)?m.pointSeq.map(p=>p===1?1:0):[]; if(seq.length<4)return;
  const o=setup(id,120); if(!o)return; const {ctx,W,H}=o;
  const Wn=Math.min(15,Math.max(5,Math.round(seq.length/12))),us=[],them=[];
  for(let i=0;i<seq.length;i++){const a=Math.max(0,i-Wn+1);let u=0,th=0;for(let j=a;j<=i;j++)seq[j]===0?u++:th++;us.push(u);them.push(th);}
  const padX=8,padY=10,iW=W-2*padX,iH=H-2*padY;
  const xAt=i=>padX+(i/(seq.length-1))*iW, yAt=v=>padY+iH-(v/Wn)*iH;
  const lime=getComputedStyle(document.documentElement).getPropertyValue('--lime').trim()||'#A7F432';
  const red=getComputedStyle(document.documentElement).getPropertyValue('--red').trim()||'#FF6B5A';
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(padX,yAt(Wn/2));ctx.lineTo(W-padX,yAt(Wn/2));ctx.stroke();ctx.setLineDash([]);
  const line=(arr,c)=>{ctx.strokeStyle=c;ctx.lineWidth=2;ctx.lineJoin='round';ctx.beginPath();arr.forEach((v,i)=>i?ctx.lineTo(xAt(i),yAt(v)):ctx.moveTo(xAt(i),yAt(v)));ctx.stroke();};
  line(them,red);line(us,lime);
}

function tabCondition(S,I){
  const fc=S.fatiguePct, col=fc<=-12?'var(--red)':fc>=8?'var(--lime)':'var(--text)';
  const verdict=fc<=-12?'Je kracht liet los in de tweede helft.':fc>=8?'Je werd sterker naar het eind — sterke conditie.':'Je kracht bleef stabiel — goede conditie.';
  return `<div class="grid">
    <div class="card fade-up"><div class="ctitle"><span class="ci">${svg('battery',15)}</span>Verval</div>
      <div class="metric" style="padding:0"><div class="mv" style="color:${col}">${fc>0?'+':''}${formatPercent(fc)}<small>%</small></div>
      <div class="mt">${verdict}</div></div></div>
    <div class="card fade-up"><div class="ctitle"><span class="ci">${svg('bolt',15)}</span>Piek-werkdruk</div>
      <div class="metric" style="padding:0"><div class="mv">${formatNumber(I.peakRate)}<small>/min</small></div>
      <div class="mt">drukste periode${I.segs.length>1?' · '+I.tr(I.bi):''}</div></div></div>
    <div class="card span2 fade-up">
      <div class="ctitle"><span class="ci">${svg('scales',15)}</span>Eerste helft vs tweede helft</div>
      <div class="compare">
        <div class="cside"><div class="ch">Eerste helft</div>
          <div class="crow"><span class="muted">Slagen</span><b>${formatNumber(I.fAct)}</b></div>
          <div class="crow"><span class="muted">Gem. kracht</span><b>${I.fp?formatPower(I.fp):'–'}</b></div></div>
        <div class="cside"><div class="ch">Tweede helft</div>
          <div class="crow"><span class="muted">Slagen</span><b>${formatNumber(I.lAct)}</b></div>
          <div class="crow"><span class="muted">Gem. kracht</span><b>${I.lp?formatPower(I.lp):'–'}</b></div></div>
      </div>
    </div>
    <div class="card span2 fade-up">
      <div class="ctitle"><span class="ci">${svg('chartUp',15)}</span>Tempo & kracht over tijd</div>
      <canvas id="cdProgress" height="240"></canvas>
      <div class="legend"><span><i style="background:var(--lime)"></i>slagen per periode</span><span><i style="background:var(--orange)"></i>gem. slagkracht</span></div>
    </div>
  </div>`;
}

function tabCareer(){
  const saved=SESSIONS;
  if(!saved.length) return `<div class="card span2 empty"><div class="ei">${svg('inbox',34)}</div>Nog geen opgeslagen potjes.</div>`;
  const totalSw=saved.reduce((s,x)=>s+x.totalSwings,0);
  const totalMin=saved.reduce((s,x)=>s+(x.durationMin||0),0);
  const maxSw=Math.max(...saved.map(s=>s.totalSwings));
  const hardest=Math.max(...saved.map(s=>s.powPeak||0));
  const longest=Math.max(...saved.map(s=>s.durationMin||0));
  const fhpAll=Math.round(avg(saved.map(s=>{const g=(s.cls.forehand||0)+(s.cls.backhand||0);return g?100*(s.cls.forehand||0)/g:0;})));
  const chron=saved.slice().sort((a,b)=>(a.t0||0)-(b.t0||0));
  const scard=(l,v,s)=>`<div class="scard"><div class="sl">${l}</div><div class="sv">${v}</div>${s?`<div class="ss">${s}</div>`:''}</div>`;
  let html=`<div class="card span2 fade-up">
    <div class="ctitle"><span class="ci">${svg('trophy',15)}</span>Loopbaan · ${saved.length} ${saved.length===1?'potje':'potjes'}</div>
    <div class="sgrid">
      ${scard('Totaal slagen',formatNumber(totalSw),'ooit geteld')}
      ${scard('Totale speeltijd',`${formatMinutes(totalMin)}<small> min</small>`,'')}
      ${scard('Beste potje',formatNumber(maxSw),'meeste slagen')}
      ${scard('Hardste slag',formatPower(hardest),'aller tijden')}
      ${scard('Langste sessie',`${formatMinutes(longest)}<small> min</small>`,'')}
      ${scard('Forehand-aandeel',`${formatPercent(fhpAll)}<small>%</small>`,'gemiddeld')}
    </div></div>`;
  if(chron.length>=2){
    html+=`<div class="card span2 fade-up"><div class="ctitle"><span class="ci">${svg('chartUp',15)}</span>Voortgang · ${chron.length} potjes</div>
      <canvas id="trSwings" height="120"></canvas><div class="chart-note" style="margin:8px 0 18px">Slagen per potje</div>
      <canvas id="trPower" height="120"></canvas><div class="chart-note" style="margin:8px 0 18px">Gem. slagkracht per potje</div>
      <canvas id="trBalance" height="120"></canvas><div class="chart-note" style="margin-top:8px">Forehand-aandeel (%)</div></div>`;
  }
  return `<div class="grid">${html}</div>`;
}

/* ---------- canvas helpers ---------- */
function setup(id,cssH){ const cv=document.getElementById(id); if(!cv)return null;
  const dpr=Math.min(window.devicePixelRatio||1,2); const w=cv.clientWidth; const h=cssH||cv.clientHeight||220;
  cv.width=w*dpr; cv.height=h*dpr; cv.style.height=h+'px'; const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h); return {ctx,W:w,H:h,cv}; }

function drawDonut(S,I){
  const cv=document.getElementById('donutC'); if(!cv)return; const ctx=cv.getContext('2d');
  const w=cv.width,h=cv.height,cx=w/2,cy=h/2,r=w*0.4,th=w*0.13;
  ctx.clearRect(0,0,w,h);
  const present=I.present, tot=present.reduce((a,k)=>a+(S.cls[k]||0),0)||1;
  let a0=-Math.PI/2;
  present.forEach(k=>{ const frac=(S.cls[k]||0)/tot; const a1=a0+frac*Math.PI*2;
    ctx.beginPath(); ctx.arc(cx,cy,r,a0+0.02,a1-0.02); ctx.strokeStyle=COL[k]; ctx.lineWidth=th; ctx.lineCap='round'; ctx.stroke();
    a0=a1; });
}

function drawProgress(id,S,only){
  const segs=S.segments||[]; if(!segs.length) return;
  const o=setup(id,240); if(!o)return; const {ctx,W,H}=o;
  const padL=44,padR=52,padT=18,padB=30, plotW=W-padL-padR, plotH=H-padT-padB;
  const maxS=Math.max(...segs.map(s=>s.swings),1);
  const powVals=segs.filter(s=>s.power>0).map(s=>s.power);
  const maxP=Math.max(...powVals,1), minP=Math.min(...powVals,maxP), span=Math.max(maxP-minP,1);
  // subtle horizontal grid
  ctx.strokeStyle='rgba(255,255,255,.05)'; ctx.lineWidth=1;
  for(let g=0;g<=3;g++){ const y=padT+plotH*g/3; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(padL+plotW,y); ctx.stroke(); }
  const n=segs.length, bw=plotW/n;
  if(only!=='power'){ // bars: strokes
    segs.forEach((s,i)=>{ const bh=(s.swings/maxS)*plotH; const x=padL+i*bw+bw*0.2;
      ctx.fillStyle='rgba(167,244,50,.85)'; rrect(ctx,x,padT+plotH-bh,bw*0.6,bh,3); ctx.fill(); });
  }
  // power line
  const pts=segs.map((s,i)=>s.power>0?{x:padL+i*bw+bw/2,y:padT+(1-(s.power-minP)/span)*plotH,v:s.power}:null).filter(Boolean);
  if(pts.length>1){
    ctx.strokeStyle=only==='power'?'#FFB84D':'rgba(255,184,77,.9)'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.beginPath();
    pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); ctx.stroke();
    ctx.fillStyle='#FFB84D'; pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,3,0,7);ctx.fill();});
  }
  // axes labels
  ctx.font='12px Inter,system-ui'; ctx.fillStyle='#5F695E';
  if(only!=='power'){ ctx.textAlign='right'; ctx.fillStyle='rgba(167,244,50,.8)'; ctx.fillText(maxS,padL-7,padT+5); ctx.fillText('0',padL-7,padT+plotH); }
  ctx.textAlign='left'; ctx.fillStyle='rgba(255,184,77,.85)'; ctx.fillText(formatPower(maxP),W-padR+7,padT+5); ctx.fillText(formatPower(minP),W-padR+7,padT+plotH);
  const dur=S.durationMin||0; ctx.fillStyle='#5F695E';
  ctx.textAlign='left'; ctx.fillText('0 min',padL,H-9);
  ctx.textAlign='center'; ctx.fillText(formatMinutes(dur/2)+' min',padL+plotW/2,H-9);
  ctx.textAlign='right'; ctx.fillText(formatMinutes(dur)+' min',padL+plotW,H-9);
  attachTip(o.cv,segs.map((s,i)=>({x:padL+i*bw+bw/2,seg:s,i})),S);
}

function attachTip(cv,pts,S){
  const pop=document.getElementById('tip-pop');
  cv.onmousemove=e=>{
    const rect=cv.getBoundingClientRect(); const mx=e.clientX-rect.left;
    let best=null,bd=1e9; pts.forEach(p=>{const d=Math.abs(p.x-mx);if(d<bd){bd=d;best=p;}});
    if(best&&bd<28){ pop.innerHTML=`<span style="color:var(--lime)">${formatNumber(best.seg.swings)} slagen</span> · <span style="color:var(--orange)">${formatPower(best.seg.power)} kracht</span>`;
      pop.style.left=(e.clientX+12)+'px'; pop.style.top=(e.clientY-10)+'px'; pop.style.opacity='1'; }
    else pop.style.opacity='0';
  };
  cv.onmouseleave=()=>pop.style.opacity='0';
}

function drawCareerTrends(){
  const chron=SESSIONS.slice().sort((a,b)=>(a.t0||0)-(b.t0||0));
  if(chron.length<2)return;
  trend('trSwings',chron.map(s=>s.totalSwings),'#A7F432');
  trend('trPower',chron.map(s=>s.powAvg||0),'#FFB84D');
  trend('trBalance',chron.map(s=>{const g=(s.cls.forehand||0)+(s.cls.backhand||0);return g?Math.round(100*(s.cls.forehand||0)/g):0;}),'#4EA3FF',100);
}
function trend(id,data,col,fixedMax){
  const o=setup(id,120); if(!o)return; const {ctx,W,H}=o; if(data.length<2)return;
  const max=fixedMax||Math.max(...data,1),padT=18,padB=22,n=data.length;
  ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.beginPath(); ctx.moveTo(0,H-padB); ctx.lineTo(W,H-padB); ctx.stroke();
  ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.beginPath();
  data.forEach((v,i)=>{const x=n>1?(i/(n-1))*(W-10)+5:W/2,y=padT+(1-v/max)*(H-padT-padB);i?ctx.lineTo(x,y):ctx.moveTo(x,y);}); ctx.stroke();
  data.forEach((v,i)=>{const x=n>1?(i/(n-1))*(W-10)+5:W/2,y=padT+(1-v/max)*(H-padT-padB);
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,3.5,0,7);ctx.fill();
    ctx.fillStyle='#C7CFC4';ctx.font='600 12px Inter,system-ui';ctx.textAlign='center';ctx.fillText(formatNumber(v),x,y-9);});
}
function rrect(ctx,x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

/* ---------- interactions ---------- */
// Terug-knop: ga terug in de history als we van dezelfde site kwamen, anders
// naar de wedstrijdhistorie van deze PIN.
(function(){ const b=document.getElementById('backBtn'); if(!b)return;
  b.href = PIN ? ('/history/'+PIN) : '/history';
  b.addEventListener('click', ev=>{
    if(document.referrer && document.referrer.indexOf(location.origin)===0){ ev.preventDefault(); history.back(); }
  });
})();
document.addEventListener('click', async e=>{
  const chip=e.target.closest('.chip');
  if(chip){ renderAll(SESSIONS_VIEW, +chip.dataset.i); return; }
  const tab=e.target.closest('.tab');
  if(tab){ ACTIVE_TAB=tab.dataset.tab; renderSession(SESSIONS_VIEW[SELECTED]); return; }
  if(e.target.id==='refreshBtn') return load();
  if(e.target.id==='delBtn'){
    const S=SESSIONS_VIEW[SELECTED];
    if(!confirm('Deze sessie verwijderen?')) return;
    await fetch(`/beta/coach-data/${PIN}?beta=${encodeURIComponent(KEY)}&t0=${S.t0}`,{method:'DELETE'});
    return load();
  }
  if(e.target.id==='saveBtn' && LIVE){
    e.target.textContent='Bewaren…'; e.target.disabled=true;
    try{ const r=await fetch(`/beta/coach-data/${PIN}?beta=${encodeURIComponent(KEY)}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...LIVE,_live:undefined,savedTs:Date.now()})});
      await r.json(); e.target.textContent='Bewaard ✓'; setTimeout(load,800);
    }catch(_){ e.target.textContent='Mislukt'; e.target.disabled=false; }
  }
});
window.addEventListener('resize',()=>{ if(SESSIONS_VIEW[SELECTED]) renderTab(SESSIONS_VIEW[SELECTED]); });
load();
</script>
