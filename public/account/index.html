<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — RallyPoint</title>
<link rel="icon" href="/img/logo.png">
<script src="/js/theme-init.js"></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c0f12">
<link rel="apple-touch-icon" href="/img/logo.png">
<link rel="stylesheet" href="/account/style.css">
<script src="/account/i18n.js"></script>
<!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7J6B72EYMQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7J6B72EYMQ');
  </script>
</head>
<body>
<div class="wrap-wide">
  <div class="brand">
    <a href="/?stay=1" style="text-decoration:none;color:inherit;display:inline-block">
      <span class="brand-logo"></span>
      <div class="brand-name">Rally<span>Point</span></div>
    </a>
  </div>

  <nav class="subnav">
    <a href="/account" class="active" data-i18n="nav.dashboard">Dashboard</a>
    <a href="/account/profile" data-i18n="nav.profile">Profiel</a>
    <a href="/account/settings" data-i18n="nav.settings">Instellingen</a>
    <a href="/?stay=1" style="margin-left:auto" data-i18n="nav.home">Home</a>
  </nav>

  <div id="bannerSlot"></div>

  <div id="skeleton">
    <div class="card">
      <div class="section">
        <h2><span class="skeleton skeleton-text sm" style="width:80px;height:12px"></span></h2>
        <div class="row"><span class="skeleton skeleton-text sm" style="width:60px"></span><span class="skeleton skeleton-text" style="width:200px;height:14px"></span></div>
        <div class="row"><span class="skeleton skeleton-text sm" style="width:50px"></span><span class="skeleton skeleton-pill" style="width:110px"></span></div>
      </div>
    </div>
    <div class="card">
      <div class="section">
        <h2><span class="skeleton skeleton-text sm" style="width:60px;height:12px"></span></h2>
        <div class="stats-grid">
          <div class="skeleton skeleton-tile"></div>
          <div class="skeleton skeleton-tile"></div>
          <div class="skeleton skeleton-tile"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="content" class="hidden">
    <div class="card">
      <div class="section">
        <h2 data-i18n="dash.account">Account</h2>
        <div class="row"><span class="row-label" data-i18n="common.email">E-mail</span><span class="row-value" id="userEmail"></span></div>
        <div class="row"><span class="row-label" data-i18n="dash.statusLabel">Status</span><span class="row-value" id="userVerified"></span></div>
      </div>
    </div>

    <div class="card" id="quickStatsCard" style="display:none">
      <div class="section">
        <h2 data-i18n="dash.quick">Snel overzicht</h2>
        <div class="stats-grid" id="quickStats"></div>
      </div>
    </div>

    <div class="card">
      <div class="section">
        <h2 data-i18n="dash.watches">Watches</h2>
        <ul class="pin-list" id="pinList"></ul>
        <div class="pin-input-row" style="margin-top:.6rem">
          <input class="pin" type="text" id="pinInput" placeholder="PIN" maxlength="4" inputmode="numeric" pattern="[0-9]{4}">
          <input type="text" id="codeInput" placeholder="Code" maxlength="6" pattern="[0-9a-fA-F]{6}" style="letter-spacing:.25em;text-transform:lowercase;text-align:center">
          <button class="btn" id="couplePinBtn" data-i18n="dash.coupleBtn">Koppel</button>
        </div>
        <div class="info" style="margin-top:.8rem;margin-bottom:0" data-i18n="dash.pinInfo">PIN en Code staan bovenaan het Setup-menu van je RallyPoint-app. Open de app eerst — anders kan de server de code niet verifiëren.</div>
        <div class="err" id="pinErr"></div>
      </div>
    </div>

    <div class="card">
      <div class="section">
        <h2 data-i18n="dash.session">Sessie</h2>
        <button class="btn secondary" id="logoutBtn" data-i18n="dash.logout">Uitloggen</button>
      </div>
    </div>
  </div>
</div>

<footer class="app-footer">
  <a href="/about">Over</a> · <a href="/privacy">Privacy</a> · <a href="/terms">Voorwaarden</a>
</footer>

<script src="/account/toast.js"></script>
<script>
  const bannerSlot = document.getElementById('bannerSlot');
  const content = document.getElementById('content');
  const userEmail = document.getElementById('userEmail');
  const userVerified = document.getElementById('userVerified');
  const pinList = document.getElementById('pinList');
  const pinInput = document.getElementById('pinInput');
  const pinErr = document.getElementById('pinErr');

  const q = new URLSearchParams(location.search);
  // Post-actie meldingen als toast — clean URL na 1× tonen
  function flashFromQuery() {
    const msgs = {
      verified_1: [RP.t('dash.verifiedOk'), 'success'],
      verified_0: [RP.t('dash.verifiedBad'), 'err'],
      just_signed_up: ['Account aangemaakt. Check je inbox voor de bevestigingsmail.', 'info'],
      onboarded: ['Je bent klaar — veel plezier!', 'success'],
      email_changed: ['E-mailadres bijgewerkt.', 'success'],
      pw_changed: ['Wachtwoord gewijzigd.', 'success'],
      just_coupled: ['Watch gekoppeld aan je account!', 'success'],
    };
    const fired = [];
    if (q.get('verified') === '1') fired.push('verified_1');
    if (q.get('verified') === '0') fired.push('verified_0');
    if (q.get('just_signed_up') === '1') fired.push('just_signed_up');
    if (q.get('onboarded') === '1') fired.push('onboarded');
    if (q.get('email_changed') === '1') fired.push('email_changed');
    if (q.get('pw_changed') === '1') fired.push('pw_changed');
    if (q.get('just_coupled') === '1') fired.push('just_coupled');
    fired.forEach((k, i) => setTimeout(() => toast(msgs[k][0], msgs[k][1]), i * 150));
    if (fired.length) {
      history.replaceState({}, '', location.pathname);
    }
  }
  setTimeout(flashFromQuery, 50);

  const skeleton = document.getElementById('skeleton');
  const quickStatsCard = document.getElementById('quickStatsCard');
  const quickStats = document.getElementById('quickStats');

  function fmtDuration(min) {
    if (!min) return '0 min';
    const h = Math.floor(min / 60), m = Math.round(min % 60);
    return h > 0 ? `${h}u ${m}m` : `${m} min`;
  }

  async function load() {
    let me, profile;
    try {
      const r = await fetch('/api/auth/me');
      if (r.status === 401) { window.location = '/account/login'; return; }
      me = await r.json();
      if (me.lang) { RP.setLang(me.lang, true); }   // sync taal met server-voorkeur
      // Profile is needed for stats — fetch in parallel ideally but minimal pages here
      const p = await fetch('/api/account/profile');
      if (p.ok) profile = await p.json();
    } catch (e) {
      bannerSlot.innerHTML = '<div class="banner err">' + RP.t('dash.loadFail') + '</div>';
      return;
    }
    skeleton.classList.add('hidden');
    content.classList.remove('hidden');
    userEmail.textContent = me.email;
    userVerified.innerHTML = me.email_verified
      ? '<span class="status-pill active">' + RP.t('dash.verified') + '</span>'
      : '<span class="status-pill expired">' + RP.t('dash.unverified') + '</span>';

    // Quick stats — alleen tonen als er minstens 1 match is
    const s = (profile && profile.stats) || {};
    if (s.total_matches > 0) {
      quickStatsCard.style.display = '';
      quickStats.innerHTML = `
        <div class="stat-tile"><div class="num">${s.total_matches}</div><div class="lbl">${RP.t('dash.statMatches')}</div></div>
        <div class="stat-tile"><div class="num accent">${s.win_rate != null ? s.win_rate + '%' : '—'}</div><div class="lbl">${RP.t('dash.statWinRate')}</div></div>
        <div class="stat-tile"><div class="num">${fmtDuration(s.total_duration_min || 0)}</div><div class="lbl">${RP.t('dash.statPlaytime')}</div></div>
      `;
    }

    pinList.innerHTML = '';
    if (!me.pins || !me.pins.length) {
      pinList.innerHTML = `
        <li style="justify-content:center;padding:1.6rem 1rem;text-align:center;flex-direction:column;background:transparent;border-style:dashed">
          <div style="font-size:2rem;line-height:1;margin-bottom:.6rem">⌚</div>
          <div style="font-family:Inter;font-size:.95rem;letter-spacing:0;color:var(--ink);font-weight:500">${RP.t('dash.noWatches')}</div>
          <div style="font-family:Inter;font-size:.8rem;letter-spacing:0;color:var(--muted);margin-top:.35rem;line-height:1.5">${RP.t('dash.noWatchesHint')}</div>
        </li>`;
    } else {
      for (const pin of me.pins) {
        const li = document.createElement('li');
        li.innerHTML = `<span class="pin-val">${pin}</span><button data-pin="${pin}">${RP.t('dash.unpair')}</button>`;
        pinList.appendChild(li);
      }
    }
  }

  document.getElementById('couplePinBtn').addEventListener('click', async () => {
    pinErr.textContent = '';
    const pin = pinInput.value.trim();
    const code = (document.getElementById('codeInput').value || '').trim().toLowerCase();
    if (!/^\d{4}$/.test(pin)) { pinErr.textContent = RP.t('dash.pinDigits'); return; }
    if (!/^[0-9a-f]{6}$/.test(code)) { pinErr.textContent = RP.t('dash.codeChars'); return; }
    const r = await fetch('/api/account/couple-pin', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ pin, code })
    });
    const data = await r.json();
    if (!r.ok) {
      pinErr.textContent =
        data.error === 'pin_taken' ? RP.t('dash.errTaken') :
        data.error === 'bad_code' ? RP.t('dash.errCode') :
        data.error === 'watch_not_active' ? RP.t('dash.errNotActive') :
        RP.t('dash.errCoupleFail');
      return;
    }
    pinInput.value = ''; document.getElementById('codeInput').value = '';
    toast(RP.t('dash.coupled'), 'success');
    load();
  });

  pinList.addEventListener('click', async e => {
    const btn = e.target.closest('button[data-pin]');
    if (!btn) return;
    const ok = await confirmModal({
      title: RP.t('dash.unpairTitle'),
      body: RP.t('dash.unpairBody', { pin: btn.dataset.pin }),
      confirmLabel: RP.t('dash.unpair'),
      danger: true,
    });
    if (!ok) return;
    btnLoading(btn, true);
    await fetch('/api/account/pins/' + btn.dataset.pin, { method: 'DELETE' });
    toast(RP.t('dash.unpaired'), 'success');
    load();
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location = '/account/login';
  });

  load();
</script>
</body>
</html>
