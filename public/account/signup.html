<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account aanmaken — RallyPoint</title>
<link rel="stylesheet" href="/account/style.css">
</head>
<body>
<div class="wrap">
  <div class="logo">Rally<span>Point</span></div>
  <div class="tagline">Account aanmaken</div>
  <div class="card">
    <h1>Maak je account aan</h1>
    <div class="sub">Eén account voor al je watches en license-info.</div>
    <form id="signupForm">
      <label for="email">E-mailadres</label>
      <input type="email" id="email" required autocomplete="email">
      <label for="password">Wachtwoord (min 8 tekens)</label>
      <input type="password" id="password" required autocomplete="new-password" minlength="8">
      <button class="btn" type="submit">Account aanmaken</button>
      <div class="err" id="err"></div>
    </form>
    <div class="link-row">
      Heb je al een account? <a href="/account/login">Inloggen</a>
    </div>
  </div>
</div>
<script>
  const next = new URLSearchParams(location.search).get('next') || '/account';
  const form = document.getElementById('signupForm');
  const errEl = document.getElementById('err');
  form.addEventListener('submit', async e => {
    e.preventDefault();
    errEl.textContent = '';
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = form.querySelector('button');
    btn.disabled = true;
    try {
      const r = await fetch('/api/auth/signup', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await r.json();
      if (!r.ok) {
        errEl.textContent =
          data.error === 'email_taken' ? 'Dit e-mailadres is al in gebruik.' :
          data.error === 'bad_email' ? 'Ongeldig e-mailadres.' :
          data.error === 'bad_password' ? 'Wachtwoord moet minstens 8 tekens zijn.' :
          'Aanmaken mislukt.';
        btn.disabled = false; return;
      }
      window.location = next + (next.includes('?') ? '&' : '?') + 'just_signed_up=1';
    } catch (e) {
      errEl.textContent = 'Netwerkfout.';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
