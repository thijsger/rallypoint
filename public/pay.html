<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RallyPoint Pro</title>
<link rel="stylesheet" href="/account/style.css">
<style>
  .pin-card {
    background: var(--panel); border: 1px solid var(--court-line);
    border-radius: 16px; padding: 1rem 1.4rem; margin: 0 auto 1.6rem;
    display: inline-flex; align-items: baseline; gap: .9rem;
  }
  .pin-card .lbl { color: var(--muted); font-size: .7rem; letter-spacing: .2em; text-transform: uppercase; }
  .pin-card .val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.8rem; letter-spacing: .12em; }
  .wrap { text-align: center; max-width: 460px; }
  .features { color: var(--muted); font-size: .85rem; margin: 1rem 0 1.4rem; line-height: 1.7; }
  .features b { color: var(--ink); font-weight: 600; }
  .actions { display: flex; flex-direction: column; gap: .8rem; }
  .actions .btn { width: 100%; }
  .actions .btn.with-meta {
    display: flex; justify-content: space-between; align-items: center; gap: .7rem;
  }
  .trial-badge {
    background: #052017; color: var(--ball); font-size: .65rem;
    padding: .15rem .4rem; border-radius: 100px; letter-spacing: .04em;
    margin-left: .4rem;
  }
  .btn.secondary .trial-badge { background: var(--court-line); color: var(--ink); }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Rally<span>Point</span> Pro</div>
  <div class="tagline">Live scoreboard · Spraak · Statistieken</div>

  <div class="pin-card">
    <span class="lbl">Pincode</span>
    <span class="val">__PIN__</span>
  </div>

  <div id="content">
    <div style="color:var(--muted);padding:2rem 0">Status laden…</div>
  </div>

  <div class="err" id="err"></div>

  <div style="color:var(--muted);font-size:.75rem;margin-top:1.4rem;line-height:1.5">
    Vragen of license overzetten? Mail <a href="mailto:support@rallypoint.pro" style="color:var(--ball)">support@rallypoint.pro</a>.
  </div>
</div>

<script>
  const pin = '__PIN__';
  const errEl = document.getElementById('err');
  const content = document.getElementById('content');

  async function load() {
    errEl.textContent = '';
    let me = null;
    try {
      const r = await fetch('/api/auth/me');
      if (r.ok) me = await r.json();
    } catch (e) {}

    let status = null;
    try {
      const r2 = await fetch(`/api/license/status?pin=${pin}`);
      status = await r2.json();
    } catch (e) {
      content.innerHTML = '<div class="info">Status kon niet geladen worden.</div>';
      return;
    }

    render(me, status);
  }

  function render(me, status) {
    // 1. Niet ingelogd → vraag login/signup eerst
    if (!me) {
      content.innerHTML = `
        <div class="features">
          Pro krijgt: <b>live scoreboard</b>, <b>spraak-aankondiging</b>, <b>volledige geschiedenis</b>, <b>statistieken &amp; grafieken</b>, <b>4 stemmen</b>.
        </div>
        <div class="actions">
          <a class="btn" href="/account/signup?next=${encodeURIComponent('/p/' + pin)}">Account aanmaken</a>
          <a class="btn secondary" href="/account/login?next=${encodeURIComponent('/p/' + pin)}">Inloggen</a>
        </div>`;
      return;
    }

    // 2. Ingelogd + PIN niet aan dit account gekoppeld → koppel-knop
    const myPin = (me.pins || []).includes(pin);
    if (!myPin) {
      // Misschien staat PIN al bij ander account (pin_taken)
      content.innerHTML = `
        <div class="info">Je bent ingelogd als <b>${escape(me.email)}</b>, maar PIN <b>${pin}</b> is nog niet aan jouw account gekoppeld.</div>
        <div class="actions">
          <button class="btn" id="coupleBtn">Koppel deze PIN aan mijn account</button>
          <a class="btn secondary" href="/account">Naar mijn account</a>
        </div>`;
      document.getElementById('coupleBtn').addEventListener('click', async () => {
        const btn = document.getElementById('coupleBtn');
        btn.disabled = true; errEl.textContent = '';
        try {
          const r = await fetch('/api/account/couple-pin', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ pin })
          });
          const data = await r.json();
          if (!r.ok) {
            errEl.textContent = data.error === 'pin_taken' ? 'Deze PIN is al gekoppeld aan een ander account.' : 'Koppelen mislukt.';
            btn.disabled = false; return;
          }
          load();   // herlaad — toont nu trial/buy buttons
        } catch (e) {
          errEl.textContent = 'Netwerkfout.';
          btn.disabled = false;
        }
      });
      return;
    }

    // 3. Ingelogd + PIN gekoppeld → toon licentie-acties
    const state = status.state;
    if (state === 'active') {
      const planLabel = status.plan === 'lifetime' ? 'Pro lifetime' : 'Pro maandelijks';
      content.innerHTML = `
        <div class="info" style="border-color:var(--ball);color:var(--ink)">
          Je hebt <b>${planLabel}</b> actief. <a href="/?pin=${pin}" style="color:var(--ball);font-weight:600">Open scoreboard →</a>
        </div>
        <div class="actions">
          <a class="btn secondary" href="/account">Mijn account</a>
        </div>`;
      return;
    }
    if (state === 'trial') {
      content.innerHTML = `
        <div class="info" style="border-color:var(--green);color:var(--green)">
          Trial actief — nog <b>${status.days_left} dagen</b>.
          <a href="/?pin=${pin}" style="color:var(--ball);font-weight:600;margin-left:.5rem">Open scoreboard →</a>
        </div>
        <div class="features">Wil je nu al upgraden naar lifetime of vaste maandelijks?</div>
        <div class="actions">
          <a class="btn with-meta" href="/api/license/checkout?pin=${pin}&plan=lifetime"><span>Lifetime</span><span>€10</span></a>
          <a class="btn secondary with-meta" href="/api/license/checkout?pin=${pin}&plan=monthly"><span>Maandelijks</span><span>€2/mnd</span></a>
        </div>`;
      return;
    }
    // none of expired → toon checkout opties
    const showTrial = !status.trial_used && state !== 'expired';
    content.innerHTML = `
      <div class="features">
        Pro krijgt: <b>live scoreboard</b>, <b>spraak-aankondiging</b>, <b>volledige geschiedenis</b>, <b>statistieken</b>, <b>4 stemmen</b>.
      </div>
      <div class="actions">
        ${showTrial ? '<button class="btn" id="trialBtn"><span>Start 3 dagen gratis <span class="trial-badge">geen kaart</span></span></button>' : ''}
        <a class="btn ${showTrial?'secondary':''} with-meta" href="/api/license/checkout?pin=${pin}&plan=monthly"><span>Maandelijks</span><span>€2/mnd</span></a>
        <a class="btn secondary with-meta" href="/api/license/checkout?pin=${pin}&plan=lifetime"><span>Lifetime</span><span>€10</span></a>
      </div>`;
    const trialBtn = document.getElementById('trialBtn');
    if (trialBtn) {
      trialBtn.addEventListener('click', async () => {
        trialBtn.disabled = true; errEl.textContent = '';
        try {
          const r = await fetch('/api/license/start-trial', { method: 'POST' });
          const data = await r.json();
          if (!r.ok) {
            errEl.textContent = data.error === 'trial_already_used' ? 'Je trial is al gebruikt.' : 'Trial kon niet starten.';
            trialBtn.disabled = false; return;
          }
          window.location = `/?pin=${pin}`;
        } catch (e) {
          errEl.textContent = 'Netwerkfout.';
          trialBtn.disabled = false;
        }
      });
    }
  }

  function escape(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  load();
</script>
</body>
</html>
