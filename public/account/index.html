<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — RallyPoint</title>
<link rel="icon" href="/img/logo.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c0f12">
<link rel="apple-touch-icon" href="/img/logo.png">
<link rel="stylesheet" href="/account/style.css">
</head>
<body>
<div class="wrap-wide">
  <div class="brand">
    <a href="/" style="text-decoration:none;color:inherit;display:inline-block">
      <span class="brand-logo"></span>
      <div class="brand-name">Rally<span>Point</span></div>
    </a>
  </div>

  <nav class="subnav">
    <a href="/account" class="active">Dashboard</a>
    <a href="/account/profile">Profiel</a>
    <a href="/account/settings">Instellingen</a>
    <a href="/" style="margin-left:auto">Scoreboard →</a>
  </nav>

  <div id="bannerSlot"></div>

  <div id="content" class="hidden">
    <div class="card">
      <div class="section">
        <h2>Account</h2>
        <div class="row"><span class="row-label">E-mail</span><span class="row-value" id="userEmail"></span></div>
        <div class="row"><span class="row-label">Status</span><span class="row-value" id="userVerified"></span></div>
      </div>
    </div>

    <div class="card">
      <div class="section">
        <h2>Watches</h2>
        <ul class="pin-list" id="pinList"></ul>
        <div class="pin-input-row" style="margin-top:.6rem">
          <input class="pin" type="text" id="pinInput" placeholder="PIN" maxlength="4" inputmode="numeric" pattern="[0-9]{4}">
          <input type="text" id="codeInput" placeholder="Code" maxlength="6" pattern="[0-9a-fA-F]{6}" style="letter-spacing:.25em;text-transform:lowercase;text-align:center">
          <button class="btn" id="couplePinBtn">Koppel</button>
        </div>
        <div class="info" style="margin-top:.8rem;margin-bottom:0">PIN en Code staan bovenaan het Setup-menu van je RallyPoint-app. Open de app eerst — anders kan de server de code niet verifiëren.</div>
        <div class="err" id="pinErr"></div>
      </div>
    </div>

    <div class="card">
      <div class="section">
        <h2>Sessie</h2>
        <button class="btn secondary" id="logoutBtn">Uitloggen</button>
      </div>
    </div>
  </div>
</div>

<footer class="app-footer">
  <a href="/about">Over</a> · <a href="/privacy">Privacy</a> · <a href="/terms">Voorwaarden</a>
</footer>

<script src="/account/toast.js"></script>
<script>
  const bannerSlot = document.getElementById('bannerSlot');
  const content = document.getElementById('content');
  const userEmail = document.getElementById('userEmail');
  const userVerified = document.getElementById('userVerified');
  const pinList = document.getElementById('pinList');
  const pinInput = document.getElementById('pinInput');
  const pinErr = document.getElementById('pinErr');

  const q = new URLSearchParams(location.search);
  // Post-actie meldingen als toast — clean URL na 1× tonen
  function flashFromQuery() {
    const msgs = {
      verified_1: ['E-mail bevestigd. Welkom!', 'success'],
      verified_0: ['Bevestiglink ongeldig of verlopen.', 'err'],
      just_signed_up: ['Account aangemaakt. Check je inbox voor de bevestigingsmail.', 'info'],
      onboarded: ['Je bent klaar — veel plezier!', 'success'],
      email_changed: ['E-mailadres bijgewerkt.', 'success'],
      pw_changed: ['Wachtwoord gewijzigd.', 'success'],
    };
    const fired = [];
    if (q.get('verified') === '1') fired.push('verified_1');
    if (q.get('verified') === '0') fired.push('verified_0');
    if (q.get('just_signed_up') === '1') fired.push('just_signed_up');
    if (q.get('onboarded') === '1') fired.push('onboarded');
    if (q.get('email_changed') === '1') fired.push('email_changed');
    if (q.get('pw_changed') === '1') fired.push('pw_changed');
    fired.forEach((k, i) => setTimeout(() => toast(msgs[k][0], msgs[k][1]), i * 150));
    if (fired.length) {
      history.replaceState({}, '', location.pathname);
    }
  }
  setTimeout(flashFromQuery, 50);

  async function load() {
    let me;
    try {
      const r = await fetch('/api/auth/me');
      if (r.status === 401) { window.location = '/account/login'; return; }
      me = await r.json();
    } catch (e) {
      bannerSlot.innerHTML = '<div class="banner err">Kon account niet laden.</div>';
      return;
    }
    content.classList.remove('hidden');
    userEmail.textContent = me.email;
    userVerified.innerHTML = me.email_verified
      ? '<span class="status-pill active">Geverifieerd</span>'
      : '<span class="status-pill expired">Niet geverifieerd</span>';

    pinList.innerHTML = '';
    if (!me.pins || !me.pins.length) {
      pinList.innerHTML = `
        <li style="justify-content:center;padding:1.6rem 1rem;text-align:center;flex-direction:column;background:transparent;border-style:dashed">
          <div style="font-size:2rem;line-height:1;margin-bottom:.6rem">⌚</div>
          <div style="font-family:Inter;font-size:.95rem;letter-spacing:0;color:var(--ink);font-weight:500">Nog geen watches gekoppeld</div>
          <div style="font-family:Inter;font-size:.8rem;letter-spacing:0;color:var(--muted);margin-top:.35rem;line-height:1.5">Open RallyPoint op je watch, kopieer <b style="color:var(--muted-hi)">PIN</b> en <b style="color:var(--muted-hi)">Code</b> uit het Setup-menu, en vul hieronder in.</div>
        </li>`;
    } else {
      for (const pin of me.pins) {
        const li = document.createElement('li');
        li.innerHTML = `<span class="pin-val">${pin}</span><button data-pin="${pin}">Ontkoppel</button>`;
        pinList.appendChild(li);
      }
    }
  }

  document.getElementById('couplePinBtn').addEventListener('click', async () => {
    pinErr.textContent = '';
    const pin = pinInput.value.trim();
    const code = (document.getElementById('codeInput').value || '').trim().toLowerCase();
    if (!/^\d{4}$/.test(pin)) { pinErr.textContent = 'PIN moet 4 cijfers zijn.'; return; }
    if (!/^[0-9a-f]{6}$/.test(code)) { pinErr.textContent = 'Code moet 6 tekens zijn (0-9, a-f).'; return; }
    const r = await fetch('/api/account/couple-pin', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ pin, code })
    });
    const data = await r.json();
    if (!r.ok) {
      pinErr.textContent =
        data.error === 'pin_taken' ? 'Deze PIN is al gekoppeld aan een ander account.' :
        data.error === 'bad_code' ? 'Code klopt niet — check het Setup-menu op je watch.' :
        data.error === 'watch_not_active' ? 'Open je RallyPoint-app op de watch en probeer opnieuw.' :
        'Koppelen mislukt.';
      return;
    }
    pinInput.value = ''; document.getElementById('codeInput').value = '';
    toast('Watch gekoppeld', 'success');
    load();
  });

  pinList.addEventListener('click', async e => {
    const btn = e.target.closest('button[data-pin]');
    if (!btn) return;
    const ok = await confirmModal({
      title: 'PIN ontkoppelen?',
      body: `PIN <b style="color:var(--ink)">${btn.dataset.pin}</b> wordt ontkoppeld van je account. Je kunt 'm later weer koppelen.`,
      confirmLabel: 'Ontkoppel',
      danger: true,
    });
    if (!ok) return;
    btnLoading(btn, true);
    await fetch('/api/account/pins/' + btn.dataset.pin, { method: 'DELETE' });
    toast('PIN ontkoppeld', 'success');
    load();
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location = '/account/login';
  });

  load();
</script>
</body>
</html>
