<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profiel — RallyPoint</title>
<link rel="icon" href="/img/logo.png">
<script src="/js/theme-init.js"></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c0f12">
<link rel="apple-touch-icon" href="/img/logo.png">
<link rel="stylesheet" href="/account/style.css">
<style>
  .profile-head {
    display: flex; align-items: center; gap: var(--sp-4); margin-bottom: var(--sp-4);
  }
  .profile-head .meta { flex: 1; min-width: 0; }
  .profile-head .name {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 1.6rem; line-height: 1.1; margin-bottom: var(--sp-1);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .profile-head .email { color: var(--muted); font-size: .85rem; }
  .save-row { margin-top: var(--sp-2); display: flex; gap: var(--sp-3); align-items: center; }
  .save-row .btn { width: auto; padding-left: var(--sp-6); padding-right: var(--sp-6); }
  /* Avatar rond gemaakt door background, geen border-artifact */
  .avatar { background-color: var(--bg-soft); }
</style>
</head>
<body>
<div class="wrap-wide">
  <div class="brand">
    <a href="/" style="text-decoration:none;color:inherit;display:inline-block">
      <span class="brand-logo"></span>
      <div class="brand-name">Rally<span>Point</span></div>
    </a>
  </div>

  <nav class="subnav">
    <a href="/account">Dashboard</a>
    <a href="/account/profile" class="active">Profiel</a>
    <a href="/account/settings">Instellingen</a>
    <a href="/" style="margin-left:auto">Scoreboard →</a>
  </nav>

  <div id="bannerSlot"></div>

  <div id="skeleton">
    <div class="card">
      <div class="profile-head">
        <div class="skeleton skeleton-circle"></div>
        <div class="meta" style="flex:1">
          <div class="skeleton skeleton-text xl" style="margin-bottom:.5rem"></div>
          <div class="skeleton skeleton-text sm"></div>
        </div>
      </div>
      <div class="section">
        <h2><div class="skeleton skeleton-text sm" style="width:130px;height:14px"></div></h2>
        <div class="skeleton skeleton-text" style="margin:1rem 0 .8rem;height:36px"></div>
        <div class="skeleton skeleton-text" style="margin-bottom:.8rem;height:36px"></div>
        <div class="skeleton skeleton-text" style="margin-bottom:1rem;height:36px"></div>
      </div>
    </div>
    <div class="card">
      <div class="section">
        <h2><div class="skeleton skeleton-text sm" style="width:80px;height:14px"></div></h2>
        <div class="stats-grid">
          <div class="skeleton skeleton-tile"></div>
          <div class="skeleton skeleton-tile"></div>
          <div class="skeleton skeleton-tile"></div>
          <div class="skeleton skeleton-tile"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="content" class="hidden">
    <div class="card">
      <div class="profile-head">
        <span class="avatar lg" id="avatarPreview"></span>
        <div class="meta">
          <div class="name" id="displayName">—</div>
          <div class="email" id="profileEmail"></div>
        </div>
      </div>

      <div class="section">
        <h2>Thema</h2>
        <div class="theme-picker" id="themePicker"></div>
      </div>

      <div class="section">
        <h2>Achtergrond</h2>
        <div class="theme-picker" id="bgPicker"></div>
        <div style="display:flex;align-items:center;gap:var(--sp-3);margin-top:var(--sp-4)">
          <label for="bgCustom" style="margin:0;letter-spacing:.1em">Eigen kleur</label>
          <input type="color" id="bgCustom" value="#0a0d10" style="width:48px;height:36px;padding:0;margin:0;border-radius:var(--r-sm);border:1px solid var(--border-hi);background:transparent;cursor:pointer">
        </div>
      </div>

      <div class="section">
        <h2>Persoonlijke gegevens</h2>
        <form id="profileForm">
          <label for="displayNameInput">Weergavenaam</label>
          <input type="text" id="displayNameInput" maxlength="60" placeholder="Hoe wil je heten?">

          <label for="avatarUrlInput">Avatar URL (optioneel)</label>
          <input type="url" id="avatarUrlInput" placeholder="https://...">

          <label for="favoriteSportInput">Favoriete sport</label>
          <select id="favoriteSportInput">
            <option value="">— Geen voorkeur —</option>
            <option value="0">Padel</option>
            <option value="1">Tennis</option>
            <option value="2">Pickleball</option>
            <option value="3">Tafeltennis</option>
            <option value="4">Badminton</option>
            <option value="5">Squash</option>
          </select>

          <div class="row" style="border-top:1px solid var(--border);padding-top:var(--sp-4);margin-top:var(--sp-3);align-items:flex-start">
            <div style="flex:1;min-width:0">
              <div class="row-label" style="margin-bottom:4px">Openbare matches</div>
              <div style="color:var(--muted);font-size:.8rem;line-height:1.4">Toon je lopende matches op de Live Spectator lijst. Anderen zien je naam + score, geen PIN of geschiedenis.</div>
            </div>
            <label class="toggle">
              <input type="checkbox" id="isPublicInput">
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="save-row">
            <button class="btn" type="submit">Opslaan</button>
            <div class="success" id="saveMsg" style="display:none;margin-top:.6rem">Opgeslagen.</div>
            <div class="err" id="saveErr"></div>
          </div>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="section">
        <h2>Mijn stats</h2>
        <div class="stats-grid" id="statsGrid"></div>
      </div>
    </div>
  </div>
</div>
<footer class="app-footer">
  <a href="/about">Over</a> · <a href="/privacy">Privacy</a> · <a href="/terms">Voorwaarden</a>
</footer>

<script src="/account/theme.js"></script>
<script src="/account/toast.js"></script>
<script>
  const SPORTS = ['Padel','Tennis','Pickleball','Tafeltennis','Badminton','Squash'];
  const skeleton = document.getElementById('skeleton');
  const content = document.getElementById('content');
  const avatarPreview = document.getElementById('avatarPreview');
  const displayName = document.getElementById('displayName');
  const profileEmail = document.getElementById('profileEmail');
  const displayNameInput = document.getElementById('displayNameInput');
  const avatarUrlInput = document.getElementById('avatarUrlInput');
  const favoriteSportInput = document.getElementById('favoriteSportInput');
  const statsGrid = document.getElementById('statsGrid');
  const saveMsg = document.getElementById('saveMsg');
  const saveErr = document.getElementById('saveErr');

  function avatarUrlFor(email, custom) {
    if (custom) return custom;
    // Initials-based avatar uit eerste letter van email — clean en eenvoudig.
    const seed = encodeURIComponent(email || 'rallypoint');
    return `https://api.dicebear.com/7.x/initials/svg?seed=${seed}&backgroundColor=181d24&textColor=c4ff00&fontWeight=700`;
  }

  function fmtDuration(min) {
    if (!min) return '0 min';
    const h = Math.floor(min / 60), m = Math.round(min % 60);
    return h > 0 ? `${h}u ${m}m` : `${m} min`;
  }

  async function load() {
    let p;
    try {
      const r = await fetch('/api/account/profile');
      if (r.status === 401) { window.location = '/account/login?next=/account/profile'; return; }
      p = await r.json();
    } catch (e) {
      skeleton.innerHTML = '<div class="card"><p style="color:var(--them);text-align:center">Profiel kon niet geladen worden.</p></div>';
      return;
    }
    skeleton.classList.add('hidden');
    content.classList.remove('hidden');

    // Header
    displayName.textContent = p.display_name || p.email.split('@')[0];
    profileEmail.textContent = p.email;
    avatarPreview.style.backgroundImage = `url('${avatarUrlFor(p.email, p.avatar_url)}')`;

    // Form
    displayNameInput.value = p.display_name || '';
    avatarUrlInput.value = p.avatar_url || '';
    favoriteSportInput.value = p.favorite_sport == null ? '' : String(p.favorite_sport);
    document.getElementById('isPublicInput').checked = !!p.is_public;

    // Stats
    const s = p.stats || {};
    const tiles = [
      { num: s.total_matches || 0, lbl: 'Matches' },
      { num: s.win_rate != null ? s.win_rate + '%' : '—', lbl: 'Win-rate', accent: true },
      { num: fmtDuration(s.total_duration_min || 0), lbl: 'Speeltijd' },
      { num: s.total_points || 0, lbl: 'Punten totaal' },
      { num: s.longest_match_pts || 0, lbl: 'Langste match' },
      { num: s.most_played_sport != null ? SPORTS[s.most_played_sport] : '—', lbl: 'Favoriet' },
      { num: s.pin_count || 0, lbl: 'Watches' },
    ];
    statsGrid.innerHTML = tiles.map(t =>
      `<div class="stat-tile"><div class="num ${t.accent?'accent':''}">${t.num}</div><div class="lbl">${t.lbl}</div></div>`
    ).join('');

    renderThemePicker();
    renderBgPicker();
  }

  function renderThemePicker() {
    const el = document.getElementById('themePicker');
    if (!el) return;
    const current = getTheme();
    el.innerHTML = THEMES_META.map(t => `
      <div class="theme-swatch ${t.id === current ? 'active' : ''}" data-theme="${t.id}">
        <span class="theme-swatch-circle" style="background:${t.color};color:${t.color}"></span>
        <span class="theme-swatch-name">${t.name}</span>
      </div>
    `).join('');
    el.querySelectorAll('.theme-swatch').forEach(s => {
      s.addEventListener('click', () => {
        setTheme(s.dataset.theme);
        renderThemePicker();
        toast('Thema: ' + s.querySelector('.theme-swatch-name').textContent, 'success', 1500);
      });
    });
  }

  function renderBgPicker() {
    const el = document.getElementById('bgPicker');
    if (!el) return;
    const current = getBg();
    el.innerHTML = BG_PRESETS.map(p => {
      const active = p.id === current ? 'active' : '';
      const dotBg = p.image || p.preview || p.color || '#0a0d10';
      return `<div class="theme-swatch ${active}" data-bg="${p.id}">
        <span class="theme-swatch-circle" style="background:${dotBg};color:${p.color || 'var(--ball)'}"></span>
        <span class="theme-swatch-name">${p.name}</span>
      </div>`;
    }).join('');
    el.querySelectorAll('.theme-swatch').forEach(s => {
      s.addEventListener('click', () => {
        setBg(s.dataset.bg);
        renderBgPicker();
        toast('Achtergrond: ' + s.querySelector('.theme-swatch-name').textContent, 'success', 1500);
      });
    });
    // Sync color-input naar huidig (als hex custom)
    const ci = document.getElementById('bgCustom');
    if (ci && current && current.startsWith('#')) ci.value = current.length === 4
      ? '#' + current.slice(1).split('').map(c => c+c).join('') : current;
  }

  // Custom color picker — live preview tijdens slepen
  const bgCustom = document.getElementById('bgCustom');
  if (bgCustom) {
    bgCustom.addEventListener('input', (e) => {
      setBg(e.target.value);
    });
    bgCustom.addEventListener('change', () => {
      renderBgPicker();
      toast('Achtergrond aangepast', 'success', 1200);
    });
  }

  // Live avatar preview when URL changes
  avatarUrlInput.addEventListener('input', () => {
    const v = avatarUrlInput.value.trim();
    if (v) { avatarPreview.style.backgroundImage = `url('${v}')`; }
  });

  document.getElementById('profileForm').addEventListener('submit', async e => {
    e.preventDefault();
    saveMsg.style.display = 'none'; saveErr.textContent = '';
    const body = {
      display_name: displayNameInput.value.trim(),
      avatar_url: avatarUrlInput.value.trim(),
      favorite_sport: favoriteSportInput.value === '' ? null : Number(favoriteSportInput.value),
      is_public: document.getElementById('isPublicInput').checked,
    };
    const btn = e.target.querySelector('button');
    btnLoading(btn, true);
    try {
      const r = await fetch('/api/account/profile', {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(body),
      });
      const data = await r.json();
      if (!r.ok) {
        const msg =
          data.error === 'bad_avatar' ? 'Avatar URL moet beginnen met http(s)://' :
          data.error === 'bad_sport' ? 'Ongeldige sport-keuze.' :
          'Opslaan mislukt.';
        toast(msg, 'err');
        btnLoading(btn, false); return;
      }
      toast('Profiel opgeslagen', 'success');
      load();   // refresh header
    } catch (e) {
      toast('Netwerkfout.', 'err');
    }
    btnLoading(btn, false);
  });

  load();
</script>
</body>
</html>
