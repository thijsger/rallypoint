<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Coach — RallyPoint</title>
<link rel="icon" href="/img/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --ball:#c4ff00; --glass:linear-gradient(165deg,rgba(255,255,255,.055),rgba(255,255,255,.02)); --gborder:rgba(255,255,255,.09); --gshadow:0 8px 30px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.06); }
  *{box-sizing:border-box;}
  body { margin:0; background:#06080b; color:#eef1f4; font-family:'Inter',system-ui,sans-serif; padding:1.2rem 1.1rem 6rem; -webkit-font-smoothing:antialiased; position:relative; overflow-x:hidden; }
  /* ambient floaty achtergrond */
  .ambient{ position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none; }
  .blob{ position:absolute; border-radius:50%; filter:blur(80px); opacity:.18; will-change:transform; }
  .blob1{ width:48vw; height:48vw; left:-10vw; top:-8vh; background:#c4ff00; animation:float1 26s ease-in-out infinite; }
  .blob2{ width:44vw; height:44vw; right:-12vw; top:16vh; background:#4aa8ff; animation:float2 32s ease-in-out infinite; }
  .blob3{ width:54vw; height:54vw; left:8vw; bottom:-14vh; background:#b07aff; animation:float3 38s ease-in-out infinite; opacity:.13; }
  @keyframes float1{ 0%,100%{transform:translate(0,0) scale(1);} 33%{transform:translate(14vw,12vh) scale(1.15);} 66%{transform:translate(6vw,28vh) scale(.9);} }
  @keyframes float2{ 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-16vw,16vh) scale(1.2);} }
  @keyframes float3{ 0%,100%{transform:translate(0,0) scale(1);} 40%{transform:translate(-12vw,-10vh) scale(1.1);} 75%{transform:translate(10vw,-4vh) scale(.95);} }
  @keyframes pulseGlow{ 0%,100%{box-shadow:0 0 0 0 rgba(196,255,0,.5);} 50%{box-shadow:0 0 26px 7px rgba(196,255,0,.28);} }
  @keyframes drift{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }
  @keyframes shimmer{ 0%{background-position:-150% 0;} 100%{background-position:250% 0;} }
  @media (prefers-reduced-motion: reduce){ .blob{animation:none;} .coach-badge{animation:none !important;} }

  .head { display:flex; align-items:center; gap:1rem; margin-bottom:.8rem; }
  .coach-badge { width:50px; height:50px; border-radius:16px; flex-shrink:0; background:linear-gradient(135deg,#d4ff3a,#86c000); display:flex; align-items:center; justify-content:center; font-size:1.6rem; box-shadow:0 6px 20px rgba(196,255,0,.25); }
  h1 { font-family:'Outfit',sans-serif; font-size:1.5rem; font-weight:700; margin:0; letter-spacing:-.01em; }
  h1 span { background:linear-gradient(135deg,#d4ff3a,#9ee000); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .meta { color:#7f8a98; font-size:.82rem; margin:.15rem 0; }
  h2 { font-family:'Outfit',sans-serif; font-size:.72rem; color:#8b95a3; text-transform:uppercase; letter-spacing:.16em; margin:1.9rem 0 .8rem; font-weight:600; display:flex; align-items:center; gap:.5rem; }
  h2::before{ content:''; width:14px; height:2px; border-radius:2px; background:linear-gradient(90deg,var(--ball),transparent); }

  /* sessie-kiezer */
  .sessions{ display:flex; gap:.5rem; overflow-x:auto; padding:.2rem 0 .6rem; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .sessions::-webkit-scrollbar{display:none;}
  .chip{ flex:0 0 auto; background:var(--glass); border:1px solid var(--gborder); border-radius:16px; padding:.6rem .85rem; cursor:pointer; min-width:98px; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); transition:transform .15s, border-color .2s, box-shadow .2s; }
  .chip.active{ border-color:rgba(196,255,0,.5); box-shadow:0 0 20px rgba(196,255,0,.15); }
  .chip:active{ transform:scale(.96); }
  .chip .d{ font-size:.7rem; color:#8b95a3; letter-spacing:.04em; } .chip.active .d{ color:var(--ball); }
  .chip .n{ font-family:'Outfit',sans-serif; font-size:1.25rem; font-weight:700; line-height:1.1; } .chip .s{ font-size:.66rem; color:#7f8a98; }
  .chip.live .d{ color:var(--ball); }

  .verdict { background:var(--glass); border:1px solid var(--gborder); border-radius:20px; padding:1.2rem 1.35rem; margin-bottom:.6rem; font-size:1rem; line-height:1.55; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); box-shadow:var(--gshadow); position:relative; overflow:hidden; }
  .verdict::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(180deg,#d4ff3a,#86c000); box-shadow:0 0 16px rgba(196,255,0,.5); }

  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(98px,1fr)); gap:.65rem; margin-bottom:.6rem; }
  .card { background:var(--glass); border:1px solid var(--gborder); border-radius:18px; padding:.85rem .9rem; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); box-shadow:var(--gshadow); }
  .card .l { color:#8b95a3; font-size:.6rem; text-transform:uppercase; letter-spacing:.12em; margin-bottom:.4rem; font-weight:500; }
  .card .v { font-family:'Outfit',sans-serif; font-size:1.6rem; font-weight:700; line-height:1; letter-spacing:-.02em; }
  .card .v.accent{ background:linear-gradient(135deg,#eaffa0,#c4ff00); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .card .v small{ font-size:.7rem; color:#8b95a3; font-weight:500; -webkit-text-fill-color:#8b95a3; }

  .bars { display:flex; flex-direction:column; gap:.55rem; }
  .bar-row { display:flex; align-items:center; gap:.6rem; font-size:.84rem; }
  .bar-row .lbl { width:100px; color:#cfd6df; flex-shrink:0; font-weight:500; }
  .bar-track { flex:1; background:rgba(255,255,255,.05); border-radius:8px; height:18px; overflow:hidden; box-shadow:inset 0 1px 2px rgba(0,0,0,.3); }
  .bar-fill { display:block; height:100%; border-radius:8px; min-width:3px; transition: width 1s cubic-bezier(.2,.85,.25,1); position:relative; box-shadow:0 0 12px rgba(255,255,255,.08); }
  .bar-fill::after{ content:''; position:absolute; inset:0; border-radius:8px; background:linear-gradient(180deg,rgba(255,255,255,.35),rgba(255,255,255,0) 60%); }
  .bar-row .val { width:70px; text-align:right; font-variant-numeric:tabular-nums; color:#aeb7c2; flex-shrink:0; font-family:'Outfit',sans-serif; font-weight:600; font-size:.8rem; }

  @keyframes rpUp { from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;} }
  @keyframes rpPop { from{opacity:0; transform:scale(.92);} to{opacity:1; transform:none;} }
  #root > * { opacity:0; }
  .coach-badge { animation: rpPop .5s cubic-bezier(.2,1.3,.4,1) both, pulseGlow 3.2s ease-in-out .6s infinite, drift 5s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce){ #root > *{opacity:1 !important; animation:none !important;} .bar-fill{transition:none;} }

  canvas { width:100%; background:var(--glass); border:1px solid var(--gborder); border-radius:18px; display:block; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); box-shadow:var(--gshadow); }
  .note { color:#5d6470; font-size:.74rem; margin-top:.45rem; }

  .tip { background:var(--glass); border:1px solid var(--gborder); border-radius:18px; padding:1rem 1.1rem; margin-bottom:.7rem; display:flex; gap:.95rem; align-items:flex-start; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); box-shadow:var(--gshadow); transition:transform .15s; }
  .tip:active{ transform:scale(.99); }
  .tip .ic{ width:40px; height:40px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
  .tip.good .ic{ background:linear-gradient(135deg,rgba(196,255,0,.28),rgba(196,255,0,.07)); box-shadow:0 0 16px rgba(196,255,0,.12); }
  .tip.work .ic{ background:linear-gradient(135deg,rgba(255,177,74,.28),rgba(255,177,74,.07)); box-shadow:0 0 16px rgba(255,177,74,.12); }
  .tip.info .ic{ background:linear-gradient(135deg,rgba(74,168,255,.28),rgba(74,168,255,.07)); box-shadow:0 0 16px rgba(74,168,255,.12); }
  .tip .t{ font-family:'Outfit',sans-serif; font-weight:600; margin-bottom:.2rem; font-size:.95rem; } .tip .d{ color:#aeb7c2; font-size:.86rem; line-height:1.45; }

  .legend{ display:flex; flex-wrap:wrap; gap:.5rem 1rem; font-size:.76rem; color:#8b95a3; margin-top:.5rem;}
  .legend span{ display:inline-flex; align-items:center; gap:5px;} .dot{ width:10px;height:10px;border-radius:3px;display:inline-block;}
  .recs{ display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:.65rem; }
  .rec{ background:var(--glass); border:1px solid var(--gborder); border-radius:18px; padding:.95rem 1rem; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); box-shadow:var(--gshadow); }
  .rec .rl{ color:#8b95a3; font-size:.66rem; text-transform:uppercase; letter-spacing:.1em; } .rec .rv{ font-family:'Outfit',sans-serif; font-size:1.5rem; font-weight:700; margin-top:.25rem; letter-spacing:-.02em; } .rec .rs{ color:#5d6470; font-size:.68rem; }

  .btnbar{ position:fixed; left:0; right:0; bottom:0; background:rgba(8,10,14,.7); border-top:1px solid var(--gborder); padding:.8rem 1rem calc(.8rem + env(safe-area-inset-bottom)); display:flex; gap:.6rem; backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); }
  button{ background:var(--glass); color:#eef1f4; border:1px solid var(--gborder); border-radius:14px; padding:.7rem 1.1rem; font-size:.92rem; font-weight:600; font-family:'Outfit',sans-serif; cursor:pointer; transition:transform .12s, border-color .2s; }
  button:active{ transform:scale(.97); }
  button.primary{ background:linear-gradient(135deg,#d4ff3a,#9ee000); color:#0a0d10; border:none; flex:1; box-shadow:0 6px 20px rgba(196,255,0,.3); }
  button:disabled{opacity:.5;}
  #err { color:#ff6b54; padding:1rem 0; } .empty{ color:#5d6470; padding:2.5rem 0; text-align:center; line-height:1.6; }
  .delbtn{ background:none;border:none;color:#5d6470;font-size:.76rem;cursor:pointer;padding:.4rem .4rem;margin-top:.8rem;}
  .delbtn:hover{color:#ff6b54;}
</style>
</head>
<body>
<div class="ambient"><span class="blob blob1"></span><span class="blob blob2"></span><span class="blob blob3"></span></div>
<div class="head">
  <div class="coach-badge">🎾</div>
  <div><h1>AI <span>Coach</span></h1><div class="meta" id="meta">analyseren…</div></div>
</div>
<div id="err"></div>
<div id="sessionsWrap"></div>
<div id="root"></div>

<div class="btnbar" id="btnbar" style="display:none">
  <button class="primary" id="saveBtn">Bewaar deze sessie</button>
  <button id="refreshBtn">Ververs</button>
</div>

<script>
const PIN = new URLSearchParams(location.search).get('pin') || location.pathname.split('/')[3] || '';
const KEY = new URLSearchParams(location.search).get('beta') || '';
let MODEL=null, LIVE=null, SESSIONS=[], SELECTED=0;

const COL={forehand:'#c4ff00',backhand:'#4aa8ff',volley_forehand:'#ffb14a',volley_backhand:'#ff8a4a',smash:'#ff6b54',lob:'#b07aff'};
const ORDER=['forehand','backhand','volley_forehand','volley_backhand','smash','lob'];
const FH_SIDE={forehand:1,volley_forehand:1}, BH_SIDE={backhand:1,volley_backhand:1};
function lbl(k){ return (MODEL && MODEL.classes[k] && MODEL.classes[k].label) || k; }
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0;}
function std(a){if(a.length<2)return 0;const m=avg(a);return Math.sqrt(avg(a.map(x=>(x-m)**2)));}
function pct(n,d){return d?Math.round(100*n/d):0;}
function dstr(ts){ try{return new Date(ts).toLocaleDateString('nl-NL',{day:'numeric',month:'short'});}catch(e){return '?';} }

function feats(AX,AY,AZ,GX,GY,GZ,c){
  const n=AX.length,s=Math.max(0,c-12),e=Math.min(n,c+14);
  const pk=a=>{let p=0;for(let i=s;i<e;i++)if(Math.abs(a[i])>Math.abs(p))p=a[i];return p;};
  let dur=0; for(let i=Math.max(0,c-15);i<Math.min(n,c+15);i++){const g=Math.hypot(GX[i],GY[i],GZ[i]);if(g>250)dur++;}
  let amag=0; for(let i=s;i<e;i++){const a=Math.hypot(AX[i],AY[i],AZ[i]);if(a>amag)amag=a;}
  return [pk(GX),pk(GY),pk(GZ),pk(AX),pk(AY),pk(AZ),dur,amag];
}
function classify(f){let best=null,bd=1e18;for(const k in MODEL.classes){
  if(f[0]>150 && BH_SIDE[k]) continue; if(f[0]<-150 && FH_SIDE[k]) continue;
  const c=MODEL.classes[k].centroid;let d=0;for(let i=0;i<8;i++){const z=(f[i]-c[i])/MODEL.scale[i];d+=z*z;}if(d<bd){bd=d;best=k;}}return best;}

function comingSoon(){
  document.getElementById('meta').textContent='binnenkort beschikbaar';
  document.getElementById('root').innerHTML=
    `<div class="verdict" style="border-left-color:#4aa8ff"><div style="font-size:2.2rem;margin-bottom:.4rem">🚧</div>
     <div style="font-weight:600;font-size:1.15rem;margin-bottom:.5rem">Coming soon</div>
     <div style="color:#b8c1ce">De AI-coach analyseert je slagen en geeft persoonlijke tips na elk potje. Binnenkort hier.</div></div>`;
}

async function load(){
  try{
    if(!KEY){ comingSoon(); return; }
    if(!MODEL) MODEL=await (await fetch('/beta/model.json')).json();
    const r=await fetch(`/beta/log/${PIN}?beta=${encodeURIComponent(KEY)}`);
    if(r.status===403){ comingSoon(); return; }
    if(!r.ok){ document.getElementById('err').textContent='Geen toegang.'; return; }
    const j=await r.json();
    const batches=(j.batches||[]).slice().sort((a,b)=>(a.t0||0)-(b.t0||0));
    let AX=[],AY=[],AZ=[],GX=[],GY=[],GZ=[],SW=[],t0=null;
    for(const b of batches){ if(!Array.isArray(b.ax))continue; if(t0===null)t0=b.t0||0;
      const base=AX.length;
      for(let i=0;i<b.ax.length;i++){AX.push(b.ax[i]);AY.push(b.ay[i]);AZ.push(b.az[i]);GX.push((b.gx&&b.gx[i])||0);GY.push((b.gy&&b.gy[i])||0);GZ.push((b.gz&&b.gz[i])||0);}
      for(const m of (b.sw||[]))SW.push(base+m);
    }
    LIVE = SW.length? buildSummary(AX,AY,AZ,GX,GY,GZ,SW,t0) : null;
    const hist=await (await fetch(`/beta/coach-data/${PIN}?beta=${encodeURIComponent(KEY)}`)).json();
    SESSIONS=(hist.sessions||[]).slice().sort((a,b)=>(b.savedTs||b.t0||0)-(a.savedTs||a.t0||0));
    // Live tonen als 'ie nog niet opgeslagen is
    const liveSaved = LIVE && SESSIONS.some(s=>s.t0===LIVE.t0);
    if(LIVE && LIVE.totalSwings>=8 && !liveSaved){ LIVE._live=true; renderAll([LIVE,...SESSIONS],0); }
    else if(SESSIONS.length){ renderAll(SESSIONS,0); }
    else if(LIVE && LIVE.totalSwings>=8){ renderAll([LIVE],0); }
    else { document.getElementById('btnbar').style.display='flex'; document.getElementById('root').innerHTML='<div class="empty">Nog geen wedstrijd. Speel een potje met de app actief.</div>'; }
  }catch(e){ document.getElementById('err').textContent='Fout: '+e.message; }
}

function buildSummary(AX,AY,AZ,GX,GY,GZ,SW,t0){
  const n=AX.length, hz=50, durMin=n/hz/60;
  const sw=SW.map(c=>{const f=feats(AX,AY,AZ,GX,GY,GZ,c);return {pos:c,cls:classify(f),power:f[7]};});
  const N=sw.length;
  const cls={}, powByCls={}; ORDER.forEach(k=>{cls[k]=0;powByCls[k]=[];});
  const allPow=[];
  for(const s of sw){ if(!(s.cls in cls)){cls[s.cls]=0;powByCls[s.cls]=[];} cls[s.cls]++; powByCls[s.cls].push(s.power); allPow.push(s.power); }
  const SEG=10, segs=[];
  for(let k=0;k<SEG;k++){ const lo=n*k/SEG, hi=n*(k+1)/SEG; const ss=sw.filter(s=>s.pos>=lo&&s.pos<hi);
    segs.push({swings:ss.length, power:ss.length?Math.round(avg(ss.map(s=>s.power))):0}); }
  const third=Math.floor(N/3);
  const early=avg(sw.slice(0,third).map(s=>s.power)), late=avg(sw.slice(N-third).map(s=>s.power));
  const fatiguePct=early?Math.round(100*(late-early)/early):0;
  const gaps=[]; for(let i=1;i<SW.length;i++)gaps.push((SW[i]-SW[i-1])/hz); gaps.sort((a,b)=>a-b);
  const medGap=gaps.length?gaps[Math.floor(gaps.length/2)]:0;
  const powAvgByCls={}; ORDER.forEach(k=>powAvgByCls[k]=powByCls[k]&&powByCls[k].length?Math.round(avg(powByCls[k])):0);
  return { t0, durationMin:+durMin.toFixed(1), totalSwings:N, cls, powByCls:powAvgByCls,
    powAvg:Math.round(avg(allPow)||0), powPeak:Math.round(Math.max(0,...allPow)),
    fatiguePct, segments:segs, medGapS:+medGap.toFixed(1), swPerMin:durMin?+(N/durMin).toFixed(1):0 };
}

function renderAll(list, sel){
  SESSIONS_VIEW=list; SELECTED=sel;
  document.getElementById('btnbar').style.display='flex';
  // sessie-kiezer
  document.getElementById('sessionsWrap').innerHTML = list.length>1 ?
    `<div class="sessions">${list.map((s,i)=>`<div class="chip ${i===sel?'active':''} ${s._live?'live':''}" data-i="${i}">
       <div class="d">${s._live?'LIVE':dstr(s.savedTs||s.t0)}</div><div class="n">${s.totalSwings}</div><div class="s">${s.durationMin} min</div></div>`).join('')}</div>` : '';
  renderSession(list[sel]);
  renderRecordsAndTrends();
  animateIn();
}
let SESSIONS_VIEW=[];

// Entrance-animaties: secties gestagger'd infaden, balkjes groeien, getal telt op.
function animateIn(){
  const root=document.getElementById('root');
  [...root.children].forEach((el,i)=>{ const d=Math.min(i*0.05,0.6); el.style.animation=`rpUp .5s cubic-bezier(.2,.8,.2,1) ${d}s both`; });
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    root.querySelectorAll('.bar-fill[data-w]').forEach(b=>{ b.style.width=b.dataset.w; });
  }));
  root.querySelectorAll('[data-count]').forEach(el=>countUp(el, +el.dataset.count));
}
function countUp(el,target){
  if(!(target>0)){ el.textContent=target||0; return; }
  const dur=700, t0=performance.now();
  (function step(now){ const p=Math.min(1,(now-t0)/dur);
    el.textContent=Math.round(target*(1-Math.pow(1-p,3)));
    if(p<1)requestAnimationFrame(step); })(t0);
}

function renderSession(S){
  const isLive=!!S._live;
  document.getElementById('meta').textContent=(isLive?'live (niet opgeslagen) · ':'opgeslagen · ')+`${S.totalSwings} slagen · ${S.durationMin} min · ${dstr(S.savedTs||S.t0)}`;
  document.getElementById('saveBtn').style.display=isLive?'':'none';
  const C=S.cls, N=S.totalSwings;
  const fh=C.forehand||0, bh=C.backhand||0, ground=fh+bh, vol=(C.volley_forehand||0)+(C.volley_backhand||0);
  const fhp=pct(fh,ground);
  const dom=fhp>=60?'sterk forehand-gericht':fhp<=40?'sterk backhand-gericht':'mooi gebalanceerd';
  const verdict=`Je speelde ${dom} (${fhp}% forehand van je grondslagen). `+
    (S.fatiguePct<=-12?`Je kracht zakte ${Math.abs(S.fatiguePct)}% tegen het eind — conditie/focus.`:
     S.fatiguePct>=8?`Je bleef sterk tot het eind (+${S.fatiguePct}%). Mooi.`:`Je kracht bleef stabiel door de wedstrijd.`);

  const tips=[];
  if(fhp>40&&fhp<60)tips.push(['good','⚖️','Goede balans','Forehand/backhand in evenwicht — lastig te bespelen.']);
  else if(fhp>=65)tips.push(['work','↔️','Backhand wordt vermeden',`${fhp}% forehand. Tegenstanders gaan je backhand opzoeken — train die kant.`]);
  else if(fhp<=35)tips.push(['work','↔️','Forehand benutten',`Veel backhand (${100-fhp}%). Je forehand is vaak je sterkste wapen — zoek die vaker.`]);
  if(S.powByCls.backhand&&S.powByCls.forehand&&S.powByCls.backhand<S.powByCls.forehand*0.8)
    tips.push(['work','💪','Backhand-kracht',`Je backhand komt ~${Math.round(100-100*S.powByCls.backhand/S.powByCls.forehand)}% zachter uit dan je forehand. Werk aan rotatie en gewichtsoverdracht.`]);
  if(pct(vol,N)>=18)tips.push(['good','🥅','Actief aan het net',`Veel volleys (${pct(vol,N)}%) — agressief padel.`]);
  else if(pct(vol,N)<7)tips.push(['info','🥅','Vaker naar het net','Weinig volleys. In padel win je veel punten aan het net.']);
  if((C.smash||0)>0)tips.push(['good','⚡','Smashes geraakt',`${C.smash} smash${C.smash>1?'es':''} — afmaken bovenlangs is een wapen.`]);
  if(S.fatiguePct<=-12)tips.push(['work','🔋','Kracht zakt in',`Je slagen werden ${Math.abs(S.fatiguePct)}% zwakker tegen het eind.`]);
  if(!tips.length)tips.push(['info','✅','Gebalanceerde sessie','Geen duidelijke zwakke plekken.']);

  const present=ORDER.filter(k=>(C[k]||0)>0);
  const maxN=Math.max(...present.map(k=>C[k]),1);
  const maxP=Math.max(...present.map(k=>S.powByCls[k]||0),1);
  const distBars=present.map(k=>`<div class="bar-row"><span class="lbl">${lbl(k)}</span><span class="bar-track"><span class="bar-fill" data-w="${Math.round(100*C[k]/maxN)}%" style="width:0;background:${COL[k]}"></span></span><span class="val">${C[k]} · ${pct(C[k],N)}%</span></div>`).join('');
  const powBars=present.filter(k=>(S.powByCls[k]||0)>0).map(k=>`<div class="bar-row"><span class="lbl">${lbl(k)}</span><span class="bar-track"><span class="bar-fill" data-w="${Math.round(100*(S.powByCls[k])/maxP)}%" style="width:0;background:${COL[k]}"></span></span><span class="val">${S.powByCls[k]}</span></div>`).join('');

  document.getElementById('root').innerHTML=`<div class="verdict">${verdict}</div>
    <div class="cards">
      <div class="card"><div class="l">Slagen</div><div class="v accent" data-count="${N}">0</div></div>
      <div class="card"><div class="l">Per minuut</div><div class="v">${S.swPerMin}</div></div>
      <div class="card"><div class="l">Gem. kracht</div><div class="v">${S.powAvg}</div></div>
      <div class="card"><div class="l">Piek</div><div class="v">${S.powPeak}</div></div>
      <div class="card"><div class="l">Tempo</div><div class="v">${S.medGapS!=null?S.medGapS:'–'}<small>${S.medGapS!=null?'s':''}</small></div></div>
      <div class="card"><div class="l">Conditie</div><div class="v" style="color:${S.fatiguePct<=-12?'#ff6b54':S.fatiguePct>=8?'#c4ff00':'#fff'}">${S.fatiguePct>0?'+':''}${S.fatiguePct}<small>%</small></div></div>
    </div>
    <h2>Slagverdeling</h2><div class="bars">${distBars}</div>
    <h2>Kracht per slag</h2><div class="bars">${powBars}</div>
    <div class="note">Kracht = piek-zwaaiversnelling. Vergelijk je eigen slagen onderling.</div>
    <h2>Activiteit & kracht door de wedstrijd</h2>
    <canvas id="segCanvas" height="210"></canvas>
    <div class="legend"><span><i class="dot" style="background:var(--ball)"></i>slagen per ~${Math.max(1,Math.round((S.durationMin||0)/10))} min</span><span><i class="dot" style="background:#ffb14a"></i>gem. kracht (zwaai-piek)</span></div>
    <div class="note">Wedstrijd in 10 stukjes (links=begin, rechts=eind). Groene staaf = hoeveel je sloeg, oranje lijn = hoe hard. Zakt oranje naar rechts? Dan neemt je kracht af.</div>
    <h2>Coaching-tips</h2>${tips.map(([c,ic,t,d])=>`<div class="tip ${c}"><span class="ic">${ic}</span><div><div class="t">${t}</div><div class="d">${d}</div></div></div>`).join('')}
    ${isLive?'':`<button class="delbtn" id="delBtn">Verwijder deze sessie</button>`}`;
  drawSegments(S);
}

function renderRecordsAndTrends(){
  const saved=SESSIONS;
  if(saved.length<1) return;
  // chronologisch voor trends
  const chron=saved.slice().sort((a,b)=>(a.t0||0)-(b.t0||0));
  const totalSw=saved.reduce((s,x)=>s+x.totalSwings,0);
  const maxSw=Math.max(...saved.map(s=>s.totalSwings));
  const hardest=Math.max(...saved.map(s=>s.powPeak||0));
  const longest=Math.max(...saved.map(s=>s.durationMin||0));
  let html=`<h2>Records (${saved.length} ${saved.length===1?'sessie':'sessies'})</h2>
    <div class="recs">
      <div class="rec"><div class="rl">Totaal slagen</div><div class="rv">${totalSw}</div><div class="rs">over alle potjes</div></div>
      <div class="rec"><div class="rl">Meeste in 1 potje</div><div class="rv">${maxSw}</div></div>
      <div class="rec"><div class="rl">Hardste slag</div><div class="rv">${hardest}</div><div class="rs">piek-kracht</div></div>
      <div class="rec"><div class="rl">Langste potje</div><div class="rv">${longest}<small style="font-size:.7rem;color:#5d6470"> min</small></div></div>
    </div>`;
  if(chron.length>=2){
    html+=`<h2>Voortgang (${chron.length} potjes)</h2>
      <canvas id="trSwings" height="110"></canvas><div class="note" style="margin-bottom:.7rem">Slagen per potje</div>
      <canvas id="trBalance" height="110"></canvas><div class="note" style="margin-bottom:.7rem">Forehand-aandeel (%)</div>
      <canvas id="trPower" height="110"></canvas><div class="note">Gem. kracht per potje</div>`;
  }
  const recDiv=document.createElement('div'); recDiv.innerHTML=html;
  document.getElementById('root').appendChild(recDiv);
  if(chron.length>=2){
    drawTrend('trSwings', chron.map(s=>s.totalSwings), '#c4ff00');
    drawTrend('trBalance', chron.map(s=>{const g=(s.cls.forehand||0)+(s.cls.backhand||0);return g?Math.round(100*(s.cls.forehand||0)/g):0;}), '#4aa8ff', 100);
    drawTrend('trPower', chron.map(s=>s.powAvg||0), '#ffb14a');
  }
}

function setup(id){ const cv=document.getElementById(id); if(!cv)return null; const ctx=cv.getContext('2d');
  cv.width=cv.clientWidth*2; const W=cv.width,H=cv.height*2; cv.style.height=(H/2)+'px'; cv.height=H; ctx.clearRect(0,0,W,H); return {ctx,W,H}; }
function drawSegments(S){
  const o=setup('segCanvas'); if(!o)return; const {ctx,W,H}=o;
  const segs=S.segments, n=segs.length, padB=34, padT=22, padL=44, padR=58;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const maxS=Math.max(...segs.map(s=>s.swings),1);
  const powVals=segs.filter(s=>s.power>0).map(s=>s.power);
  const maxP=Math.max(...powVals,1), minP=Math.min(...powVals,maxP);
  const bw=plotW/n;
  // groene staven (slagen) — linkeras
  segs.forEach((s,i)=>{ const h=(s.swings/maxS)*plotH; ctx.fillStyle='#c4ff00'; ctx.fillRect(padL+i*bw+bw*0.18,H-padB-h,bw*0.64,h); });
  // oranje lijn (kracht) — rechteras, geschaald tussen minP..maxP voor leesbaarheid
  const span=Math.max(maxP-minP,1);
  const pts=segs.map((s,i)=>s.power>0?{x:padL+i*bw+bw/2,y:padT+(1-(s.power-minP)/span)*plotH}:null).filter(Boolean);
  ctx.strokeStyle='#ffb14a'; ctx.lineWidth=2.5; ctx.beginPath();
  pts.forEach((p,i)=>{ if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y); }); ctx.stroke();
  // linkeras: slagen (groen) — 0 en max
  ctx.font='16px system-ui'; ctx.textAlign='right';
  ctx.fillStyle='#c4ff00'; ctx.fillText(maxS, padL-6, padT+6); ctx.fillText('0', padL-6, H-padB);
  ctx.fillStyle='#8b95a3'; ctx.textAlign='left'; ctx.fillText('slagen', 4, padT-8);
  // rechteras: kracht (oranje) — minP en maxP
  ctx.fillStyle='#ffb14a'; ctx.textAlign='left'; ctx.fillText(maxP, W-padR+6, padT+6); ctx.fillText(minP, W-padR+6, H-padB);
  ctx.fillStyle='#8b95a3'; ctx.textAlign='right'; ctx.fillText('kracht', W-4, padT-8);
  // x-as: minuten
  const dur=S.durationMin||0;
  ctx.fillStyle='#8b95a3'; ctx.font='15px system-ui';
  ctx.textAlign='left'; ctx.fillText('0 min', padL, H-9);
  ctx.textAlign='center'; ctx.fillText(Math.round(dur/2)+' min', padL+plotW/2, H-9);
  ctx.textAlign='right'; ctx.fillText(Math.round(dur)+' min', padL+plotW, H-9);
}
function drawTrend(id,data,col,fixedMax){
  const o=setup(id); if(!o)return; const {ctx,W,H}=o; if(data.length<2)return;
  const max=fixedMax||Math.max(...data,1), padB=20,padT=16, n=data.length;
  ctx.strokeStyle='#2a3038'; ctx.beginPath(); ctx.moveTo(0,H-padB); ctx.lineTo(W,H-padB); ctx.stroke();
  ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.beginPath();
  data.forEach((v,i)=>{ const x=n>1?(i/(n-1))*W:W/2, y=padT+(1-v/max)*(H-padT-padB); if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y); }); ctx.stroke();
  ctx.fillStyle=col; data.forEach((v,i)=>{ const x=n>1?(i/(n-1))*W:W/2, y=padT+(1-v/max)*(H-padT-padB); ctx.beginPath(); ctx.arc(x,y,4,0,7); ctx.fill();
    ctx.fillStyle='#cfd6df'; ctx.font='17px system-ui'; ctx.textAlign='center'; ctx.fillText(v,x,y-9); ctx.fillStyle=col; });
}

document.addEventListener('click', async e=>{
  const chip=e.target.closest('.chip');
  if(chip){ renderAll(SESSIONS_VIEW, +chip.dataset.i); return; }
  if(e.target.id==='refreshBtn') return load();
  if(e.target.id==='delBtn'){
    const S=SESSIONS_VIEW[SELECTED];
    if(!confirm('Deze sessie verwijderen?')) return;
    await fetch(`/beta/coach-data/${PIN}?beta=${encodeURIComponent(KEY)}&t0=${S.t0}`,{method:'DELETE'});
    return load();
  }
  if(e.target.id==='saveBtn' && LIVE){
    e.target.textContent='Bewaren…'; e.target.disabled=true;
    try{ const r=await fetch(`/beta/coach-data/${PIN}?beta=${encodeURIComponent(KEY)}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...LIVE,_live:undefined,savedTs:Date.now()})});
      await r.json(); e.target.textContent='Bewaard ✓'; setTimeout(load,800);
    }catch(_){ e.target.textContent='Mislukt'; e.target.disabled=false; }
  }
});
load();
</script>
