<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>RallyPoint — Match history</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1216">
<link rel="icon" href="/img/logo.png">
<script src="/js/theme-init.js"></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c0f12">
<link rel="apple-touch-icon" href="/img/logo.png">
<style>
  :root {
    --bg: #0a0d10;
    --bg-card: #181d24;
    --bg-card-hover: #232830;
    --border: #232a33;
    --text: #ffffff;
    --text-dim: #8b95a3;
    --us: #c4ff00;
    --them: #ff6b54;
    --amber: #c4ff00;
    --green: #4ade80;
    --ball: #c4ff00;
    --bg-glow: rgba(196,255,0,.045);
    --ball-glow: rgba(196,255,0,.15);
    --ball-soft: rgba(196,255,0,.06);
  }
  html[data-theme="ice"]    { --ball: #00d4ff; --us: #00d4ff; --amber: #00d4ff; --bg-glow: rgba(0,212,255,.045); --ball-glow: rgba(0,212,255,.15); --ball-soft: rgba(0,212,255,.06); }
  html[data-theme="sunset"] { --ball: #ff9533; --us: #ff9533; --amber: #ff9533; --bg-glow: rgba(255,149,51,.045); --ball-glow: rgba(255,149,51,.15); --ball-soft: rgba(255,149,51,.06); }
  html[data-theme="mono"]   { --ball: #ffffff; --us: #ffffff; --amber: #ffffff; --bg-glow: rgba(255,255,255,.03); --ball-glow: rgba(255,255,255,.12); --ball-soft: rgba(255,255,255,.05); }
  html[data-theme="court"]  { --ball: #4ade80; --us: #4ade80; --amber: #4ade80; --bg-glow: rgba(74,222,128,.045); --ball-glow: rgba(74,222,128,.15); --ball-soft: rgba(74,222,128,.06); }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background-color: var(--user-bg, #0a0d10);
    background-image: var(--user-bg-image,
      radial-gradient(ellipse 80% 50% at 50% 0%, var(--bg-glow), transparent 60%)
    );
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px;
    background: var(--user-bg, var(--bg));
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 10;
  }
  h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .pin-label {
    color: var(--text-dim);
    font-size: 14px;
  }
  .pin-value {
    color: var(--ball);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .lang-select {
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
  }
  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .back-link {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    white-space: nowrap;
  }
  .back-link:hover { color: var(--text); border-color: var(--text); }
  main {
    max-width: 1160px;
    margin: 0 auto;
    padding: 16px clamp(14px,3vw,28px) 70px;
  }
  /* premium detail-layout */
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .detail-grid .dcard { margin-bottom:0; }
  .dcard.wide { grid-column:1/-1; }
  .dcard { background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02)); box-shadow:0 14px 40px rgba(0,0,0,.28); }
  .dtabs { display:flex; gap:5px; background:var(--bg-card); border:1px solid var(--border); border-radius:13px; padding:5px; margin:14px 0; }
  .dtab { flex:1; text-align:center; font-size:13.5px; font-weight:600; color:var(--text-dim); padding:9px 14px; border-radius:9px; cursor:pointer; transition:.15s; }
  .dtab:hover { color:var(--text); }
  .dtab.active { background:rgba(255,255,255,.06); color:var(--text); }
  @media (max-width:720px){ .detail-grid { grid-template-columns:1fr; } }
  /* AI-coach analyse (rustige site-kleuren) */
  .coach-summary { font-size:16px; line-height:1.55; font-weight:500; color:var(--text); }
  .coach-summary b { color:var(--ball); font-weight:700; }
  .cmp2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .cmp-side { background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:12px; padding:13px 15px; }
  .cmp-side .ch { font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--text-dim); margin-bottom:9px; }
  .cmp-side .cr { display:flex; justify-content:space-between; font-size:14px; padding:4px 0; }
  .cmp-side .cr b { font-weight:700; }
  .ctip { display:flex; gap:13px; background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:13px; padding:14px 15px; margin-bottom:10px; }
  .ctip:last-child { margin-bottom:0; }
  .ctip .cti { width:34px; height:34px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .ctip .ctt { font-size:14.5px; font-weight:700; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .ctip .ctin { font-size:13px; color:var(--text-dim); margin-top:3px; line-height:1.45; }
  .ctip .ctac { font-size:13px; margin-top:7px; font-weight:500; }
  .ctip .ctac .ar { color:var(--ball); }
  .cprio { font-size:10px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; padding:2px 8px; border-radius:999px; }
  .cprio.high { color:#ffb0a6; background:rgba(255,107,84,.15); }
  .cprio.med { color:var(--ball); background:var(--ball-soft); }
  .cprio.low { color:var(--us); background:var(--ball-soft); }
  @media (max-width:560px){ .cmp2 { grid-template-columns:1fr; } }
  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 60px 20px;
    font-size: 15px;
    line-height: 1.6;
    max-width: 360px; margin: 0 auto;
  }
  .empty-icon {
    font-size: 3rem; line-height: 1; margin-bottom: 1rem;
    filter: grayscale(.3);
  }
  .empty strong { color: var(--text); display: block; margin-bottom: 8px; font-size: 17px; }
  .empty .pin {
    color: var(--ball);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .match {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: background 0.15s, border-color .15s;
  }
  .match:hover { background: var(--bg-card-hover); }
  .match.win  { border-left: 3px solid var(--green); }
  .match.loss { border-left: 3px solid var(--them); }
  .match.over { border-left: 3px solid var(--green); }
  .match.in-progress { border-left: 3px solid var(--amber); }
  .match-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-bottom: 10px;
  }
  .match-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .match-sport {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    font-weight: 600;
  }
  .match-date {
    font-size: 12px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .match-score {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
    margin: 8px 0 10px;
  }
  .team {
    font-size: 14px;
    font-weight: 600;
  }
  .team.us { color: var(--us); text-align: right; }
  .team.them { color: var(--them); text-align: left; }
  .team.winner { font-weight: 700; }
  .team.winner.us::before { content: "🏆 "; font-size: 13px; }
  .team.winner.them::after { content: " 🏆"; font-size: 13px; }
  .sets {
    font-size: 28px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    text-align: center;
    white-space: nowrap;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: .02em;
  }
  .sets.us-won { color: var(--us); }
  .sets.them-won { color: var(--them); }
  .sets .sep { color: var(--text-dim); margin: 0 5px; font-weight: 400; font-size: 22px; }
  .set-history {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    margin-bottom: 12px;
  }
  .flow-wrap { margin: 4px 0 12px; }
  .flow-title {
    color: var(--text-dim); font-size: 11px;
    text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px;
  }
  .flow-chart { display: block; width: 100%; max-width: 100%; }
  /* --- Per-match detailpagina --- */
  .view-hint { margin-top:10px; font-size:12px; color:var(--ball); text-align:right; opacity:.85; }
  .match[data-id]:hover { border-color: var(--ball); }
  .detail-back { display:inline-block; margin-bottom:16px; color:var(--text-dim); text-decoration:none; font-size:14px; }
  .detail-back:hover { color:var(--ball); }
  .dcard { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:16px 18px; margin-bottom:14px; }
  .dcard-title { font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:var(--text-dim); margin-bottom:12px; }
  .exp-badge { display:inline-block; background:var(--amber,#ffc533); color:#1a1300; font-size:9px; font-weight:800; letter-spacing:.06em; padding:2px 6px; border-radius:6px; vertical-align:middle; margin-left:6px; }
  .exp-note { font-size:12px; color:var(--text-dim); line-height:1.45; margin:-4px 0 12px; }
  .dscore { display:flex; align-items:center; justify-content:center; gap:18px; margin:6px 0 4px; }
  .dscore .team { font-size:17px; font-weight:600; color:var(--text-dim); flex:1; text-align:center; }
  .dscore .team.winner { color:var(--text); }
  .dscore .sets { font-size:40px; font-weight:800; letter-spacing:1px; }
  .dscore .sets .sep { color:var(--text-dim); margin:0 6px; }
  .momentum-strip { display:block; width:100%; height:26px; border-radius:6px; }
  .pwbar { display:flex; height:30px; border-radius:8px; overflow:hidden; margin-top:6px; font-size:13px; font-weight:700; }
  .pwbar .us { background:var(--us); color:#06210f; display:flex; align-items:center; padding:0 10px; }
  .pwbar .them { background:var(--them); color:#2a0a0a; display:flex; align-items:center; justify-content:flex-end; padding:0 10px; }
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(96px,1fr)); gap:14px 18px; }
  .stat-grid .s-lbl { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim); }
  .stat-grid .s-val { font-size:20px; font-weight:700; margin-top:2px; }
  .shot-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .shot-row .s-name { width:84px; font-size:13px; color:var(--text-dim); flex-shrink:0; }
  .shot-row .s-track { flex:1; height:14px; background:rgba(255,255,255,.05); border-radius:7px; overflow:hidden; }
  .shot-row .s-fill { height:100%; border-radius:7px; }
  .shot-row .s-num { width:70px; text-align:right; font-size:13px; font-weight:600; flex-shrink:0; }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap: 8px 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-label {
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .stat-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .actions {
    margin-top: 24px;
    text-align: center;
  }
  .btn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn:hover { color: var(--them); border-color: var(--them); }
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .badge.in-progress { background: rgba(255, 184, 74, 0.15); color: var(--amber); }
  .badge.over { background: rgba(74, 222, 128, 0.15); color: var(--green); }
  .badge.saved { background: rgba(79, 179, 255, 0.15); color: var(--us); }
  .meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .meta-tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    margin-right: 4px;
    font-size: 11px;
  }

  /* --- Overall summary (top of page) --- */
  .summary {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 18px 16px;
    margin-bottom: 20px;
  }
  .summary-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 14px;
  }
  .summary-title {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
  }
  .summary-window {
    font-size: 11px;
    color: var(--text-dim);
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 14px 16px;
    margin-bottom: 16px;
  }
  .summary-stat .num {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .summary-stat .num.us  { color: var(--us); }
  .summary-stat .num.amber { color: var(--amber); }
  .summary-stat .num.green { color: var(--green); }
  .summary-stat .lbl {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 2px;
  }

  .sport-row {
    display: grid;
    grid-template-columns: minmax(80px, auto) 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    border-top: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }
  .sport-row:first-of-type { border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; }
  .sport-row .sport-name { color: var(--text); }
  .sport-row .bar {
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.05);
    overflow: hidden;
    position: relative;
  }
  .sport-row .bar-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--us), var(--ball));
    border-radius: 3px;
  }
  .sport-row .figures {
    color: var(--text-dim);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .sport-row .figures .wins { color: var(--green); font-weight: 600; }

  /* --- Per-set table inside match card --- */
  .set-table {
    margin-top: 12px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .set-table-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .set-row {
    display: grid;
    grid-template-columns: 30px 1fr 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 4px 0;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  .set-row + .set-row { border-top: 1px dashed rgba(255,255,255,0.05); }
  .set-row .set-no { color: var(--text-dim); font-size: 11px; }
  .set-row .games {
    font-weight: 700;
    color: var(--text);
  }
  .set-row .games.us-win { color: var(--us); }
  .set-row .games.them-win { color: var(--them); }
  .set-row .pts {
    color: var(--text-dim);
    font-size: 12px;
  }
  .set-row .streak {
    color: var(--text-dim);
    font-size: 11px;
    white-space: nowrap;
  }
  .set-row .streak .v { color: var(--amber); font-weight: 600; }

  /* --- Cross-match chart bar (matches per week, simple) --- */
  .activity-chart {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 36px;
    margin-top: 8px;
  }
  .activity-chart .bar {
    flex: 1;
    background: var(--us);
    opacity: 0.4;
    border-radius: 2px 2px 0 0;
    min-height: 2px;
  }
  .activity-chart .bar.active { opacity: 1; }

  /* --- Stats page: charts & records --- */
  .stats-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .stats-section-title {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    margin-bottom: 14px;
  }
  .stats-section-sub {
    color: var(--text-dim);
    font-size: 11px;
    margin-top: -10px;
    margin-bottom: 12px;
  }

  /* Filter pills voor tijdsbereik */
  .filter-pills {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-pill {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 12px;
    border-radius: 14px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .filter-pill:hover { color: var(--text); border-color: var(--text-dim); }
  .filter-pill.active {
    background: var(--us);
    color: var(--bg);
    border-color: var(--us);
    font-weight: 600;
  }

  /* SVG-chart base styles */
  .chart-svg {
    width: 100%;
    display: block;
    height: 140px;
  }
  .chart-svg .axis-label {
    font-size: 10px;
    fill: var(--text-dim);
    font-family: inherit;
  }
  .chart-svg .bar-week { fill: var(--us); transition: fill 0.15s; }
  .chart-svg .bar-week.hot { fill: var(--ball); }
  .chart-svg .bar-week.empty { fill: rgba(255,255,255,0.04); }
  .chart-svg .grid-line { stroke: rgba(255,255,255,0.04); stroke-width: 1; }
  .chart-svg .line-trend {
    fill: none;
    stroke: var(--us);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .chart-svg .line-trend-area {
    fill: var(--us);
    opacity: 0.12;
  }
  .chart-svg .dot {
    fill: var(--ball);
    stroke: var(--bg-card);
    stroke-width: 2;
  }
  .chart-svg .donut-bg { fill: rgba(255,255,255,0.06); }

  /* Hour-of-day grid */
  .hour-grid {
    display: grid;
    grid-template-columns: repeat(24, 1fr);
    gap: 2px;
    margin-top: 10px;
  }
  .hour-cell {
    aspect-ratio: 1;
    background: rgba(255,255,255,0.04);
    border-radius: 2px;
    position: relative;
  }
  .hour-cell[data-i] { background: var(--us); }
  .hour-labels {
    display: grid;
    grid-template-columns: repeat(24, 1fr);
    gap: 2px;
    margin-top: 4px;
    color: var(--text-dim);
    font-size: 9px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .hour-labels span { opacity: 0; }
  .hour-labels span:nth-child(7),
  .hour-labels span:nth-child(13),
  .hour-labels span:nth-child(19) { opacity: 0.7; }

  /* Records grid */
  .records-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
    gap: 12px;
  }
  .record {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .record-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .record-value {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .record-value.us { color: var(--us); }
  .record-value.ball { color: var(--ball); }
  .record-value.green { color: var(--green); }
  .record-value.amber { color: var(--amber); }

function t(key) {
  const e = I18N[key];
  if (!e) return key;
  return e[currentLang] || e.en || key;
}
function sportLabel(id) {
  const s = SPORTS.find(x => x.id === id) || SPORTS[0];
  return s.icon + ' ' + (s[currentLang] || s.en);
}
function formatDate(ts) {
  const d = new Date(ts);
  const today = new Date();
  const isToday = d.toDateString() === today.toDateString();
  const yest = new Date(today); yest.setDate(today.getDate() - 1);
  const isYest = d.toDateString() === yest.toDateString();
  const time = d.toLocaleTimeString(currentLang, { hour:'2-digit', minute:'2-digit' });
  if (isToday) return time;
  if (isYest) return { nl:'gisteren', en:'yesterday', de:'gestern', es:'ayer', fr:'hier' }[currentLang] + ' ' + time;
  return d.toLocaleDateString(currentLang, { day:'numeric', month:'short' }) + ' ' + time;
}
function pointLabel(m, p) {
  const o = p === 0 ? 1 : 0;
  if (m.rally || m.tiebreak) return String(m.points[p]);
  if (!m.golden && m.points[p] >= 3 && m.points[o] >= 3) {
    if (m.points[p] === m.points[o]) return '40';
    if (m.points[p] > m.points[o]) return 'Adv';
    return '40';
  }
  return ['0','15','30','40','40'][Math.min(m.points[p], 4)];
}

// Bouw het samenvatting-blok bovenaan met aggregaten over alle wedstrijden.
function renderSummary(matches) {
  const summary = document.getElementById('summary');
  if (!matches.length) { summary.style.display = 'none'; return; }
  summary.style.display = 'block';

  const finished = matches.filter(m => m.over && !m.manuallySaved);
  const wins = finished.filter(m => m.winner === 0).length;
  const winRate = finished.length > 0 ? Math.round((wins / finished.length) * 100) : null;
  const total = matches.length;

  const totalMin = matches.reduce((sum, m) => sum + (Number(m.durationMin) || 0), 0);
  const hours = Math.floor(totalMin / 60);
  const mins = Math.round(totalMin % 60);
  const timeStr = hours > 0 ? `${hours}${t('hours')} ${mins}${t('minutes')}` : `${mins} ${t('minutes')}`;

  // Beste winning streak: chronologisch (oudste eerst), tel opeenvolgende wins
  const chrono = matches.slice().sort((a, b) => a.savedAt - b.savedAt);
  let bestStreak = 0, curStreak = 0;
  for (const m of chrono) {
    if (!m.over || m.manuallySaved) { continue; }
    if (m.winner === 0) {
      curStreak += 1;
      if (curStreak > bestStreak) bestStreak = curStreak;
    } else {
      curStreak = 0;
    }
  }

  const cutoff = Date.now() - 7 * 24 * 60 * 60 * 1000;
  const last7 = matches.filter(m => m.savedAt >= cutoff).length;

  // Aanvullende metrics — totaal punten, gemiddelde duur, grootste comeback
  const totalPoints = matches.reduce((s, m) => s + (Number(m.totalPoints) || 0), 0);
  const matchesWithDuration = matches.filter(m => Number(m.durationMin) > 0);
  const avgDuration = matchesWithDuration.length > 0
    ? Math.round(matchesWithDuration.reduce((s, m) => s + m.durationMin, 0) / matchesWithDuration.length)
    : 0;

  // Beste comeback: grootste deficit (vanuit Us-perspectief) die uiteindelijk
  // werd ingehaald en winst opleverde. Vereist pointLog.
  let bestComeback = 0;
  for (const m of matches) {
    if (!Array.isArray(m.pointLog) || !m.pointLog.length) continue;
    if (!m.over || m.winner !== 0) continue;
    let diff = 0, minDiff = 0;
    for (const t of m.pointLog) {
      diff += (Number(t) === 0 ? 1 : -1);
      if (diff < minDiff) minDiff = diff;
    }
    if (Math.abs(minDiff) > bestComeback) bestComeback = Math.abs(minDiff);
  }

  // Aggregaat per sport voor de breakdown-balkjes
  const sportAgg = {};
  for (const m of matches) {
    const sId = typeof m.sport === 'number' ? m.sport : 0;
    if (!sportAgg[sId]) sportAgg[sId] = { total: 0, wins: 0, finished: 0 };
    sportAgg[sId].total += 1;
    if (m.over && !m.manuallySaved) {
      sportAgg[sId].finished += 1;
      if (m.winner === 0) sportAgg[sId].wins += 1;
    }
  }
  const sportRows = Object.keys(sportAgg)
    .map(sId => {
      const s = SPORTS.find(x => x.id === Number(sId)) || SPORTS[0];
      const a = sportAgg[sId];
      const rate = a.finished > 0 ? Math.round((a.wins / a.finished) * 100) : null;
      const barPct = total > 0 ? Math.round((a.total / total) * 100) : 0;
      return { sport: s, total: a.total, finished: a.finished, rate, barPct };
    })
    .sort((a, b) => b.total - a.total);

  const winRateStr = winRate !== null ? `${winRate}%` : '—';
  const winRateCls = winRate !== null && winRate >= 50 ? 'green' : '';

  let sportsHtml = '';
  if (sportRows.length > 1) {
    sportsHtml = `
      <div class="summary-title" style="margin-top:4px;margin-bottom:6px">${t('bySport')}</div>
      ${sportRows.map(r => `
        <div class="sport-row">
          <div class="sport-name">${r.sport.icon} ${r.sport[currentLang] || r.sport.en}</div>
          <div class="bar"><div class="bar-fill" style="width:${r.barPct}%"></div></div>
          <div class="figures">${r.total}${r.rate !== null ? ` · <span class="wins">${r.rate}%</span>` : ''}</div>
        </div>
      `).join('')}
    `;
  }

  const losses = finished.length - wins;
  const winCirclePct = finished.length > 0 ? Math.round((wins / finished.length) * 100) : 0;

  summary.innerHTML = `
    <div class="summary-head">
      <div class="summary-title">${t('overallTitle')}</div>
      <div class="summary-window">${last7 > 0 ? `${last7} · ${t('last7days')}` : ''}</div>
    </div>
    <div style="display:grid;grid-template-columns:auto 1fr;gap:16px 20px;align-items:center;margin-bottom:16px">
      <div style="text-align:center">
        <div style="font-size:38px;font-weight:800;line-height:1;color:${winRate !== null && winRate >= 50 ? 'var(--green)' : 'var(--text)'};font-variant-numeric:tabular-nums">${winRateStr}</div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-top:4px">${t('totalWinRate')}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 14px">
        <div class="summary-stat"><div class="num">${total}</div><div class="lbl">${t('totalMatches')}</div></div>

// Per-set breakdown binnen een match-card (alleen tonen als setStats data heeft).
function renderSetTable(m) {

// === STATS PAGE ===
let allMatches = [];
let activeRange = 'all';      // '7' | '30' | '90' | 'all'
let COACH_SESSIONS = [];      // slag-sessies (voor matches zonder score)
// Heeft deze match een echte score ingevuld?
function matchHasScore(m){
  const s = Array.isArray(m.sets) ? m.sets : [0,0];
  const sh = Array.isArray(m.setHistory) ? m.setHistory.length : 0;
  return (s[0]||0) > 0 || (s[1]||0) > 0 || (m.totalPoints||0) > 0 || sh > 0;
}
// Slag-sessie die qua tijd bij deze match hoort (binnen 30 min).
function sessionForMatch(m){
  if(!COACH_SESSIONS.length) return null;
  let best=null,bd=30*60*1000;
  for(const s of COACH_SESSIONS){ const d=Math.abs((s.savedTs||s.t0||0)-(m.savedAt||0)); if(d<bd){bd=d;best=s;} }
  return best;
}

function filterByRange(matches, range) {
  if (range === 'all') return matches;
  const days = Number(range);
  if (!days) return matches;
  const cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
  return matches.filter(m => m.savedAt >= cutoff);
}

function renderFilters(_matches) {
  const el = document.getElementById('filters');
  el.style.display = 'block';
  el.className = 'filter-pills';
  const ranges = [
    { id: '7',   label: t('range7')   },
    { id: '30',  label: t('range30')  },
    { id: '90',  label: t('range90')  },
    { id: 'all', label: t('rangeAll') },
  ];
  el.innerHTML = ranges.map(r =>
    `<button class="filter-pill ${activeRange === r.id ? 'active' : ''}" data-range="${r.id}">${r.label}</button>`
  ).join('');
  el.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      activeRange = btn.dataset.range;
      const filtered = filterByRange(allMatches, activeRange);
      renderStatsAndList(filtered);
    });
  });
}

// === CHARTS (handgemaakte inline SVG, geen libs) ===

function chartMatchesPerWeek(matches, weeks) {
  if (!matches.length) return '';
  weeks = weeks || 12;
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  const startMs = now.getTime() - (weeks - 1) * 7 * 24 * 60 * 60 * 1000;
  const buckets = new Array(weeks).fill(0);
  for (const m of matches) {
    const offset = Math.floor((m.savedAt - startMs) / (7 * 24 * 60 * 60 * 1000));
    if (offset >= 0 && offset < weeks) buckets[offset] += 1;
  }
  const max = Math.max(1, ...buckets);
  const w = 600, h = 110, pad = 18;
  const barW = (w - pad * 2) / weeks - 4;
  const bars = buckets.map((v, i) => {
    const x = pad + i * ((w - pad * 2) / weeks) + 2;
    const barH = (v / max) * (h - pad - 18);
    const y = h - 18 - barH;
    const cls = v === max && v > 0 ? 'bar-week hot' : (v === 0 ? 'bar-week empty' : 'bar-week');
    return `<rect class="${cls}" x="${x}" y="${y}" width="${barW}" height="${Math.max(2, barH)}" rx="2" ry="2">
      <title>${v} match${v === 1 ? '' : 'es'}</title>
    </rect>`;
  }).join('');
  // Labels: alleen eerste, midden, laatste week tonen
  const labels = [0, Math.floor(weeks / 2), weeks - 1].map(i => {
    const d = new Date(startMs + i * 7 * 24 * 60 * 60 * 1000);
    const x = pad + i * ((w - pad * 2) / weeks) + barW / 2;
    return `<text class="axis-label" x="${x}" y="${h - 4}" text-anchor="middle">${d.getDate()}/${d.getMonth() + 1}</text>`;
  }).join('');
  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${bars}${labels}</svg>`;
}

function chartTempoTrend(matches) {
  // Lijn van pointsPerMinute over de laatste N matches.
  // matches komen newest-first binnen → .slice(0, 20) = recentste 20 → sorteer
  // oplopend zodat de x-as van oud naar nieuw loopt.
  const finished = matches.filter(m => Number(m.ptsPerMin) > 0).slice(0, 20);
  if (finished.length < 3) {
    return `<div style="color:var(--text-dim);font-size:13px;text-align:center;padding:30px 0;">${t('noData')}</div>`;
  }
  finished.sort((a, b) => a.savedAt - b.savedAt);
  const values = finished.map(m => Number(m.ptsPerMin) || 0);
  const max = Math.max(...values);
  const min = Math.min(...values);
  const range = Math.max(0.5, max - min);
  const w = 600, h = 110, pad = 12;
  const xStep = (w - pad * 2) / (values.length - 1);
  const yFor = (v) => pad + (h - pad * 2) * (1 - (v - min) / range);

  const pts = values.map((v, i) => [pad + i * xStep, yFor(v)]);
  const line = 'M ' + pts.map(p => p.join(' ')).join(' L ');
  const area = line + ` L ${pts[pts.length - 1][0]} ${h - pad} L ${pad} ${h - pad} Z`;

  const dots = pts.map(([x, y], i) =>
    `<circle class="dot" cx="${x}" cy="${y}" r="3"><title>${values[i].toFixed(1)} pt/min</title></circle>`
  ).join('');

  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path class="line-trend-area" d="${area}"/>
    <path class="line-trend" d="${line}"/>
    ${dots}
  </svg>`;
}

function chartHourOfDay(matches) {
  const buckets = new Array(24).fill(0);
  for (const m of matches) {
    const d = new Date(m.savedAt);
    buckets[d.getHours()] += 1;
  }
  const max = Math.max(1, ...buckets);
  const cells = buckets.map((v, h) => {
    if (v === 0) return `<div class="hour-cell" title="${h}:00 – ${v}"></div>`;
    const opacity = 0.25 + 0.75 * (v / max);
    return `<div class="hour-cell" data-i style="opacity:${opacity.toFixed(2)}" title="${h}:00 – ${v}"></div>`;
  }).join('');
  const labels = new Array(24).fill(0).map((_, i) => `<span>${i}</span>`).join('');
  return `<div class="hour-grid">${cells}</div><div class="hour-labels">${labels}</div>`;
}

function chartSportDonut(matches) {
  if (!matches.length) return '';
  const sportAgg = {};
  for (const m of matches) {
    const s = typeof m.sport === 'number' ? m.sport : 0;
    sportAgg[s] = (sportAgg[s] || 0) + 1;
  }
  const entries = Object.entries(sportAgg)
    .map(([sId, count]) => ({ sport: SPORTS.find(x => x.id === Number(sId)) || SPORTS[0], count }))
    .sort((a, b) => b.count - a.count);
  const total = entries.reduce((s, e) => s + e.count, 0);
  const r = 50, cx = 60, cy = 60, stroke = 18;
  const circ = 2 * Math.PI * r;
  // Elke sport een eigen, vaste kleur (uit SPORTS.color).
  const col = e => e.sport.color || '#8b95a3';
  let acc = 0;
  const slices = entries.map((e) => {
    const frac = e.count / total;
    const dash = frac * circ;
    const gap = circ - dash;
    const offset = -acc;
    acc += dash;
    return `<circle r="${r}" cx="${cx}" cy="${cy}" fill="none" stroke="${col(e)}"
      stroke-width="${stroke}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${offset}"
      transform="rotate(-90 ${cx} ${cy})"/>`;
  }).join('');
  const list = entries.map((e) => {
    const pct = Math.round((e.count / total) * 100);
    return `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13px;">
      <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${col(e)}"></span>
      <span style="flex:1">${e.sport.icon} ${e.sport[currentLang] || e.sport.en}</span>
      <span style="color:var(--text-dim);font-variant-numeric:tabular-nums">${e.count} · ${pct}%</span>
    </div>`;
  }).join('');
  return `<div class="donut-row">
    <svg width="120" height="120" viewBox="0 0 120 120">
      <circle class="donut-bg" r="${r}" cx="${cx}" cy="${cy}"/>
      <g>${slices}</g>
      <text x="${cx}" y="${cy + 2}" text-anchor="middle" style="fill:var(--text);font-size:20px;font-weight:700;font-variant-numeric:tabular-nums">${total}</text>
      <text x="${cx}" y="${cy + 17}" text-anchor="middle" style="fill:var(--text-dim);font-size:9px;text-transform:uppercase;letter-spacing:0.05em">${t('totalMatches')}</text>
    </svg>
    <div>${list}</div>
  </div>`;
}

function renderCharts(matches) {
  const el = document.getElementById('charts');
  if (!matches.length) { el.style.display = 'none'; return; }
  el.style.display = 'block';

  el.innerHTML = `
    <div class="stats-section">

// === PERSONAL RECORDS ===

function computeRecords(matches) {
  if (!matches.length) return null;
  const recs = {};

  // Langste wedstrijd (duur)
  const byDuration = matches.slice().sort((a, b) => (b.durationMin || 0) - (a.durationMin || 0));
  if (byDuration[0] && byDuration[0].durationMin > 0) {
    recs.longestMatch = { value: byDuration[0].durationMin, m: byDuration[0] };
  }

  // Meeste punten in een wedstrijd
  const byPoints = matches.slice().sort((a, b) => (b.totalPoints || 0) - (a.totalPoints || 0));
  if (byPoints[0] && byPoints[0].totalPoints > 0) {
    recs.mostPoints = { value: byPoints[0].totalPoints, m: byPoints[0] };
  }

  // Langste reeks (binnen één wedstrijd)
  const byStreak = matches.slice().sort((a, b) => {
    const am = Math.max((a.longestStreak || [0,0])[0], (a.longestStreak || [0,0])[1]);
    const bm = Math.max((b.longestStreak || [0,0])[0], (b.longestStreak || [0,0])[1]);
    return bm - am;
  });
  if (byStreak[0]) {
    const ls = byStreak[0].longestStreak || [0, 0];
    const m = Math.max(ls[0], ls[1]);
    if (m > 0) recs.longestStreak = { value: m, m: byStreak[0] };
  }

  // Hoogste tempo (pts/min)
  const byTempo = matches.slice().sort((a, b) => (b.ptsPerMin || 0) - (a.ptsPerMin || 0));
  if (byTempo[0] && byTempo[0].ptsPerMin > 0) {
    recs.highestTempo = { value: byTempo[0].ptsPerMin, m: byTempo[0] };
  }

  // Grootste overwinning (verschil in sets, alleen winst voor "us")
  const wins = matches.filter(m => m.over && !m.manuallySaved && m.winner === 0 && Array.isArray(m.sets));
  wins.sort((a, b) => (b.sets[0] - b.sets[1]) - (a.sets[0] - a.sets[1]));
  if (wins[0]) {
    recs.bestWin = { value: `${wins[0].sets[0]}-${wins[0].sets[1]}`, m: wins[0] };
  }

  // Langste win-streak (over wedstrijden heen)
  const chrono = matches.slice().sort((a, b) => a.savedAt - b.savedAt);
  let cur = 0, best = 0, bestEndMatch = null, curStart = null;
  for (const m of chrono) {
    if (!m.over || m.manuallySaved) continue;
    if (m.winner === 0) {
      if (cur === 0) curStart = m;
      cur += 1;
      if (cur > best) { best = cur; bestEndMatch = m; }
    } else { cur = 0; curStart = null; }
  }
  if (best > 0) recs.winStreak = { value: best, m: bestEndMatch };

  return recs;
}

function recordCard(labelKey, value, sub, colorCls) {
  return `<div class="record">
    <div class="record-label">${t(labelKey)}</div>
    <div class="record-value ${colorCls || ''}">${value}</div>
    ${sub ? `<div class="record-sub">${sub}</div>` : ''}
  </div>`;
}

function renderRecords(matches) {
  const el = document.getElementById('records');
  const recs = computeRecords(matches);
  if (!recs || Object.keys(recs).length === 0) { el.style.display = 'none'; return; }
  el.style.display = 'block';

  const cards = [];
  if (recs.longestMatch) {
    cards.push(recordCard('recLongestMatch',
      `${recs.longestMatch.value} <span style="font-size:14px;color:var(--text-dim)">${t('minutes')}</span>`,
      formatDate(recs.longestMatch.m.savedAt),
      'ball'));
  }
  if (recs.mostPoints) {
    cards.push(recordCard('recMostPoints',
      recs.mostPoints.value,
      formatDate(recs.mostPoints.m.savedAt),
      'us'));
  }
  if (recs.longestStreak) {
    cards.push(recordCard('recLongestStreak',
      recs.longestStreak.value,
      formatDate(recs.longestStreak.m.savedAt),
      'amber'));
  }
  if (recs.highestTempo) {
    cards.push(recordCard('recHighestTempo',
      `${recs.highestTempo.value.toFixed(1)} <span style="font-size:14px;color:var(--text-dim)">${t('ptsMin')}</span>`,
      formatDate(recs.highestTempo.m.savedAt),
      'green'));
  }
  if (recs.bestWin) {
    cards.push(recordCard('recBestWin',
      recs.bestWin.value,
      formatDate(recs.bestWin.m.savedAt) + ' · sets',
      'us'));
  }
  if (recs.winStreak) {
    cards.push(recordCard('recWinStreak',
      `${recs.winStreak.value}×`,
      formatDate(recs.winStreak.m.savedAt),
      'green'));
  }

  el.innerHTML = `
    <div class="stats-section">
      <div class="stats-section-title">${t('recordsTitle')}</div>
      <div class="records-grid">${cards.join('')}</div>
    </div>
  `;
}

// === MAIN RENDER ENTRY ===

function renderStatsAndList(matches) {
  renderSummary(matches);
  renderCharts(matches);
  renderRecords(matches);

  const list = document.getElementById('list');
  const matchListTitle = document.getElementById('matchListTitle');
  matchListTitle.style.display = matches.length ? 'block' : 'none';
  matchListTitle.textContent = t('matchesTitle');
  renderMatchList(list, matches);
}

function render(matches) {
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  const actions = document.getElementById('actions');
  const summary = document.getElementById('summary');
  const filters = document.getElementById('filters');
  const charts = document.getElementById('charts');
  const records = document.getElementById('records');
  const matchListTitle = document.getElementById('matchListTitle');

  allMatches = matches;

  if (!matches.length) {
    empty.style.display = 'block';
    list.innerHTML = '';
    actions.style.display = 'none';
    summary.style.display = 'none';
    filters.style.display = 'none';
    charts.style.display = 'none';
    records.style.display = 'none';
    matchListTitle.style.display = 'none';
    return;
  }
  // Detail-modus: hash #m=<savedAt> toont één match op een eigen pagina.
  const sel = selectedMatchId();
  if (sel !== null) {
    const m = matches.find(x => String(x.savedAt) === sel);
    if (m) { renderMatchDetail(m); return; }
    location.hash = '';   // onbekende match → terug naar lijst
  }

  empty.style.display = 'none';
  actions.style.display = 'block';
  renderFilters(matches);

  const filtered = filterByRange(matches, activeRange);
  renderStatsAndList(filtered);
}

function selectedMatchId() {
  const h = location.hash || '';
  const m = h.match(/m=(\d+)/);
  return m ? m[1] : null;
}

function renderMatchList(list, matches) {

  list.innerHTML = matches.map(m => {
    const teamUs = m.teamUs || t('teamUs');
    const teamThem = m.teamThem || t('teamThem');
    const realWin = m.over && m.winner !== -1 && !m.manuallySaved;
    const usWin = realWin && m.winner === 0;
    const themWin = realWin && m.winner === 1;
    const cls = [
      m.over ? 'over' : (m.inProgress ? 'in-progress' : ''),
      usWin ? 'win' : (themWin ? 'loss' : '')
    ].filter(Boolean).join(' ');
    let badge;
    if (m.manuallySaved) {
      badge = '<span class="badge saved">' + t('saved') + '</span>';
    } else if (m.over) {
      badge = '<span class="badge over">' + t('finished') + '</span>';
    } else {
      badge = '<span class="badge in-progress">' + t('inProgress') + '</span>';
    }

    // Set history string
    let history = '';
    if (m.setHistory && m.setHistory.length) {
      history = m.setHistory.map(s => s[0] + '-' + s[1]).join('  ');
    }
    // Onvoltooide set tonen — ook bij handmatig saven
    const showUnfinished = m.hasUnfinishedSet || m.inProgress;
    if (showUnfinished && !realWin) {
      if (history) history += '  ';
      history += '(' + m.games[0] + '-' + m.games[1];
      const us = pointLabel(m, 0), them = pointLabel(m, 1);
      if (us !== '0' || them !== '0') history += ', ' + us + '-' + them;
      history += ')';
    }

    // Format + golden point tags
    const fmtLabels = { 0: t('format')+': 1 set', 1: t('format')+': Bo3', 2: t('format')+': Bo5', 3: t('format')+': Pro set', 4: t('format')+': ∞' };
    const meta = [];
    if (typeof m.fmt === 'number' && m.fmt in fmtLabels) { meta.push('<span class="meta-tag">' + fmtLabels[m.fmt] + '</span>'); }
    if (m.golden) { meta.push('<span class="meta-tag">⚡ ' + t('golden') + '</span>'); }

    const hasScore = matchHasScore(m);
    const sess = hasScore ? null : sessionForMatch(m);
    const stats = [];
    if (!hasScore && sess) {
      // Geen score → toon slag-stats van de gekoppelde AI-sessie
      stats.push(`<div class="stat"><span class="stat-label">${t('shotsLabel')||'Slagen'}</span><span class="stat-value">${sess.totalSwings||0}</span></div>`);
      if (sess.durationMin) stats.push(`<div class="stat"><span class="stat-label">${t('duration')}</span><span class="stat-value">${Math.round(sess.durationMin)} ${t('minutes')}</span></div>`);
      if (sess.powAvg) stats.push(`<div class="stat"><span class="stat-label">${t('avgPowerLabel')||'Gem. kracht'}</span><span class="stat-value">${Math.round(sess.powAvg)}</span></div>`);
      if (sess.powPeak) stats.push(`<div class="stat"><span class="stat-label">${t('power')||'Kracht'}</span><span class="stat-value">${Math.round(sess.powPeak)}</span></div>`);
    } else if (hasScore) {
      stats.push(`<div class="stat"><span class="stat-label">${t('duration')}</span><span class="stat-value">${m.durationMin} ${t('minutes')}</span></div>`);
      stats.push(`<div class="stat"><span class="stat-label">${t('points')}</span><span class="stat-value">${m.totalPoints}</span></div>`);
      stats.push(`<div class="stat"><span class="stat-label">${t('streak')}</span><span class="stat-value">${m.longestStreak[0]} / ${m.longestStreak[1]}</span></div>`);
    }
    if (hasScore && m.ptsPerMin > 0) {
      stats.push(`<div class="stat"><span class="stat-label">${t('tempo')}</span><span class="stat-value">${m.ptsPerMin.toFixed(1)} ${t('ptsMin')}</span></div>`);
    }
    if (m.avgPtsGame > 0) {
      stats.push(`<div class="stat"><span class="stat-label">${t('avgGame')}</span><span class="stat-value">${m.avgPtsGame.toFixed(1)}</span></div>`);
    }
    if (m.tiebreaks > 0) {
      stats.push(`<div class="stat"><span class="stat-label">${t('tiebreaks')}</span><span class="stat-value">${m.tiebreaks}</span></div>`);
    }
    if (m.deuceGames > 0) {
      stats.push(`<div class="stat"><span class="stat-label">${t('deuces')}</span><span class="stat-value">${m.deuceGames}</span></div>`);
    }
    if (m.sideSwitches > 0) {
      stats.push(`<div class="stat"><span class="stat-label">${t('sideSwitch')}</span><span class="stat-value">${m.sideSwitches}</span></div>`);
    }

    // Match-flow chart: cumulatieve scoreverschuiving per punt (Us+1 / Them-1)
    const flowAttr = (Array.isArray(m.pointLog) && m.pointLog.length > 1)
      ? `data-flow="${m.pointLog.join(',')}"` : '';
    const flowHtml = flowAttr
      ? `<div class="flow-wrap"><div class="flow-title">${t('flowTitle') || 'Match flow'}</div>

        ${flowHtml}

// L2: NL/EN keuze voor de coach-teksten.
function L2(nl,en){ return currentLang==='nl'?nl:en; }

// Momentum: per punt een gekleurd segment (Us = groen, Them = rood).
function drawMomentumStrip(canvas) {
  const pl = (canvas.getAttribute('data-flow')||'').split(',').map(s => Number(s) === 1 ? 1 : 0);
  if (!pl.length) return;
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || canvas.parentElement.clientWidth || 280;
  const cssH = 26;
  canvas.style.width = cssW + 'px'; canvas.style.height = cssH + 'px';
  canvas.width = cssW * dpr; canvas.height = cssH * dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  const css = getComputedStyle(document.documentElement);
  const usC = (css.getPropertyValue('--us')||'#33d94b').trim();
  const themC = (css.getPropertyValue('--them')||'#e0564f').trim();
  const w = cssW / pl.length;
  for (let i = 0; i < pl.length; i++) {
    ctx.fillStyle = pl[i] === 0 ? usC : themC;
    ctx.fillRect(i * w, 0, Math.ceil(w) + 0.5, cssH);
  }
}

// Wie speelt beter — 2 lijnen (voortschrijdend venster). Per punt: hoeveel
// punten elk team won in de laatste W punten. Lijn die hoger ligt = speelt op
// dat moment beter; een kruising = momentum-omslag.
function drawPerfLines(canvas) {
  const seq = (canvas.getAttribute('data-flow')||'').split(',').map(s => Number(s) === 1 ? 1 : 0);
  if (seq.length < 4) return;
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || canvas.parentElement.clientWidth || 280;
  const cssH = canvas.height || 130;
  canvas.style.width = cssW + 'px'; canvas.style.height = cssH + 'px';
  canvas.width = cssW * dpr; canvas.height = cssH * dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  const css = getComputedStyle(document.documentElement);
  const usC = (css.getPropertyValue('--us')||'#33d94b').trim();
  const themC = (css.getPropertyValue('--them')||'#e0564f').trim();

  const W = Math.min(15, Math.max(5, Math.round(seq.length / 12)));
  const us = [], them = [];
  for (let i = 0; i < seq.length; i++) {
    const a = Math.max(0, i - W + 1);
    let u = 0, th = 0;
    for (let j = a; j <= i; j++) { if (seq[j] === 0) u++; else th++; }
    us.push(u); them.push(th);
  }
  const padX = 8, padY = 10;
  const innerW = cssW - 2*padX, innerH = cssH - 2*padY;
  const xAt = i => padX + (i/(seq.length-1))*innerW;
  const yAt = v => padY + innerH - (v/W)*innerH;

  // middenlijn (50%)
  ctx.strokeStyle = 'rgba(127,174,159,.25)'; ctx.setLineDash([3,3]); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(padX, yAt(W/2)); ctx.lineTo(cssW-padX, yAt(W/2)); ctx.stroke(); ctx.setLineDash([]);

  const line = (arr, col) => {
    ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.beginPath();
    arr.forEach((v, i) => { const x = xAt(i), y = yAt(v); i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y); });
    ctx.stroke();
  };
  line(them, themC);
  line(us, usC);
}

// Wie speelde beter per periode: deel de match in segmenten; per segment een
// divergerende staaf vanaf de middenlijn — omhoog/groen = Us pakte de meeste
// punten, omlaag/rood = Them. Hoogte = mate van overwicht.
function drawDominance(canvas) {
  const pl = (canvas.getAttribute('data-flow')||'').split(',').map(s => Number(s) === 1 ? 1 : 0);
  if (pl.length < 2) return;
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || canvas.parentElement.clientWidth || 280;
  const cssH = canvas.height || 120;
  canvas.style.width = cssW + 'px'; canvas.style.height = cssH + 'px';
  canvas.width = cssW * dpr; canvas.height = cssH * dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  const css = getComputedStyle(document.documentElement);
  const usC = (css.getPropertyValue('--us')||'#33d94b').trim();
  const themC = (css.getPropertyValue('--them')||'#e0564f').trim();

  const SEG = Math.min(12, Math.max(4, Math.round(pl.length / 6)));
  const per = pl.length / SEG;
  const padX = 6, padY = 8, gap = 4;
  const innerW = cssW - 2*padX;
  const midY = padY + (cssH - 2*padY)/2;
  const halfH = (cssH - 2*padY)/2;
  const bw = (innerW - gap*(SEG-1)) / SEG;

  // middenlijn
  ctx.strokeStyle = 'rgba(127,174,159,.35)'; ctx.setLineDash([3,3]); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(padX, midY); ctx.lineTo(cssW-padX, midY); ctx.stroke(); ctx.setLineDash([]);

  for (let s = 0; s < SEG; s++) {
    const a = Math.floor(s*per), b = Math.floor((s+1)*per);
    let us = 0, tot = 0;
    for (let i = a; i < b && i < pl.length; i++) { tot++; if (pl[i] === 0) us++; }
    if (!tot) continue;
    const net = (us/tot) - 0.5;           // -0.5..+0.5
    const h = Math.abs(net) * 2 * halfH;
    const x = padX + s*(bw+gap);
    ctx.fillStyle = net >= 0 ? usC : themC;
    if (net >= 0) ctx.fillRect(x, midY - h, bw, h);
    else ctx.fillRect(x, midY, bw, h);
  }
}

// Haal coach-data (slagen) op en koppel de sessie die qua tijd het dichtst bij
// deze match ligt. Toont een slagverdeling als er een match is.
async function loadShotsForMatch(m) {
  const showEmpty = () => { const e=document.getElementById('aiEmpty'); if(e) e.style.display='block'; };
  if (m && m._shots) { renderShots(m._shots); return; }
  try {
    const r = await fetch(`/beta/coach-data/${PIN}?beta=${encodeURIComponent(BETA_KEY)}`);
    if (!r.ok) { showEmpty(); return; }
    const j = await r.json();
    const sessions = (j.sessions || []);
    if (!sessions.length) { showEmpty(); return; }
    // Beste match op tijd: |session.savedTs - match.savedAt| binnen 30 min.
    let best = null, bestDiff = 30 * 60 * 1000;
    for (const s of sessions) {
      const ts = s.savedTs || s.t0 || 0;
      const d = Math.abs(ts - m.savedAt);
      if (d < bestDiff) { bestDiff = d; best = s; }
    }
    if (!best || !best.cls) { showEmpty(); return; }
    renderShots(best);
  } catch (_) { showEmpty(); }
}

function renderShots(s) {
  const cls = s.cls || {};
  const present = SHOT_ORDER.filter(k => (cls[k]||0) > 0);
  if (!present.length) return;
  const total = present.reduce((a,k) => a + (cls[k]||0), 0) || 1;
  const maxN = Math.max(...present.map(k => cls[k]||0), 1);
  const rows = present.map(k => {
    const n = cls[k]||0;
    return `<div class="shot-row">
      <span class="s-name">${t(SHOT_LBL[k])}</span>
      <span class="s-track"><span class="s-fill" style="width:${Math.round(100*n/maxN)}%;background:${SHOT_COL[k]}"></span></span>
      <span class="s-num">${n} · ${Math.round(100*n/total)}%</span>
    </div>`;
  }).join('');
  // Graph 6 — Kracht per slag: balken van gem. kracht per slagtype.
  const pw = s.powByCls || {};
  const pwPresent = SHOT_ORDER.filter(k => (pw[k]||0) > 0);
  const maxPw = Math.max(...pwPresent.map(k => pw[k]||0), 1);
  const powRows = pwPresent.map(k => `<div class="shot-row">
      <span class="s-name">${t(SHOT_LBL[k])}</span>
      <span class="s-track"><span class="s-fill" style="width:${Math.round(100*(pw[k])/maxPw)}%;background:${SHOT_COL[k]}"></span></span>
      <span class="s-num">${Math.round(pw[k])}</span>
    </div>`).join('');
  const powBlock = powRows ? `<div class="dcard-title" style="margin-top:18px">${t('powerByShotTitle')}</div>${powRows}` : '';

  // Graph 8 — Slagen over tijd: aantal slagen per ~5-min segment.
  const segs = Array.isArray(s.segments) ? s.segments : [];
  const segBlock = segs.length > 1
    ? `<div class="dcard-title" style="margin-top:18px">${t('shotsTimelineTitle')}</div>
       <canvas class="shots-timeline" data-segs="${segs.map(x=>x.swings||0).join(',')}" height="90"></canvas>` : '';

  const sb = document.getElementById('shotsBody'); if(!sb) return;
  sb.innerHTML =
    `<div style="font-size:13px;color:var(--text-dim);margin-bottom:10px">${t('totalShots')}: <b style="color:var(--text)">${s.totalSwings||total}</b>${s.powAvg?` · ${t('power')} ⌀ ${Math.round(s.powAvg)}`:''}</div>${rows}
     ${powBlock}
     ${segBlock}`;
  document.getElementById('shotsCard').style.display = 'block';
  document.querySelectorAll('canvas.shots-timeline').forEach(c => drawSegmentBars(c));
  renderCoachAnalysis(s);
}

// Volledige AI-coach analyse (samenvatting, conditie, tips) inline op de AI-tab.
function renderCoachAnalysis(s){
  const host = document.getElementById('coachExtra'); if(!host) return;
  const C=s.cls||{}, N=s.totalSwings||0;
  const fh=C.forehand||0, bh=C.backhand||0, ground=fh+bh;
  const vol=(C.volley_forehand||0)+(C.volley_backhand||0), sm=C.smash||0;
  const fhp=ground?Math.round(100*fh/ground):0, net=N?Math.round(100*vol/N):0;
  const fc=Number(s.fatiguePct)||0;
  let sum;
  if(ground===0) sum=L2(`Sterke sessie met <b>${N} slagen</b>. Blijf variëren.`,`Strong session with <b>${N} strokes</b>. Keep varying.`);
  else if(fhp>=60) sum=L2(`Je speelde <b>forehand-zwaar</b> (${fhp}%) ${fc<=-12?'maar je kracht zakte tegen het eind':'met stabiele kracht'}. Je backhand bleef achter — daar ligt je grootste winst.`,`Forehand-heavy (${fhp}%) ${fc<=-12?'but power dropped late':'with stable power'}. Your backhand lagged — biggest gain there.`);
  else if(fhp<=40) sum=L2(`Backhand-gedreven (${100-fhp}%). Je backhand draagt het spel — zoek je forehand vaker als wapen.`,`Backhand-driven (${100-fhp}%). Use your forehand more.`);
  else sum=L2(`Mooi gebalanceerd: forehand en backhand in evenwicht. Lastig te bespelen.`,`Nicely balanced. Hard to play against.`);
  const segs=Array.isArray(s.segments)?s.segments:[];
  const half=Math.max(1,Math.floor(segs.length/2));
  const fAct=segs.slice(0,half).reduce((a,x)=>a+(x.swings||0),0), lAct=segs.slice(segs.length-half).reduce((a,x)=>a+(x.swings||0),0);
  const fpA=segs.slice(0,half).filter(x=>x.power>0).map(x=>x.power), lpA=segs.slice(segs.length-half).filter(x=>x.power>0).map(x=>x.power);
  const fp=fpA.length?Math.round(fpA.reduce((a,b)=>a+b,0)/fpA.length):0, lp=lpA.length?Math.round(lpA.reduce((a,b)=>a+b,0)/lpA.length):0;

  if(s.powByCls&&s.powByCls.backhand&&s.powByCls.forehand&&s.powByCls.backhand<s.powByCls.forehand*0.8) tips.push(['med',L2('Backhand-kracht omhoog','More backhand power'),L2(`Je backhand komt ~${Math.round(100-100*s.powByCls.backhand/s.powByCls.forehand)}% zachter uit.`,`Backhand ~${Math.round(100-100*s.powByCls.backhand/s.powByCls.forehand)}% softer.`),L2('Train rotatie en gewichtsoverdracht.','Train rotation and weight transfer.')]);
  if(net<7&&ground>0) tips.push(['med',L2('Vaker naar het net','Go to the net more'),L2(`Weinig volleys (${net}%).`,`Few volleys (${net}%).`),L2('Na elke diepe bal doorlopen en afronden.','After each deep ball, move in and finish.')]);

  if(fc<=-12) tips.push(['high',L2('Conditie laat los','Condition fades'),L2(`Je kracht zakte ${Math.abs(fc)}% in de tweede helft.`,`Power dropped ${Math.abs(fc)}% late.`),L2('Bouw uithoudingsvermogen op.','Build endurance.')]);
  if(!tips.length) tips.push(['low',L2('Sterke sessie','Strong session'),L2('Geen duidelijke zwakke plekken.','No clear weak spots.'),L2('Blijf gevarieerd spelen.','Keep playing varied.')]);
  const rank={high:0,med:1,low:2}; tips.sort((a,b)=>rank[a[0]]-rank[b[0]]);
  const prioL={high:L2('Hoog','High'),med:L2('Middel','Med'),low:L2('Laag','Low')};
  host.innerHTML=`

      <div class="cmp2">

function rgbaOf(v,a){ const m={'var(--us)':'74,222,128','var(--them)':'255,107,84','var(--ball)':'196,255,0'}; return m[v]?`rgba(${m[v]},${a})`:v; }
function tipIcon(){ return `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M12 8v4M12 16h.01"/></svg>`; }

// Staafdiagram: slagen per tijd-segment (graph 8).
function drawSegmentBars(canvas) {
  const vals = (canvas.getAttribute('data-segs')||'').split(',').map(Number);
  if (!vals.length) return;
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || canvas.parentElement.clientWidth || 280;
  const cssH = canvas.height || 90;
  canvas.style.width = cssW + 'px'; canvas.style.height = cssH + 'px';
  canvas.width = cssW * dpr; canvas.height = cssH * dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--us').trim() || '#33d94b';
  const max = Math.max(...vals, 1);
  const padX = 4, padB = 14, padT = 4, gap = 4;
  const bw = (cssW - 2*padX - gap*(vals.length-1)) / vals.length;
  const h = cssH - padB - padT;
  ctx.fillStyle = accent;
  vals.forEach((v, i) => {
    const bh = (v / max) * h;
    const x = padX + i*(bw+gap);
    ctx.globalAlpha = 0.85;
    ctx.fillRect(x, padT + h - bh, bw, bh);
  });
  ctx.globalAlpha = 1;
  // segment-labels (1,2,3…)
  ctx.fillStyle = 'rgba(255,255,255,.35)'; ctx.font = '9px system-ui'; ctx.textAlign = 'center';
  vals.forEach((v, i) => { ctx.fillText(String(i+1), padX + i*(bw+gap) + bw/2, cssH - 3); });
}

// Match-flow chart: line van cumulative score-diff (Us = +1, Them = -1).
// Boven de baseline = Us was voor; onder = Them was voor.
function drawFlowChart(canvas) {
  const raw = canvas.getAttribute('data-flow') || '';
  const pl = raw.split(',').map(s => Number(s) === 1 ? 1 : 0);
  if (pl.length < 2) return;

  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || canvas.parentElement.clientWidth || 280;
  const cssH = canvas.height || 64;
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Cumulatieve diff: Us=0 wint → +1, Them=1 wint → -1
  let diff = 0;
  const pts = [0];
  for (const t of pl) { diff += (t === 0 ? 1 : -1); pts.push(diff); }

  const maxAbs = Math.max(1, ...pts.map(p => Math.abs(p)));
  const padX = 6, padY = 6;
  const innerW = cssW - 2 * padX;
  const innerH = cssH - 2 * padY;
  const midY = padY + innerH / 2;

  // Zero-line
  ctx.strokeStyle = 'rgba(127,174,159,.4)';
  ctx.setLineDash([3, 3]);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padX, midY);
  ctx.lineTo(padX + innerW, midY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Area fill (gradient): boven baseline = us color, onder = them color
  const xAt = (i) => padX + (i / (pts.length - 1)) * innerW;
  const yAt = (v) => midY - (v / maxAbs) * (innerH / 2);

  // Theme accent uit CSS-variable lezen (zo respecteert chart de gekozen theme)
  const cssVar = (n) => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
  const accent = cssVar('--ball') || '#c4ff00';
  const them = cssVar('--them') || '#ff5a3c';
  function hexToRgba(h, a) {
    const c = h.replace('#','');
    const r = parseInt(c.length === 3 ? c[0]+c[0] : c.slice(0,2), 16);
    const g = parseInt(c.length === 3 ? c[1]+c[1] : c.slice(2,4), 16);
    const b = parseInt(c.length === 3 ? c[2]+c[2] : c.slice(4,6), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  // Subtle area fill in accent color
  ctx.fillStyle = hexToRgba(accent, .08);
  ctx.beginPath();
  ctx.moveTo(xAt(0), midY);
  pts.forEach((v, i) => { ctx.lineTo(xAt(i), yAt(v)); });
  ctx.lineTo(xAt(pts.length - 1), midY);
  ctx.closePath();
  ctx.fill();

  // Flow line
  ctx.strokeStyle = accent;
  ctx.lineWidth = 1.8;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  pts.forEach((v, i) => {
    const x = xAt(i), y = yAt(v);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Set-grenzen (graph 4 — kantelpunten): verticale markers waar een set eindigde.
  const braw = canvas.getAttribute('data-bounds') || '';
  if (braw) {
    const bounds = braw.split(',').map(Number).filter(n => n > 0 && n < pts.length);
    ctx.strokeStyle = hexToRgba(accent, .5);
    ctx.fillStyle = hexToRgba(accent, .85);
    ctx.lineWidth = 1;
    ctx.font = '9px system-ui';
    for (const bI of bounds) {
      const x = xAt(bI);
      ctx.setLineDash([2, 2]);
      ctx.beginPath(); ctx.moveTo(x, padY); ctx.lineTo(x, padY + innerH); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillRect(x - 1.5, padY, 3, 3);   // tickje bovenaan
    }
  }

  // Eindmarker
  const lastV = pts[pts.length - 1];
  ctx.fillStyle = lastV >= 0 ? accent : them;
  ctx.beginPath();
  ctx.arc(xAt(pts.length - 1), yAt(lastV), 3, 0, Math.PI * 2);
  ctx.fill();
}
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function showPinForm() {
  // Als er al een PIN in localStorage staat (vorige sessie of het scoreboard
  // heeft 'm bewaard), direct doorsturen naar de juiste history — geen
  // extra invul-stap nodig.
  const savedPin = localStorage.getItem('rallypointPin');
  if (savedPin && /^\d{4}$/.test(savedPin)) {
    location.replace('/history/' + savedPin);
    return;
  }
  document.getElementById('pinValue').innerHTML =
    '<input type="text" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" id="pinInput" ' +
    'placeholder="0000" style="background:transparent;border:1px solid var(--border);' +
    'border-radius:6px;padding:4px 8px;color:var(--ball);font:inherit;font-weight:600;' +
    'width:80px;font-variant-numeric:tabular-nums;letter-spacing:0.1em;text-align:center;">';
  const inp = document.getElementById('pinInput');
  const remembered = localStorage.getItem('rallypointPin');
  if (remembered && /^\d{4}$/.test(remembered)) { inp.value = remembered; }
  inp.focus();
  inp.addEventListener('input', e => {
    e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4);

      localStorage.setItem('rallypointPin', e.target.value);

    }

  document.getElementById('emptyBody').innerHTML =
    { nl: 'Vul je 4-cijferige PIN in om je wedstrijdgeschiedenis te zien.',
      en: 'Enter your 4-digit PIN above to see your match history.',
      de: 'Gib oben deine 4-stellige PIN ein, um deinen Verlauf zu sehen.',
      es: 'Introduce arriba tu PIN de 4 dígitos para ver tu historial.',
      fr: 'Saisissez votre code PIN à 4 chiffres ci-dessus pour voir votre historique.'
    }[currentLang] || 'Enter your 4-digit PIN above to see your match history.';
  document.getElementById('empty').style.display = 'block';
}

function cacheKey(pin) { return 'rallypoint-history-' + pin; }

function loadCached(pin) {
  try {
    const raw = localStorage.getItem(cacheKey(pin));
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) { return []; }
}

function saveCached(pin, list) {
  try {
    localStorage.setItem(cacheKey(pin), JSON.stringify(list.slice(0, 100)));
  } catch (e) {}
}

// Server + browser-cache mergen: dedupliceren via savedAt-tijdstempel.
// Op die manier blijven wedstrijden zichtbaar zelfs als Render de gratis
// disk wist tussen deploys — de browser onthoudt zijn eigen kopie.
function mergeMatches(server, local) {
  const seen = new Map();
  for (const m of [...server, ...local]) {
    if (!m || typeof m.savedAt !== 'number') continue;
    if (!seen.has(m.savedAt)) { seen.set(m.savedAt, m); }
  }
  return Array.from(seen.values()).sort((a, b) => b.savedAt - a.savedAt).slice(0, 100);
}

async function load() {
  if (!PIN) {
    // Ingelogde user: automatisch naar zijn/haar PIN sturen
    try {
      const r = await fetch('/api/auth/me');
      if (r.ok) {
        const me = await r.json();
        const pins = (me.pins || []).filter(p => /^\d{4}$/.test(p));
        if (pins.length === 1) {
          location.replace('/history/' + pins[0]);
          return;
        }
        if (pins.length > 1) {
          showWatchPickerHistory(pins);
          return;
        }
      }
    } catch (_) {}
    showPinForm();
    return;
  }
  localStorage.setItem('rallypointPin', PIN);
  document.getElementById('pinValue').textContent = PIN;
  document.getElementById('backBtn').href = '/';
  const lb = document.getElementById('liveBtn');
  if (lb) { lb.href = '/?pin=' + PIN; lb.style.display = 'inline-flex'; }

  const cached = loadCached(PIN);
  if (cached.length) { render(cached); }  // direct iets tonen terwijl server laadt

  let server = [];
  try {
    const r = await fetch('/history/' + PIN, { headers: { 'Accept': 'application/json' } });
    const data = await r.json();
    server = Array.isArray(data) ? data : [];
  } catch (e) {}

  // Slagdata één keer ophalen — voor matches zonder score tonen we slag-stats.
  try {
    const cr = await fetch(`/beta/coach-data/${PIN}?beta=${encodeURIComponent(BETA_KEY)}`);
    if (cr.ok) { const cd = await cr.json(); COACH_SESSIONS = Array.isArray(cd.sessions) ? cd.sessions : []; }
  } catch (e) {}

  let merged = mergeMatches(server, cached);
  saveCached(PIN, merged);
  // Demo-match alleen tonen als de link er expliciet naar verwijst (preview).
  if (selectedMatchId() === String(DEMO_MATCH.savedAt) && !merged.some(m => m.savedAt === DEMO_MATCH.savedAt)) {
    merged = [DEMO_MATCH, ...merged];
  }
  render(merged);
}

      <div style="font-size:17px;font-weight:600;margin-bottom:8px;color:var(--text)">Kies een horloge</div>
      <div style="color:var(--text-dim);font-size:14px;margin-bottom:24px">Je hebt meerdere horloges gekoppeld</div>

            PIN ${p}
          </a>
        `).join('')}
      </div>
    </div>
  `;
}
