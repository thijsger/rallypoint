<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live — RallyPoint Spectator</title>
<script src="/js/theme-init.js"></script>
<link rel="icon" href="/img/logo.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c0f12">
<link rel="apple-touch-icon" href="/img/logo.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap');
  :root {
    --bg: #0a0d10; --panel: #181d24; --border: #2a3038;
    --ink: #ffffff; --muted: #8b95a3;
    --ball: #c4ff00; --them: #ff6b54;
    --bg-glow: rgba(196,255,0,.045);
  }
  html[data-theme="ice"]    { --ball: #00d4ff; --bg-glow: rgba(0,212,255,.045); }
  html[data-theme="sunset"] { --ball: #ff9533; --bg-glow: rgba(255,149,51,.045); }
  html[data-theme="mono"]   { --ball: #ffffff; --bg-glow: rgba(255,255,255,.03); }
  html[data-theme="court"]  { --ball: #4ade80; --bg-glow: rgba(74,222,128,.045); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background-color: var(--user-bg, var(--bg));
    background-image: var(--user-bg-image, radial-gradient(ellipse 80% 50% at 50% 0%, var(--bg-glow), transparent 60%));
    background-attachment: fixed;
    color: var(--ink); min-height: 100dvh;
    display: flex; flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }
  .top-bar {
    padding: 1rem 1.25rem; display: flex; align-items: center; gap: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .top-bar .back {
    color: var(--muted); text-decoration: none; font-size: .85rem;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .top-bar .back:hover { color: var(--ball); }
  .top-bar .owner {
    flex: 1; min-width: 0; display: flex; align-items: center; gap: .7rem;
  }
  .owner-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--bg); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    color: var(--ball);
  }
  .owner-info { line-height: 1.1; }
  .owner-name { font-weight: 600; font-size: .95rem; }
  .owner-sport {
    color: var(--muted); font-size: .7rem; letter-spacing: .14em;
    text-transform: uppercase; margin-top: 2px;
  }
  .live-pill {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--ball); font-size: .7rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: .14em;
    padding: .35rem .65rem; border: 1px solid var(--ball);
    border-radius: 100px;
  }
  .live-pill .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--ball);
    box-shadow: 0 0 8px var(--ball); animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  .voice-btn {
    background: var(--panel); color: var(--ink);
    border: 1px solid var(--border); border-radius: 10px;
    font-family: 'Inter', sans-serif; font-size: .82rem; font-weight: 500;
    padding: .55rem .8rem; cursor: pointer;
    display: inline-flex; align-items: center; gap: .4rem;
    transition: all .15s;
  }
  .voice-btn:hover { border-color: var(--ball); }
  .voice-btn.active {
    background: var(--ball); color: #0a0d10; border-color: var(--ball);
  }
  .voice-btn svg { width: 16px; height: 16px; }

  /* Score area */
  main {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 2rem 1.25rem;
    text-align: center;
  }
  .sets-row {
    color: var(--muted); font-size: .75rem; letter-spacing: .2em;
    text-transform: uppercase; margin-bottom: 1rem; font-weight: 500;
  }
  .sets-row b {
    color: var(--ink); font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 1.5rem; letter-spacing: .04em;
    margin: 0 .3rem;
  }
  .teams {
    display: grid; grid-template-columns: 1fr 1.6fr 1fr;
    gap: 1rem; align-items: center; width: 100%; max-width: 960px;
  }
  .team-side { text-align: center; }
  .team-name {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
    font-size: clamp(1.1rem, 3.5vw, 1.7rem); text-transform: uppercase;
    color: var(--muted-hi, #b8c1ce); letter-spacing: .04em;
  }
  .team-side.serving .team-name { color: var(--ball); }
  .score-col {
    display: flex; align-items: center; justify-content: center;
  }
  .score-wrap {
    display: flex; align-items: baseline; gap: .15em; justify-content: center;
  }
  .points {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: clamp(5.5rem, 20vw, 11rem); line-height: .9;
    color: var(--ink);
  }
  .points.flash { animation: flash .4s ease; }
  @keyframes flash { 0% { color: var(--ball); transform: scale(1.05); } 100% { color: var(--ink); transform: none; } }
  .divider {
    color: var(--muted); font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: clamp(2.5rem, 8vw, 4.5rem); line-height: 1;
  }
  .games-row {
    display: flex; gap: 2rem; justify-content: center;
    margin-top: 1.5rem;
  }
  .games-row > div {
    color: var(--muted); font-size: .72rem; letter-spacing: .18em;
    text-transform: uppercase; font-weight: 500;
  }
  .games-row b {
    color: var(--ink); font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 1.3rem; margin-left: .35rem;
  }
  .tag-row {
    margin-top: 1.5rem; display: flex; gap: .6rem; justify-content: center;
  }
  .tag {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 100px; padding: .4rem .8rem;
    color: var(--muted-hi, #b8c1ce); font-size: .72rem;
    text-transform: uppercase; letter-spacing: .1em; font-weight: 600;
  }
  .tag.accent { color: var(--ball); border-color: var(--ball); }
  .error-state {
    text-align: center; padding: 3rem 1rem; color: var(--muted);
  }
  .error-state h2 {
    color: var(--ink); font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 1.4rem; text-transform: uppercase;
    margin-bottom: .8rem;
  }
  audio { display: none; }
</style>
<!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7J6B72EYMQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7J6B72EYMQ');
  </script>
</head>
<body>
<div class="top-bar">
  <a href="/spectator" class="back">← Spectator</a>
  <div class="owner">
    <div class="owner-avatar" id="ownerAvatar">·</div>
    <div class="owner-info">
      <div class="owner-name" id="ownerName">—</div>
      <div class="owner-sport" id="ownerSport">—</div>
    </div>
  </div>
  <span class="live-pill"><span class="dot"></span>Live</span>
  <button class="voice-btn" id="voiceBtn" title="Spraak aan/uit" aria-label="Spraak">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
  </button>
</div>

<main id="main">
  <div id="liveContent" style="display:none;width:100%">
    <div class="sets-row" id="setsLine">SETS <b id="setsScore">0–0</b></div>
    <div class="teams">
      <div class="team-side" id="teamUsSide">
        <div class="team-name" id="teamUsName">Us</div>
      </div>
      <div class="score-col">
        <div class="score-wrap">
          <span class="points" id="ptUs">0</span>
          <span class="divider">–</span>
          <span class="points" id="ptThem">0</span>
        </div>
      </div>
      <div class="team-side" id="teamThemSide">
        <div class="team-name" id="teamThemName">Them</div>
      </div>
    </div>
    <div class="games-row">
      <div>Games <b id="gameScore">0–0</b></div>
    </div>
    <div class="tag-row" id="tagRow"></div>
  </div>
  <div id="errorState" class="error-state" style="display:none">
    <h2 id="errTitle">Match niet gevonden</h2>
    <p id="errBody">Deze PIN heeft op dit moment geen actieve match, of de eigenaar heeft de match niet publiek gemaakt.</p>
    <a href="/spectator" style="display:inline-block;margin-top:1rem;color:var(--ball)">← Terug naar spectator</a>
  </div>
</main>

<audio id="ttsPlayer" preload="none" playsinline></audio>

<script>
  const PIN = '__PIN__';
  const SPORTS = ['Padel','Tennis','Pickleball','Tafeltennis','Badminton','Squash'];
  const ttsPlayer = document.getElementById('ttsPlayer');
  const voiceBtn = document.getElementById('voiceBtn');

  let voiceOn = localStorage.getItem('spectateVoice') === '1';
  let prevState = null;
  let currentLang = 'nl';
  let audioUnlocked = false;
  let ended = false;

  if (voiceOn) voiceBtn.classList.add('active');
  voiceBtn.addEventListener('click', () => {
    voiceOn = !voiceOn;
    audioUnlocked = true;
    localStorage.setItem('spectateVoice', voiceOn ? '1' : '0');
    voiceBtn.classList.toggle('active', voiceOn);
    if (voiceOn) speak(TR.voiceOn[currentLang] || TR.voiceOn.nl);
    else { try { ttsPlayer.pause(); } catch (_) {} }
  });

  document.addEventListener('click', function unlock() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    if (voiceOn) speak(TR.voiceOn[currentLang] || TR.voiceOn.nl);
  }, { once: true, capture: true });

  // --- Meertalige uitspraakreeksen (zelfde als index.html) ---
  const TR = {
    voiceOn:          { nl:'Voorlezen staat aan.',   en:'Reading is on.',        de:'Vorlesen ist ein.',       es:'Lectura activada.',             fr:'Lecture activée.' },
    spokenMatchWon:   { nl:'{name} wint de wedstrijd, {a} tegen {b} in sets.', en:'{name} wins the match, {a} to {b} in sets.', de:'{name} gewinnt das Spiel, {a} zu {b} in Sätzen.', es:'{name} gana el partido, {a} a {b} en sets.', fr:'{name} remporte le match, {a} à {b} en sets.' },
    spokenSetWon:     { nl:'Set gewonnen. Sets {a} tegen {b}.', en:'Set won. Sets {a} to {b}.', de:'Satz gewonnen. Sätze {a} zu {b}.', es:'Set ganado. Sets {a} a {b}.', fr:'Set gagné. Sets {a} à {b}.' },
    spokenGameWon:    { nl:'Game. Games {a} tegen {b}.', en:'Game. Games {a} to {b}.', de:'Spiel. Spiele {a} zu {b}.', es:'Juego. Juegos {a} a {b}.', fr:'Jeu. Jeux {a} à {b}.' },
    spokenDeuce:      { nl:'Deuce.',                 en:'Deuce.',                de:'Einstand.',               es:'Iguales.',                      fr:'Égalité.' },
    spokenEqual:      { nl:'{n} gelijk.',            en:'{n} all.',              de:'{n} beide.',              es:'{n} iguales.',                  fr:'{n} partout.' },
    spokenAdvServer:  { nl:'Voordeel.',              en:'Advantage in.',         de:'Vorteil Aufschläger.',    es:'Ventaja saque.',                fr:'Avantage service.' },
    spokenAdvReceiver:{ nl:'Nadeel.',                en:'Advantage out.',        de:'Vorteil Rückschläger.',   es:'Ventaja resto.',                fr:'Avantage retour.' },
  };

  function tr(key, vars) {
    let s = (TR[key] || {})[currentLang] || (TR[key] || {}).nl || key;
    if (vars) Object.keys(vars).forEach(k => { s = s.replace(new RegExp('\\{' + k + '\\}', 'g'), vars[k]); });
    return s;
  }

  const NUM_WORDS = {
    nl: ['nul','een','twee','drie','vier','vijf','zes','zeven','acht','negen','tien','elf','twaalf','dertien','veertien','vijftien','zestien','zeventien','achttien','negentien','twintig','eenentwintig','tweeëntwintig','drieëntwintig','vierentwintig','vijfentwintig','zesentwintig','zevenentwintig','achtentwintig','negenentwintig','dertig'],
    en: ['zero','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen','twenty','twenty-one','twenty-two','twenty-three','twenty-four','twenty-five','twenty-six','twenty-seven','twenty-eight','twenty-nine','thirty'],
    de: ['null','eins','zwei','drei','vier','fünf','sechs','sieben','acht','neun','zehn','elf','zwölf','dreizehn','vierzehn','fünfzehn','sechzehn','siebzehn','achtzehn','neunzehn','zwanzig','einundzwanzig','zweiundzwanzig','dreiundzwanzig','vierundzwanzig','fünfundzwanzig','sechsundzwanzig','siebenundzwanzig','achtundzwanzig','neunundzwanzig','dreißig'],
    es: ['cero','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve','veinte','veintiuno','veintidós','veintitrés','veinticuatro','veinticinco','veintiséis','veintisiete','veintiocho','veintinueve','treinta'],
    fr: ['zéro','un','deux','trois','quatre','cinq','six','sept','huit','neuf','dix','onze','douze','treize','quatorze','quinze','seize','dix-sept','dix-huit','dix-neuf','vingt','vingt-et-un','vingt-deux','vingt-trois','vingt-quatre','vingt-cinq','vingt-six','vingt-sept','vingt-huit','vingt-neuf','trente'],
  };
  const TENNIS_POINTS_WORDS = {
    nl: { '0':'nul', '15':'vijftien', '30':'dertig', '40':'veertig' },
    en: { '0':'love', '15':'fifteen', '30':'thirty', '40':'forty' },
    de: { '0':'null', '15':'fünfzehn', '30':'dreißig', '40':'vierzig' },
    es: { '0':'cero', '15':'quince', '30':'treinta', '40':'cuarenta' },
    fr: { '0':'zéro', '15':'quinze', '30':'trente', '40':'quarante' },
  };

  function numWord(n) {
    const arr = NUM_WORDS[currentLang] || NUM_WORDS.en;
    const i = Number(n);
    if (Number.isInteger(i) && i >= 0 && i < arr.length) return arr[i];
    return String(n);
  }
  function tennisWord(p) {
    const d = TENNIS_POINTS_WORDS[currentLang] || TENNIS_POINTS_WORDS.en;
    return d[p] || numWord(p);
  }

  function spokenScore(us, them, serveTeam) {
    if (us === 'Adv') return tr(serveTeam === 0 ? 'spokenAdvServer' : 'spokenAdvReceiver');
    if (them === 'Adv') return tr(serveTeam === 1 ? 'spokenAdvServer' : 'spokenAdvReceiver');
    if (us === '40' && them === '40') return tr('spokenDeuce');
    const usW = tennisWord(us), themW = tennisWord(them);
    if (us === them) return tr('spokenEqual', { n: usW });
    if (serveTeam === 1) return themW + ' ' + usW;
    return usW + ' ' + themW;
  }

  function speak(text) {
    if (!text) return;
    try {
      ttsPlayer.src = `/tts/${encodeURIComponent(currentLang)}/${encodeURIComponent(text)}?pin=${encodeURIComponent(PIN)}`;
      const p = ttsPlayer.play();
      if (p && p.catch) p.catch(() => speakViaBrowser(text));
    } catch (_) { speakViaBrowser(text); }
  }

  function speakViaBrowser(text) {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = currentLang + '-' + currentLang.toUpperCase();
    u.rate = 1.0;
    speechSynthesis.speak(u);
  }

  function announce(prev, cur) {
    if (!voiceOn) return;
    if (cur.over && !prev.over) {
      const winner = cur.winner === 0 ? (cur.teamUs || 'Wij') : (cur.teamThem || 'Zij');
      speak(tr('spokenMatchWon', { name: winner, a: numWord(cur.sets[0]), b: numWord(cur.sets[1]) }));
      return;
    }
    if (cur.sets[0] !== prev.sets[0] || cur.sets[1] !== prev.sets[1]) {
      speak(tr('spokenSetWon', { a: numWord(cur.sets[0]), b: numWord(cur.sets[1]) }));
      return;
    }
    if (cur.games[0] !== prev.games[0] || cur.games[1] !== prev.games[1]) {
      speak(tr('spokenGameWon', { a: numWord(cur.games[0]), b: numWord(cur.games[1]) }));
      return;
    }
    const us = pointLabel(cur, 0), them = pointLabel(cur, 1);
    if (us !== pointLabel(prev, 0) || them !== pointLabel(prev, 1)) {
      speak(spokenScore(us, them, cur.serveTeam));
    }
  }

  function pointLabel(m, p) {
    const isRally = (typeof m.sport === 'number' && m.sport >= 2) || m.rally === true;
    if (isRally || m.tiebreak) return String(m.points[p]);
    const o = p === 0 ? 1 : 0;
    if (!m.golden && m.points[p] >= 3 && m.points[o] >= 3) {
      if (m.points[p] === m.points[o]) return '40';
      if (m.points[p] > m.points[o]) return 'Adv';
      return '40';
    }
    return ['0','15','30','40','40'][Math.min(m.points[p], 4)];
  }

  function showError(title, body) {
    ended = true;
    document.getElementById('liveContent').style.display = 'none';
    const e = document.getElementById('errorState');
    e.style.display = '';
    if (title) document.getElementById('errTitle').textContent = title;
    if (body) document.getElementById('errBody').textContent = body;
  }

  function render(m) {
    if (!m) return;

    if (m.discarded) {
      showError('Match afgebroken', 'De eigenaar heeft de match weggegooid.');
      return;
    }
    if (m.over && prevState && !prevState.over) {
      // Laat de eindstand even zien, dan overschakelen naar "voorbij"
      setTimeout(() => showError('Match voorbij', 'De wedstrijd is afgelopen.'), 4000);
    }

    document.getElementById('liveContent').style.display = '';
    document.getElementById('errorState').style.display = 'none';

    document.getElementById('ownerSport').textContent = SPORTS[m.sport || 0] || 'Padel';
    if (m.teamUs) document.getElementById('teamUsName').textContent = m.teamUs;
    if (m.teamThem) document.getElementById('teamThemName').textContent = m.teamThem;

    document.getElementById('setsScore').textContent = `${m.sets[0]}–${m.sets[1]}`;
    document.getElementById('gameScore').textContent = `${m.games[0]}–${m.games[1]}`;

    const us = pointLabel(m, 0), them = pointLabel(m, 1);
    const ptUs = document.getElementById('ptUs');
    const ptThem = document.getElementById('ptThem');
    if (ptUs.textContent !== us) { ptUs.textContent = us; ptUs.classList.remove('flash'); void ptUs.offsetWidth; ptUs.classList.add('flash'); }
    if (ptThem.textContent !== them) { ptThem.textContent = them; ptThem.classList.remove('flash'); void ptThem.offsetWidth; ptThem.classList.add('flash'); }

    document.getElementById('teamUsSide').classList.toggle('serving', m.serveTeam === 0);
    document.getElementById('teamThemSide').classList.toggle('serving', m.serveTeam === 1);

    const tags = [];
    if (m.tiebreak) tags.push('<span class="tag accent">Tiebreak</span>');
    if (m.golden) tags.push('<span class="tag">Golden</span>');
    if (m.over) tags.push('<span class="tag accent">Match over</span>');
    document.getElementById('tagRow').innerHTML = tags.join('');

    if (m.lang) currentLang = m.lang;

    if (prevState) announce(prevState, m);
    prevState = { points: m.points.slice(), games: m.games.slice(), sets: m.sets.slice(), over: m.over, teamUs: m.teamUs, teamThem: m.teamThem };
  }

  async function loadOwner() {
    try {
      const r = await fetch('/api/account/spectator/active');
      const list = await r.json();
      const me = (list || []).find(x => x.pin === PIN);
      if (me) {
        document.getElementById('ownerName').textContent = me.owner_name;
        document.getElementById('ownerAvatar').textContent = me.owner_initial;
      }
      // Geen owner gevonden = pin niet gekoppeld of privé — toch door laten
    } catch (_) {}
  }

  async function init() {
    await loadOwner();   // cosmetisch — blokkeert spectating niet meer

    const ev = new EventSource(`/match/${PIN}/events`);
    ev.onmessage = (e) => {
      try { render(JSON.parse(e.data)); } catch (_) {}
    };
    ev.onerror = () => {};

    // Periodiek owner-info verversen (cosmetisch, geen fout bij mislukken)
    setInterval(() => { if (!ended) loadOwner(); }, 60000);
  }
  init();
</script>
</body>
</html>
