<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="pageTitle">RallyPoint Scoreboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Outfit:wght@400;500;600&display=swap');

  :root {
    --court: #0a4d3c;
    --court-line: #2a8c6f;
    --ball: #d4ff00;
    --us: #d4ff00;
    --them: #ff5a3c;
    --ink: #f4fff9;
    --muted: #7fae9f;
    --panel: #073b2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background:
      radial-gradient(ellipse at top, #0d5c47 0%, #062821 70%),
      #062821;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ---- Verbind-scherm ---- */
  .connect {
    text-align: center;
    animation: rise .6s ease both;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(2.5rem, 7vw, 5rem);
    letter-spacing: .04em;
    text-transform: uppercase;
    line-height: .95;
  }
  .logo span { color: var(--ball); }
  .tagline { color: var(--muted); margin: .6rem 0 2.4rem; font-size: 1.1rem; letter-spacing: .12em; text-transform: uppercase; }

  .pin-label { color: var(--muted); font-size: .85rem; letter-spacing: .2em; text-transform: uppercase; margin-bottom: 1rem; }
  .pin-boxes { display: flex; gap: .8rem; justify-content: center; margin-bottom: 2rem; }
  .pin-box {
    width: 64px; height: 84px;
    background: var(--panel);
    border: 2px solid var(--court-line);
    border-radius: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 3rem; font-weight: 700;
    text-align: center; color: var(--ink);
    transition: border-color .2s, transform .1s;
  }
  .pin-box:focus { outline: none; border-color: var(--ball); transform: translateY(-3px); }

  .btn {
    background: var(--ball); color: #052017;
    border: none; border-radius: 100px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 1.3rem;
    letter-spacing: .08em; text-transform: uppercase;
    padding: .9rem 3rem; cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(212,255,0,.25); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
  .hint { color: var(--muted); margin-top: 1.6rem; font-size: .9rem; }
  .err { color: var(--them); margin-top: 1rem; font-size: .95rem; min-height: 1.2em; }

  /* ---- Scorebord ---- */
  .board { display: none; width: 100%; height: 100vh; flex-direction: column; padding: 2.5vh 3vw; }
  .board.live { display: flex; animation: rise .5s ease both; }

  .board-top { display: flex; justify-content: space-between; align-items: center; }
  .board-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; font-size: 1.6rem; }
  .board-title span { color: var(--ball); }
  .board-sport {
    color: var(--muted) !important; font-weight: 500; font-size: .7em;
    letter-spacing: .15em; margin-left: .7rem; padding-left: .7rem;
    border-left: 1px solid var(--court-line);
  }
  .live-dot { display: inline-flex; align-items: center; gap: .5rem; color: var(--muted); font-size: .85rem; letter-spacing: .15em; text-transform: uppercase; }
  .top-right { display: flex; align-items: center; gap: 1rem; }
  .icon-btn {
    background: var(--panel); color: var(--ink);
    border: 1px solid var(--court-line); border-radius: 100px;
    font-family: 'Outfit', sans-serif; font-size: .85rem; font-weight: 500;
    padding: .5rem 1rem; cursor: pointer; transition: border-color .2s, transform .1s;
  }
  .icon-btn:hover { border-color: var(--ball); transform: translateY(-1px); }
  .icon-btn.active { background: var(--ball); color: #052017; border-color: var(--ball); }
  .voice-select {
    display: none; background: var(--panel); color: var(--ink);
    border: 1px solid var(--court-line); border-radius: 100px;
    font-family: 'Outfit', sans-serif; font-size: .85rem; font-weight: 500;
    padding: .5rem .9rem; cursor: pointer; max-width: 170px;
  }
  .voice-select.show { display: inline-block; }
  .voice-select:focus { outline: none; border-color: var(--ball); }
  /* Opgeruimd beeld in volledig scherm: alleen de score */
  body.fs { cursor: none; }
  body.fs .tester { display: none !important; }
  body.fs .board-top { display: none !important; }
  body.fs .history { display: none !important; }
  body.fs .board { padding-top: 4vh; }
  /* Nagebootst volledig scherm voor iPhone (geen echte Fullscreen API) */
  body.emulated-fs { position: fixed; inset: 0; width: 100vw; height: 100dvh; overflow: hidden; }
  body.emulated-fs .board { height: 100dvh; }
  #fsExit {
    display: none; position: fixed; top: max(12px, env(safe-area-inset-top)); right: 14px; z-index: 60;
    width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--court-line);
    background: rgba(7,59,46,.7); color: var(--ink); font-size: 1.2rem; cursor: pointer;
    align-items: center; justify-content: center;
  }
  body.fs #fsExit { display: flex; }

  /* ---- Namen-overlay ---- */
  .overlay {
    display: none; position: fixed; inset: 0; z-index: 80;
    background: rgba(3,18,14,.86); align-items: center; justify-content: center; padding: 5vw;
  }
  .overlay.show { display: flex; }
  .overlay-card {
    background: var(--panel); border: 1px solid var(--court-line); border-radius: 18px;
    padding: 1.6rem; width: min(420px, 92vw); max-height: 90vh; overflow: auto;
  }
  .overlay-card h2 { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
  .overlay-card label { display: block; color: var(--muted); font-size: .8rem; letter-spacing: .1em; text-transform: uppercase; margin: .8rem 0 .3rem; }
  .overlay-card input {
    width: 100%; padding: .7rem .9rem; border-radius: 10px; border: 1px solid var(--court-line);
    background: #052017; color: var(--ink); font-family: 'Outfit', sans-serif; font-size: 1.05rem;
  }
  .overlay-card input:focus { outline: none; border-color: var(--ball); }
  .overlay-actions { display: flex; gap: .8rem; margin-top: 1.4rem; }
  .overlay-actions .btn { flex: 1; padding: .7rem; font-size: 1.05rem; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--them); animation: pulse 1.4s infinite; }

  .teams { flex: 1; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 2vw; }

  .team { text-align: center; }
  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; text-transform: uppercase;
    font-size: clamp(1.8rem, 4vw, 3.5rem);
    letter-spacing: .03em; margin-bottom: 1vh;
  }
  .team.us .team-name { color: var(--us); }
  .team.them .team-name { color: var(--them); }

  .points {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(5rem, 22vw, 18rem);
    line-height: .85;
    transition: transform .2s;
  }
  .points.bump { animation: bump .35s ease; }

  .vs { font-family: 'Barlow Condensed', sans-serif; color: var(--muted); font-size: clamp(1.5rem,3vw,2.5rem); }

  /* ---- Mini-veld van bovenaf ---- */
  .court-wrap { display: flex; flex-direction: column; align-items: center; gap: .8vh; }
  .court {
    position: relative;
    width: clamp(110px, 13vw, 190px);
    aspect-ratio: 2 / 3;
    background: linear-gradient(160deg, #356a9c, #2e5c8a);
    border: 2px solid rgba(255,255,255,.85);
    border-radius: 4px;
    box-shadow: 0 8px 30px rgba(0,0,0,.4), inset 0 0 20px rgba(0,0,0,.25);
  }
  .court-half { position: absolute; left: 0; width: 100%; height: 50%; }
  .court-half.top { top: 0; background: rgba(255,90,60,.07); }
  .court-half.bottom { bottom: 0; background: rgba(212,255,0,.07); }
  .net {
    position: absolute; top: 50%; left: -2px; right: -2px; height: 0;
    border-top: 2px dashed rgba(255,255,255,.9); transform: translateY(-1px);
  }
  .service-line { position: absolute; left: 0; width: 100%; height: 0; border-top: 1px solid rgba(255,255,255,.55); }
  .service-line.top { top: 22%; }
  .service-line.bottom { bottom: 22%; }
  .center-line {
    position: absolute; left: 50%; top: 22%; bottom: 22%; width: 0;
    border-left: 1px solid rgba(255,255,255,.55); transform: translateX(-.5px);
  }
  /* Verticale zijlijnen (enkelspel/tramlijnen) — standaard verborgen */
  .side-line { position: absolute; top: 0; bottom: 0; width: 0; border-left: 1px solid rgba(255,255,255,.55); display: none; }
  .side-line.left { left: 14%; }
  .side-line.right { right: 14%; }
  .court.sport-1 .side-line { display: block; }                 /* tennis */
  .court.sport-4 .side-line { display: block; }                 /* badminton */
  .court.sport-4 .side-line.left { left: 12%; }
  .court.sport-4 .side-line.right { right: 12%; }
  /* ---- Sport-varianten van het mini-veld ---- */
  /* Tafeltennis: blauwe tafel, geen servicelijnen, middenlijn over de volle lengte */
  .court.sport-3 { background: linear-gradient(160deg, #1a5fb4, #14467a); }
  .court.sport-3 .service-line { display: none; }
  .court.sport-3 .center-line { top: 0; bottom: 0; }
  /* Badminton: groene baan */
  .court.sport-4 { background: linear-gradient(160deg, #2f8a5a, #2e7d4f); }
  /* Squash: licht hout met rode lijnen */
  .court.sport-5 { background: linear-gradient(160deg, #c8a86b, #b6925a); border-color: rgba(224,58,42,.9); }
  .court.sport-5 .service-line, .court.sport-5 .center-line { border-color: rgba(224,58,42,.9) !important; }
  /* Pickleball: servicelijnen dicht bij het net (non-volley zone) */
  .court.sport-2 .service-line.top { top: 38%; }
  .court.sport-2 .service-line.bottom { bottom: 38%; }
  /* Pickleball: middenlijn loopt NIET door de kitchen — twee aparte segmenten */
  .court.sport-2 .center-line { display: none; }
  .court.sport-2::before,
  .court.sport-2::after {
    content: ''; position: absolute; left: 50%; width: 0;
    border-left: 1px solid rgba(255,255,255,.55); transform: translateX(-.5px);
  }
  .court.sport-2::before { top: 0; height: 38%; }
  .court.sport-2::after  { bottom: 0; height: 38%; }
  /* Badminton: servicelijnen iets verder van het net */
  .court.sport-4 .service-line.top { top: 40%; }
  .court.sport-4 .service-line.bottom { bottom: 40%; }
  .court.sport-4 .center-line { top: 40%; bottom: 40%; }
  /* Squash: geen net, short line in het midden */
  .court.sport-5 .net { display: none; }
  .court.sport-5 .service-line.bottom { display: none; }
  .court.sport-5 .service-line.top { top: 45%; }
  .court.sport-5 .center-line { top: 45%; bottom: 0; }
  /* Tennis: servicelijnen iets ruimer, en alleen tussen de enkelspel-zijlijnen (niet door de tramlijnen) */
  .court.sport-1 .service-line.top    { top: 28%; left: 14%; right: 14%; width: auto; }
  .court.sport-1 .service-line.bottom { bottom: 28%; left: 14%; right: 14%; width: auto; }
  .court.sport-1 .center-line { top: 28%; bottom: 28%; }

  .serve-ball {
    position: absolute; width: 12px; height: 12px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f4ff7a, var(--ball));
    box-shadow: 0 0 10px var(--ball), 0 0 4px #fff;
    transform: translate(-50%, -50%);
    transition: left .45s cubic-bezier(.5,1.5,.5,1), top .45s cubic-bezier(.5,1.5,.5,1);
    left: 75%; top: 88%;
  }
  .serve-ball::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    border: 1px solid rgba(255,255,255,.6);
  }
  .serve-label {
    font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase;
    letter-spacing: .12em; font-size: .8rem; color: var(--muted);
  }
  .serve-label b { color: var(--ink); }

  /* ---- Momentum-balk ---- */
  .momentum { width: 100%; height: 8px; border-radius: 5px; overflow: hidden; background: var(--them); margin-bottom: 1.2vh; }
  .momentum-fill { height: 100%; width: 50%; background: var(--us); transition: width .5s ease; }

  /* ---- Setgeschiedenis ---- */
  .set-history { display: flex; gap: .6rem; justify-content: center; margin-bottom: 1vh; min-height: 1.6rem; }
  .set-chip {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
    background: var(--panel); border: 1px solid var(--court-line);
    border-radius: 8px; padding: .15rem .7rem; font-size: 1.1rem; letter-spacing: .04em;
  }
  .set-chip .wn { color: var(--ball); }

  /* ---- Serveerspeler ---- */
  .serve-player { font-family: 'Barlow Condensed', sans-serif; color: var(--muted); font-size: 1rem; letter-spacing: .08em; text-transform: uppercase; min-height: 1.2rem; }
  .serve-player.active { color: var(--ball); }

  /* ---- Tiebreak-badge ---- */
  .tb-badge {
    display: none; text-align: center; align-self: center;
    background: var(--ball); color: #052017; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; letter-spacing: .2em; padding: .2rem 1.2rem; border-radius: 100px;
    margin: 0 auto .5vh; width: fit-content; animation: pulse 1.4s infinite;
  }
  .tb-badge.show { display: block; }

  /* ---- Wissel-toast ---- */
  .switch-toast {
    position: fixed; top: 12%; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--ball); color: #052017; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
    padding: .6rem 1.6rem; border-radius: 100px; font-size: 1.3rem;
    opacity: 0; transition: opacity .3s, transform .3s; z-index: 30; pointer-events: none;
  }
  .switch-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---- Winnaar-extra ---- */
  .winner-sets { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(1.5rem,4vw,2.5rem); color: var(--ink); margin-top: 1.5rem; letter-spacing: .05em; }
  .winner-stats { color: var(--muted); margin-top: 1rem; font-size: 1rem; line-height: 1.6; }

  .games-sets { display: flex; justify-content: center; gap: 3vw; padding: 2vh 0; }
  .gs { text-align: center; }
  .gs-label { color: var(--muted); font-size: .8rem; letter-spacing: .2em; text-transform: uppercase; margin-bottom: .4rem; }
  .gs-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: clamp(1.5rem,4vw,2.8rem); }
  .gs-val .u { color: var(--us); }
  .gs-val .t { color: var(--them); }
  .gs-val .sep { color: var(--muted); margin: 0 .4rem; }

  /* ---- Geschiedenis ---- */
  .history { border-top: 1px solid var(--court-line); padding-top: 1.5vh; max-height: 22vh; overflow-y: auto; }
  .history-title { color: var(--muted); font-size: .8rem; letter-spacing: .2em; text-transform: uppercase; margin-bottom: .8rem; }
  .hist-row {
    display: flex; align-items: center; gap: .7rem;
    padding: .45rem .7rem; margin-bottom: .35rem; font-size: 1rem;
    border-radius: 8px; background: rgba(255,255,255,.03);
    border-left: 3px solid transparent;
  }
  .hist-row.us { border-left-color: var(--us); }
  .hist-row.them { border-left-color: var(--them); }
  .hist-num { color: var(--muted); font-variant-numeric: tabular-nums; min-width: 1.8rem; font-size: .8rem; opacity: .6; }
  .hist-row .who { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; letter-spacing: .05em; flex: 1; text-transform: uppercase; }
  .hist-row .who.us { color: var(--us); }
  .hist-row .who.them { color: var(--them); }
  .hist-row .score { color: var(--muted); font-variant-numeric: tabular-nums; font-size: .85rem; }
  .hist-empty { color: var(--muted); font-size: .9rem; font-style: italic; }

  .winner-banner {
    position: fixed; inset: 0; background: rgba(6,40,33,.96);
    display: none; align-items: center; justify-content: center; flex-direction: column;
    z-index: 10; animation: rise .5s ease both;
  }
  .winner-banner.show { display: flex; }
  .winner-banner h1 { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(3rem,12vw,9rem); text-transform: uppercase; }
  .winner-banner .sub { color: var(--muted); letter-spacing: .2em; text-transform: uppercase; margin-top: 1rem; }

  /* ---- Tester (nep-horloge) ---- */
  .tester {
    position: fixed; bottom: 16px; right: 16px;
    background: rgba(7,59,46,.95); border: 1px solid var(--court-line);
    border-radius: 16px; padding: 14px; width: 220px; z-index: 20;
    backdrop-filter: blur(8px); font-size: .85rem;
  }
  .tester h4 { font-family: 'Barlow Condensed', sans-serif; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px; }
  .tester .sub { color: var(--muted); font-size: .72rem; margin-bottom: 10px; }
  .tester .pin-show { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; color: var(--ball); letter-spacing: .3em; text-align: center; margin-bottom: 10px; }
  .tester button {
    width: 100%; margin: 3px 0; padding: 8px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--court-line); background: var(--panel); color: var(--ink);
    font-family: inherit; font-size: .82rem;
  }
  .tester button:hover { border-color: var(--ball); }
  .tester button.us { color: var(--us); }
  .tester button.them { color: var(--them); }
  .tester .mini { display: flex; gap: 5px; }
  .tester .mini button { flex: 1; }

  @keyframes rise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
  @keyframes bump { 0%,100% { transform: scale(1); } 40% { transform: scale(1.18); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

  /* ============================================================
     Portrait mobile (iPhone, kleine Androids)
     - Top-bar wrap zodat alle knoppen leesbaar blijven
     - Mini-court verbergen — score is hier het belangrijkste
     - Teams 2-koloms (geen court ertussen) zodat de scores groot blijven
     - 100dvh ipv 100vh om Safari's URL-bar te respecteren
     ============================================================ */
  @media (max-width: 720px), (orientation: portrait) and (max-width: 900px) {
    body { overflow: auto; }
    .board { padding: 1.2vh 3vw; height: 100dvh; min-height: 100dvh; }

    .board-top { flex-wrap: wrap; gap: .4rem .6rem; }
    .board-title { font-size: 1.05rem; }
    .board-sport { font-size: .55em; margin-left: .35rem; padding-left: .35rem; }
    .top-right { flex-wrap: wrap; gap: .35rem; justify-content: flex-end; }
    .icon-btn {
      padding: .32rem .55rem; font-size: .72rem;
    }
    .voice-select { font-size: .72rem; padding: .32rem .55rem; max-width: 110px; }
    .live-dot { font-size: .68rem; gap: .25rem; }

    .court-wrap { display: none; }
    .teams { grid-template-columns: 1fr 1fr; gap: 4vw; }
    .team-name { font-size: clamp(1rem, 5vw, 1.7rem); margin-bottom: .5vh; }
    .points { font-size: clamp(4.5rem, 30vw, 9rem); line-height: .85; }

    .games-sets { gap: 5vw; padding: 1.2vh 0; }
    .gs-label { font-size: .62rem; }

    .history { max-height: 18vh; padding-top: 1vh; }
    .history-title { font-size: .65rem; margin-bottom: .4rem; }

    .set-history { font-size: .85rem; padding: .5vh 0; }

    .tb-badge, .switch-toast { font-size: 1.4rem; padding: .4rem .9rem; }

    /* Verbind-scherm op portrait */
    .pin-box { width: 54px; height: 70px; font-size: 2.4rem; border-radius: 12px; }
    .pin-boxes { gap: .6rem; margin-bottom: 1.6rem; }
    .btn { padding: .8rem 2.4rem; font-size: 1.15rem; }
    .logo { font-size: clamp(2.2rem, 9vw, 4rem); }
    .tagline { font-size: .95rem; margin: .5rem 0 2rem; }
  }

  /* Heel smal (kleine telefoons of split-screen) — knoppen nog krapper */
  @media (max-width: 400px) {
    .icon-btn { padding: .28rem .45rem; font-size: .68rem; }
    .voice-select { font-size: .68rem; max-width: 95px; }
    .pin-box { width: 48px; height: 62px; font-size: 2rem; }
    .board-title { font-size: .95rem; }
  }

</style>
</head>
<body>

  <!-- VERBIND-SCHERM -->
  <div class="connect" id="connectScreen">
    <div class="logo">Rally<span>Point</span></div>
    <div class="tagline" data-i18n="tagline">Live Scoreboard</div>
    <div class="pin-label" data-i18n="pinLabel">Enter the PIN from your watch</div>
    <div class="pin-boxes" id="pinBoxes">
      <input class="pin-box" maxlength="1" inputmode="numeric" data-i="0">
      <input class="pin-box" maxlength="1" inputmode="numeric" data-i="1">
      <input class="pin-box" maxlength="1" inputmode="numeric" data-i="2">
      <input class="pin-box" maxlength="1" inputmode="numeric" data-i="3">
    </div>
    <button class="btn" id="connectBtn" data-i18n="connect" disabled>Connect</button>
    <div class="err" id="err"></div>
    <div class="hint" data-i18n="pinHint">You can find the PIN in the RallyPoint app on your Garmin.</div>
  </div>

  <!-- Persistent audio element voor TTS — iOS Safari speelt geen dynamisch
       gemaakte Audio() betrouwbaar af; één vast element in de DOM herbruiken
       werkt wél, mits 'ie 1× door een user-gesture is geactiveerd. -->
  <audio id="ttsPlayer" preload="none" playsinline style="display:none"></audio>

  sportPickleball:  { nl:'PICKLEBALL',             en:'PICKLEBALL',            de:'PICKLEBALL',              es:'PICKLEBALL',                    fr:'PICKLEBALL' },
  sportTableTennis: { nl:'TAFELTENNIS',            en:'TABLE TENNIS',          de:'TISCHTENNIS',             es:'TENIS DE MESA',                 fr:'TENNIS DE TABLE' },
  sportBadminton:   { nl:'BADMINTON',              en:'BADMINTON',             de:'BADMINTON',               es:'BÁDMINTON',                     fr:'BADMINTON' },
  sportSquash:      { nl:'SQUASH',                 en:'SQUASH',                de:'SQUASH',                  es:'SQUASH',                        fr:'SQUASH' },

};

let currentLang = 'en';

function t(key, vars) {
  const row = WEB_STRINGS[key];
  if (!row) { return key; }
  let s = row[currentLang] || row.en || key;
  if (vars) {
    for (const k in vars) { s = s.split('{' + k + '}').join(vars[k]); }
  }
  return s;
}

function applyLanguage(lang) {
  if (!lang || !WEB_STRINGS.tagline[lang]) { lang = 'en'; }
  if (lang === currentLang) { return false; }
  currentLang = lang;
  document.documentElement.lang = lang;
  // Update alle DOM-elementen met data-i18n / data-i18n-title
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    // Voorlees-knop heeft een aparte 'aan'-toestand
    if (el.id === 'voiceBtn') { el.textContent = t(voiceOn ? 'voiceBtnOn' : 'voiceBtn'); return; }
    if (el.id === 'fsBtn')    { el.textContent = t(isFullscreen() ? 'fsExit' : 'fsEnter'); return; }
    if (el.id === 'connectBtn') { el.textContent = t(el.dataset.busy ? 'connecting' : 'connect'); return; }
    el.textContent = t(key);
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.title = t(el.getAttribute('data-i18n-title'));
  });
  return true;
}

async function fetchMatch(pin) {
  const res = await fetch(`${SERVER_URL}/match/${pin}`);
  if (res.status === 404) return null;
  if (!res.ok) throw new Error('serverfout');
  return res.json();
}

/* ---- Weergave-helpers ---- */
function isRally(m) { return (typeof m.sport === 'number' && m.sport >= 2) || m.rally === true; }

function pointLabel(m, p) {
  if (isRally(m) || m.tiebreak) return String(m.points[p]);   // rally/tiebreak: gewoon tellen
  const o = p === 0 ? 1 : 0;
  if (!m.golden && m.points[p] >= 3 && m.points[o] >= 3) {
    if (m.points[p] === m.points[o]) return "40";
    if (m.points[p] > m.points[o]) return "Adv";
    return "40";
  }
  return ["0","15","30","40","40"][Math.min(m.points[p],4)];
}
function gamesLabel(m) {
  return `${m.sets[0]}-${m.sets[1]} sets · ${m.games[0]}-${m.games[1]} games`;
}

/* ============================================================
   FRONTEND
   ============================================================ */
let connectedPin = null;
let lastPoints = ["0","0"];
let lastHistKey = '';
let teamUs = t('teamUs');
let teamThem = t('teamThem');

// Teamnamen op het bord toepassen — komen van het horloge (of de vertaling)
function applyNames() {
  document.getElementById('teamNameUs').textContent   = teamUs;
  document.getElementById('teamNameThem').textContent = teamThem;
}

// PIN-invoer
const boxes = [...document.querySelectorAll('.pin-box')];
const connectBtn = document.getElementById('connectBtn');
boxes.forEach((box, i) => {
  box.addEventListener('input', () => {
    box.value = box.value.replace(/\D/g,'');
    if (box.value && i < 3) boxes[i+1].focus();
    connectBtn.disabled = boxes.some(b => !b.value);
  });
  box.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !box.value && i > 0) boxes[i-1].focus();
  });
});
boxes[0].focus();

// Pre-fill PIN op load: ?pin=1234 URL-param wint, anders localStorage.
// Bij URL-param meteen auto-connecten — dat is het pad vanuit /history terug.
(() => {
  const urlPin = new URLSearchParams(location.search).get('pin') || '';
  const memPin = localStorage.getItem('rallypointPin') || '';
  const pin = /^\d{4}$/.test(urlPin) ? urlPin : (/^\d{4}$/.test(memPin) ? memPin : '');
  if (!pin) return;
  for (let i = 0; i < 4; i++) { boxes[i].value = pin[i]; }
  connectBtn.disabled = false;
  if (urlPin) { setTimeout(() => connectBtn.click(), 50); }   // alleen via URL → direct
})();

connectBtn.addEventListener('click', async () => {
  const pin = boxes.map(b => b.value).join('');
  connectBtn.disabled = true;
  const errEl = document.getElementById('err');
  errEl.textContent = '';

  // De gratis server kan in slaap zijn; eerste antwoord kan ~30-60s duren.
  // We proberen daarom maximaal ~60s geduldig opnieuw.
  const started = Date.now();
  let match = null;
  let lastErr = null;
  connectBtn.dataset.busy = '1';
  connectBtn.textContent = t('connecting');

  while (Date.now() - started < 60000) {
    try {
      match = await fetchMatch(pin);
      if (match) { break; }
      lastErr = 'pin';
      break;
    } catch (e) {
      lastErr = 'net';
      errEl.textContent = t('serverWaking');
      await new Promise(r => setTimeout(r, 3000));
    }
  }

  delete connectBtn.dataset.busy;
  connectBtn.textContent = t('connect');

  if (!match) {
    errEl.textContent = lastErr === 'pin' ? t('noMatchPin') : t('noServer');
    connectBtn.disabled = false;
    return;
  }

  connectedPin = pin;
  localStorage.setItem('rallypointPin', pin);   // onthouden voor history-deeplink en pre-fill
  document.getElementById('connectScreen').style.display = 'none';
  document.getElementById('board').classList.add('live');
  document.getElementById('boardPin').textContent = pin;
  document.getElementById('historyLink').href = '/history/' + pin;   // directe deeplink
  boardLive = true;
  acquireWakeLock();
  applyState(match);   // ook taal-switch + render in één keer
  startLive();
});

// Live verbinding: elke 1,5s de stand ophalen van de server
let prevState = null;
let pollTimer = null;
let evtSource = null;
function snapshot(m) {
  return { points:[m.points[0],m.points[1]], games:[m.games[0],m.games[1]],
           sets:[m.sets[0],m.sets[1]], over:m.over, winner:m.winner, golden:m.golden };
}
// Verwerk een nieuwe stand (zowel via live updates als polling)
function applyState(m) {
  if (!m) return;
  // Taal volgt het horloge — wissel zodra een nieuwe taal binnenkomt
  if (m.lang && m.lang !== currentLang) {
    applyLanguage(m.lang);
    chooseVoiceForLang(m.lang);
    // History opnieuw renderen na taalwissel
    lastHistKey = '';
  }
  if (prevState) announce(prevState, m);
  render(m);
  prevState = snapshot(m);
  setLiveStatus(true);
}
// Live updates via Server-Sent Events; valt terug op pollen als dat niet werkt
function startLive() {
  if (!window.EventSource || !connectedPin) { startPolling(); return; }
  let gotData = false;
  try {
    evtSource = new EventSource(`${SERVER_URL}/match/${connectedPin}/events`);
    evtSource.onmessage = (e) => { gotData = true; try { applyState(JSON.parse(e.data)); } catch (_) {} };
    evtSource.onerror = () => { setLiveStatus(false); };  // EventSource verbindt zelf opnieuw
  } catch (e) { startPolling(); return; }
  // Geen live data binnen 6s? Schakel over op pollen.
  setTimeout(() => { if (!gotData) { try { evtSource.close(); } catch (_) {} startPolling(); } }, 6000);
}
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if (!connectedPin) return;
    try {
      const m = await fetchMatch(connectedPin);
      applyState(m);
    } catch (e) {
      setLiveStatus(false);
    }
  }, 1500);
}
function setLiveStatus(ok) {
  const dot = document.querySelector('.live-dot .dot');
  if (dot) dot.style.background = ok ? 'var(--them)' : '#666';
}

function render(m) {
  // Teamnamen volgen het horloge (en daarmee de taal). Geen lokale override meer.
  teamUs   = m.teamUs   || t('teamUs');
  teamThem = m.teamThem || t('teamThem');
  applyNames();

  applyCourtSport(m);

  const us = pointLabel(m,0), them = pointLabel(m,1);
  setPoint('ptUs', us, 0);
  setPoint('ptThem', them, 1);

  if (isRally(m)) {
    // Rally: 'games gewonnen' staat in sets[]; toon alleen die, verberg het Sets-vak
    document.getElementById('gsGamesLabel').textContent = t('games');
    document.getElementById('gUs').textContent = m.sets[0];
    document.getElementById('gThem').textContent = m.sets[1];
    document.getElementById('gsSets').style.display = 'none';
  } else {
    document.getElementById('gsGamesLabel').textContent = t('games');
    document.getElementById('gsSets').style.display = '';
    document.getElementById('gUs').textContent = m.games[0];
    document.getElementById('gThem').textContent = m.games[1];
    document.getElementById('sUs').textContent = m.sets[0];
    document.getElementById('sThem').textContent = m.sets[1];
  }

  const hist = document.getElementById('histList');
  const title = document.getElementById('historyTitle');
  // Alleen opnieuw opbouwen als er echt iets veranderd is (anders flikkert het bij elke poll)
  const histKey = JSON.stringify(m.history || []) + '|' + teamUs + '|' + teamThem + '|' + currentLang;
  if (histKey !== lastHistKey) {
    lastHistKey = histKey;
    if (!m.history || m.history.length === 0) {
      hist.innerHTML = `<div class="hist-empty">${t('histEmpty')}</div>`;
      if (title) { title.textContent = t('history'); }
    } else {
      const total = (typeof m.totalPoints === 'number') ? m.totalPoints : m.history.length;
      if (title) { title.textContent = t('historyWithCount', { n: total }); }
      hist.innerHTML = m.history.map((h, i) => {
        const cls = h.who === 0 ? 'us' : 'them';
        const team = h.who === 0 ? teamUs : teamThem;
        const num = total - i;
        return `<div class="hist-row ${cls}"><span class="hist-num">${num}.</span>`
             + `<span class="who ${cls}">${team}</span>`
             + `<span class="score">${h.score}</span></div>`;
      }).join('');
    }
  }

  const banner = document.getElementById('winnerBanner');
  if (m.over) {
    document.getElementById('winnerName').textContent = m.winner===0 ? teamUs : teamThem;
    document.getElementById('winnerName').style.color = m.winner===0 ? 'var(--us)' : 'var(--them)';
    document.getElementById('winnerScore').textContent = t('winnerSub');
    // Setuitslagen
    const ws = document.getElementById('winnerSets');
    if (m.setHistory && m.setHistory.length) {
      ws.textContent = m.setHistory.map(s => `${s[0]}–${s[1]}`).join('   ');
    } else { ws.textContent = ''; }
    // Stats
    const stats = document.getElementById('winnerStats');
    const dur = (typeof m.durationMin === 'number') ? m.durationMin : null;
    const tp = (typeof m.totalPoints === 'number') ? m.totalPoints : null;
    const ls = Array.isArray(m.longestStreak) ? m.longestStreak : null;
    let lines = [];
    if (dur !== null) lines.push(`${dur} ${t('minutes')}`);
    if (tp !== null) lines.push(`${tp} ${t('pointsPlayed')}`);
    if (ls) lines.push(`${t('longestRun')} — ${teamUs}: ${ls[0]}, ${teamThem}: ${ls[1]}`);
    stats.innerHTML = lines.join('<br>');
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }

  updateServeBall(m);
  updateMomentum(m);
  updateSetHistory(m);
  updateServePlayers(m);
  updateTiebreak(m);
  updateDeuce(m);
  updateSwitchToast(m);
}

const SPORT_KEYS = ['sportPadel','sportTennis','sportPickleball','sportTableTennis','sportBadminton','sportSquash'];
function sportName(m) {
  const s = (typeof m.sport === 'number') ? m.sport : 0;
  return t(SPORT_KEYS[s] || 'sportPadel');
}

// Zet de juiste sport-klasse op het mini-veld en toon de sportnaam
function applyCourtSport(m) {
  const court = document.getElementById('court');
  const s = (typeof m.sport === 'number') ? m.sport : 0;
  if (court) { court.className = 'court sport-' + s; }
  const lbl = document.getElementById('boardSport');
  if (lbl) { lbl.textContent = sportName(m); }
}

// Puntdoel per game voor rally-sporten
function rallyTarget(m) { return (m.sport === 4) ? 21 : 11; }

// Gelijke stand met win-by-2 in zicht = deuce
function updateDeuce(m) {
  const b = document.getElementById('deuceBadge');
  if (!b) { return; }
  let deuce;
  if (isRally(m)) {
    const t = rallyTarget(m);
    deuce = !m.over && m.points[0] >= t - 1 && m.points[1] >= t - 1 && m.points[0] === m.points[1];
  } else {
    deuce = !m.golden && !m.tiebreak && !m.over
      && m.points[0] >= 3 && m.points[1] >= 3 && m.points[0] === m.points[1];
  }
  b.classList.toggle('show', deuce);
}

// Momentum-balk: verhouding van gewonnen punten (langste reeks als proxy + games)
function updateMomentum(m) {
  const fill = document.getElementById('momentumFill');
  if (!fill) return;
  // Gewicht: sets zwaar, games middel, punten licht
  const score = a => (m.sets ? m.sets[a]*100 : 0) + (m.games ? m.games[a]*10 : 0) + (m.points ? m.points[a] : 0);
  const a = score(0), b = score(1);
  const total = a + b;
  const pct = total === 0 ? 50 : Math.round((a / total) * 100);
  fill.style.width = pct + '%';
}

function updateSetHistory(m) {
  const el = document.getElementById('setHistory');
  if (!el) return;
  if (!m.setHistory || m.setHistory.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = m.setHistory.map(s => {
    const youWon = s[0] > s[1];
    return `<span class="set-chip"><span class="${youWon?'wn':''}">${s[0]}</span>–<span class="${!youWon?'wn':''}">${s[1]}</span></span>`;
  }).join('');
}

function updateServePlayers(m) {
  const you = document.getElementById('serveYou');
  const them = document.getElementById('serveThem');
  if (!you || !them) return;
  const team = (typeof m.serveTeam === 'number') ? m.serveTeam : -1;
  const no = (typeof m.serveNo === 'number') ? m.serveNo : null;
  you.textContent = ''; them.textContent = '';
  you.classList.remove('active'); them.classList.remove('active');
  if (no === null || team < 0) { return; }
  const label = '🎾 ' + t('serve') + ' ' + no;
  if (team === 0) { you.textContent = label; you.classList.add('active'); }
  else { them.textContent = label; them.classList.add('active'); }
}

function updateTiebreak(m) {
  const b = document.getElementById('tbBadge');
  if (b) b.classList.toggle('show', !!m.tiebreak);
}

let _switchShownFor = null;
function updateSwitchToast(m) {
  const t = document.getElementById('switchToast');
  if (!t) return;
  // Toon kort als switchSides waar is, maar niet steeds opnieuw
  const key = (m.sets?m.sets.join():'') + '|' + (m.games?m.games.join():'');
  if (m.switchSides && _switchShownFor !== key) {
    _switchShownFor = key;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }
}

// Zet het balletje in de juiste hoek van het veld
function updateServeBall(m) {
  const ball = document.getElementById('serveBall');
  const label = document.getElementById('serveLabel');
  if (!ball) return;
  // serveTeam: 0 = wij (onder), 1 = tegenstander (boven). serveSide: 0 = rechts, 1 = links
  const team = (typeof m.serveTeam === 'number') ? m.serveTeam : 0;
  let side = (typeof m.serveSide === 'number') ? m.serveSide : 0;
  if (team === 1) { side = 1 - side; }   // bovenste helft is gespiegeld
  const left = side === 0 ? '75%' : '25%';
  const top = team === 0 ? '88%' : '12%';
  ball.style.left = left;
  ball.style.top = top;
  const naam = team === 0 ? teamUs : teamThem;
  const kant = (m.serveSide === 0) ? t('sideRight') : t('sideLeft');
  label.innerHTML = t('serveLine', { name: naam, side: kant });
}

function setPoint(id, val, idx) {
  const el = document.getElementById(id);
  if (el.textContent !== String(val)) {
    el.textContent = val;
    if (val !== "0" || lastPoints[idx] !== "0") {
      el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
    }
    lastPoints[idx] = String(val);
  }
}

/* ============================================================
   FULLSCREEN
   ============================================================ */
const fsBtn = document.getElementById('fsBtn');
let boardLive = false;

// Echte Fullscreen API beschikbaar? (iPhone Safari heeft die niet voor divs)
function fsApiSupported() {
  const el = document.documentElement;
  return !!(el.requestFullscreen || el.webkitRequestFullscreen);
}
function realFullscreen() {
  return document.fullscreenElement || document.webkitFullscreenElement;
}
function isFullscreen() {
  return !!realFullscreen() || document.body.classList.contains('emulated-fs');
}
function enterFullscreen() {
  if (fsApiSupported()) {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    try { Promise.resolve(req.call(el)).catch(()=>{}); } catch (e) {}
  } else {
    // iPhone: bootst volledig scherm na — alleen het bord
    document.body.classList.add('emulated-fs');
  }
  acquireWakeLock();
  syncFsBtn();
}
function leaveFullscreen() {
  if (realFullscreen()) {
    const ex = document.exitFullscreen || document.webkitExitFullscreen;
    if (ex) { try { Promise.resolve(ex.call(document)).catch(()=>{}); } catch (e) {} }
  }
  document.body.classList.remove('emulated-fs');
  syncFsBtn();
}
function syncFsBtn() {
  const on = isFullscreen();
  document.body.classList.toggle('fs', on);
  fsBtn.textContent = t(on ? 'fsExit' : 'fsEnter');
  fsBtn.classList.toggle('active', on);
}
fsBtn.addEventListener('click', () => { if (!isFullscreen()) { enterFullscreen(); } else { leaveFullscreen(); } });
document.getElementById('fsExit').addEventListener('click', leaveFullscreen);
document.addEventListener('fullscreenchange', syncFsBtn);
document.addEventListener('webkitfullscreenchange', syncFsBtn);

/* Scherm wakker houden tijdens een wedstrijd (Wake Lock API) */
let wakeLock = null;
async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch (e) { /* niet ondersteund of geweigerd */ }
}
function releaseWakeLock() {
  if (wakeLock) { try { wakeLock.release(); } catch (e) {} wakeLock = null; }
}
// De browser geeft de lock vrij bij tab-wissel: opnieuw aanvragen bij terugkeer
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && boardLive && !wakeLock) { acquireWakeLock(); }
});

/* ============================================================
   SPRAAK — stand hardop voorlezen, taal volgt het horloge
   Eerst proberen we de server-TTS (ElevenLabs via /tts), valt terug op
   browser speechSynthesis als de server geen sleutel heeft of bereik faalt.
   ============================================================ */
let voiceOn = localStorage.getItem('rallypointVoiceOn') === '1';
let currentVoice = null;
let userPickedVoice = false;   // gebruiker handmatig gekozen? Dan niet meer auto-wisselen bij taalverandering
const speechRate = 1.0;
const voiceBtn = document.getElementById('voiceBtn');
const voiceSelect = document.getElementById('voiceSelect');
const ttsPlayer = document.getElementById('ttsPlayer');
const hasSpeech = 'speechSynthesis' in window;
let serverTtsAvailable = true;   // false = endpoint heeft geen key of bereik onmogelijk
let audioUnlocked = false;        // browser autoplay-context vrijgegeven door user-gesture?

// Zet cijfers om naar woorden in de actieve taal. Cruciaal voor ElevenLabs:
// "0 - 15" is taalkundig ambigu en de modellen schakelen daar regelmatig naar
// een verkeerde taal. "nul vijftien" geeft een ondubbelzinnig taal-signaal en
// elimineert de mis-uitspraken.
const NUM_WORDS = {
  nl: ['nul','een','twee','drie','vier','vijf','zes','zeven','acht','negen','tien','elf','twaalf','dertien','veertien','vijftien','zestien','zeventien','achttien','negentien','twintig','eenentwintig','tweeëntwintig','drieëntwintig','vierentwintig','vijfentwintig','zesentwintig','zevenentwintig','achtentwintig','negenentwintig','dertig'],
  en: ['zero','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen','twenty','twenty-one','twenty-two','twenty-three','twenty-four','twenty-five','twenty-six','twenty-seven','twenty-eight','twenty-nine','thirty'],
  de: ['null','eins','zwei','drei','vier','fünf','sechs','sieben','acht','neun','zehn','elf','zwölf','dreizehn','vierzehn','fünfzehn','sechzehn','siebzehn','achtzehn','neunzehn','zwanzig','einundzwanzig','zweiundzwanzig','dreiundzwanzig','vierundzwanzig','fünfundzwanzig','sechsundzwanzig','siebenundzwanzig','achtundzwanzig','neunundzwanzig','dreißig'],
  es: ['cero','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve','veinte','veintiuno','veintidós','veintitrés','veinticuatro','veinticinco','veintiséis','veintisiete','veintiocho','veintinueve','treinta'],
  fr: ['zéro','un','deux','trois','quatre','cinq','six','sept','huit','neuf','dix','onze','douze','treize','quatorze','quinze','seize','dix-sept','dix-huit','dix-neuf','vingt','vingt-et-un','vingt-deux','vingt-trois','vingt-quatre','vingt-cinq','vingt-six','vingt-sept','vingt-huit','vingt-neuf','trente'],
};

// Tennis-puntwaarden hebben eigen woorden ("vijftien" niet "vijftien" — die
// matchen toevallig — maar "love" in EN ipv "zero")
const TENNIS_POINTS_WORDS = {
  nl: { '0':'nul',  '15':'vijftien', '30':'dertig',  '40':'veertig' },
  en: { '0':'love', '15':'fifteen',  '30':'thirty',  '40':'forty' },
  de: { '0':'null', '15':'fünfzehn', '30':'dreißig', '40':'vierzig' },
  es: { '0':'cero', '15':'quince',   '30':'treinta', '40':'cuarenta' },
  fr: { '0':'zéro', '15':'quinze',   '30':'trente',  '40':'quarante' },
};

function numWord(n) {
  const arr = NUM_WORDS[currentLang] || NUM_WORDS.en;
  const i = Number(n);
  if (Number.isInteger(i) && i >= 0 && i < arr.length) return arr[i];
  return String(n);
}

function tennisWord(p) {
  const dict = TENNIS_POINTS_WORDS[currentLang] || TENNIS_POINTS_WORDS.en;
  return dict[p] || numWord(p);
}

// BCP-47 voorvoegsel per app-taal, voor het matchen van stemmen
const LANG_VOICE_PREFIX = { nl: 'nl', en: 'en', de: 'de', es: 'es', fr: 'fr' };

// Curated ElevenLabs voice-picker. Allemaal v2 multilingual voices die
// language_code goed volgen — gebruiker kiest enkel timbre, niet taal.
const VOICES = [
  { id: 'EXAVITQu4vr4xnSDxMaL', label: '👩 Sarah'     },   // vrouw, warm
  { id: 'XB0fDUnXU5powFXDhCwa', label: '👩 Charlotte' },   // vrouw, zacht
  { id: 'nPczCjzI2devNBz1zQrb', label: '👨 Brian'     },   // man, diep
  { id: 'onwK4e9ZLuTAKqWW03F9', label: '👨 Daniel'    },   // man, helder
];

let selectedVoiceId = localStorage.getItem('rallypointVoiceId');
if (!VOICES.some(v => v.id === selectedVoiceId)) { selectedVoiceId = VOICES[0].id; }

function populateVoices() {
  voiceSelect.innerHTML = '';
  VOICES.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.id;
    opt.textContent = v.label;
    voiceSelect.appendChild(opt);
  });
  voiceSelect.value = selectedVoiceId;
}
populateVoices();

// Multilingual stemmen passen zich aan language_code aan — geen taalmatch nodig.
function chooseVoiceForLang(_lang) { /* nop, voor backward-compat */ }

if (!hasSpeech) {
  // Geen browser-spraak = geen fallback, maar server-TTS werkt nog wel
}

voiceSelect.addEventListener('change', () => {
  selectedVoiceId = voiceSelect.value;
  localStorage.setItem('rallypointVoiceId', selectedVoiceId);
  if (voiceOn) { speak(t('voiceSet')); }
});

voiceBtn.addEventListener('click', () => {
  voiceOn = !voiceOn;
  localStorage.setItem('rallypointVoiceOn', voiceOn ? '1' : '0');
  audioUnlocked = true;     // klik telt als user-gesture
  voiceBtn.classList.toggle('active', voiceOn);
  voiceBtn.textContent = t(voiceOn ? 'voiceBtnOn' : 'voiceBtn');
  voiceSelect.classList.toggle('show', voiceOn);
  if (voiceOn) {
    speak(t('voiceOn'));   // eerste klik ontgrendelt spraak in de browser
  } else {
    try { ttsPlayer.pause(); } catch (_) {}
    if (hasSpeech) speechSynthesis.cancel();
  }
});

// Visueel herstellen als voiceOn al uit localStorage komt
if (voiceOn) {
  voiceBtn.classList.add('active');
  voiceSelect.classList.add('show');
}

// Audio autoplay-restricties: pas na de eerste user-gesture mag de browser
// geluid afspelen. Als voiceOn al "aan" stond uit een vorige sessie, vangen
// we de eerste klik ergens op de pagina en spelen we de welkomstzin af zodat
// alle volgende speak() calls vrij spel hebben.
function unlockOnFirstGesture() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  if (voiceOn) { speak(t('voiceOn')); }
}
document.addEventListener('click', unlockOnFirstGesture, { once: true, capture: true });
document.addEventListener('touchstart', unlockOnFirstGesture, { once: true, capture: true });

function voiceLangTag() {
  const prefix = LANG_VOICE_PREFIX[currentLang] || 'en';
  return prefix + '-' + prefix.toUpperCase();
}

function speak(text) {
  if (!voiceOn || !text) { return; }
  if (serverTtsAvailable) {
    speakViaServer(text);
  } else {
    speakViaBrowser(text);
  }
}

// Speel via /tts endpoint met het persistente audio element. Direct src
// (geen blob URL) — werkt betrouwbaarder op iOS Safari omdat een gemount
// audio-element met een vaste play()-historie de autoplay-policy beter
// passeert dan een steeds nieuw aangemaakte Audio().
function speakViaServer(text) {
  if (!serverTtsAvailable) { speakViaBrowser(text); return; }
  let fellBack = false;
  const fallback = (reason) => {
    if (fellBack) return;
    fellBack = true;
    speakViaBrowser(text);
  };
  try {
    ttsPlayer.onerror = () => {
      // Server-fout (5xx) of decode-fout. We weten niet welke status het was —
      // probeer nog een paar keer; pas na meerdere mislukkingen geven we op.
      fallback('error');
    };
    ttsPlayer.oncanplay = null;
    ttsPlayer.src = `/tts/${encodeURIComponent(currentLang)}/${encodeURIComponent(text)}?voice=${encodeURIComponent(selectedVoiceId)}&pin=${encodeURIComponent(connectedPin || '')}`;
    const p = ttsPlayer.play();
    if (p && p.catch) { p.catch(() => fallback('playreject')); }
  } catch (e) {
    fallback('throw');
  }
}

function speakViaBrowser(text) {
  if (!hasSpeech) { return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if (currentVoice) { u.voice = currentVoice; u.lang = currentVoice.lang; }
  else { u.lang = voiceLangTag(); }
  u.rate = speechRate;
  u.pitch = 1.0;
  speechSynthesis.speak(u);
}

// Sommige browsers (Chrome) pauzeren de spraak na verloop van tijd; weer hervatten
setInterval(() => {
  if (voiceOn && hasSpeech && speechSynthesis.paused) { speechSynthesis.resume(); }
}, 5000);


// Bepaal wat er veranderd is en lees het passend voor
function announce(prev, m) {
  if (!voiceOn) return;

  // Wedstrijd voorbij
  if (m.over && !prev.over) {
    speak(t('spokenMatchWon', { name: (m.winner===0 ? teamUs : teamThem), a: numWord(m.sets[0]), b: numWord(m.sets[1]) }));
    return;
  }
  // Set gewonnen
  if (m.sets[0] !== prev.sets[0] || m.sets[1] !== prev.sets[1]) {
    speak(t('spokenSetWon', { a: numWord(m.sets[0]), b: numWord(m.sets[1]) }));
    return;
  }
  // Game gewonnen
  if (m.games[0] !== prev.games[0] || m.games[1] !== prev.games[1]) {
    speak(t('spokenGameWon', { a: numWord(m.games[0]), b: numWord(m.games[1]) }));
    return;
  }
  // Gewoon punt
  const us = pointLabel(m,0), them = pointLabel(m,1);
  if (us !== pointLabel(prev,0) || them !== pointLabel(prev,1)) {
    speak(spokenScore(us, them, m.serveTeam));
  }
}

// Maak de puntenstand natuurlijk uitspreekbaar.
// Conventie: stand van de serverende partij wordt eerst genoemd.
// Cijfers worden omgezet naar woorden zodat ElevenLabs de juiste taal kiest.
// Voor "Adv": we noemen het vanuit de server: "voordeel" als de server het
// voordeel heeft, "nadeel" als de receiver het heeft. Per taal vertaald.
function spokenScore(us, them, serveTeam) {
  if (us === 'Adv') {
    const serverHasAdv = (serveTeam === 0);
    return t(serverHasAdv ? 'spokenAdvServer' : 'spokenAdvReceiver');
  }
  if (them === 'Adv') {
    const serverHasAdv = (serveTeam === 1);
    return t(serverHasAdv ? 'spokenAdvServer' : 'spokenAdvReceiver');
  }
  if (us === '40' && them === '40') return t('spokenDeuce');
  const usW = tennisWord(us);
  const themW = tennisWord(them);
  if (us === them) return t('spokenEqual', { n: usW });
  if (serveTeam === 1) return themW + ' ' + usW;
  return usW + ' ' + themW;
}
