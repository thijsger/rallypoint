<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn account — RallyPoint</title>
<link rel="stylesheet" href="/account/style.css">
<style>
  .wrap { max-width: 520px; }
  .row { display: flex; justify-content: space-between; align-items: center; gap: 1rem; padding: .9rem 0; border-bottom: 1px solid var(--court-line); }
  .row:last-child { border-bottom: 0; }
  .row-label { color: var(--muted); font-size: .8rem; text-transform: uppercase; letter-spacing: .1em; }
  .row-value { font-weight: 600; }
  .section + .section { margin-top: 1.4rem; }
  .section h2 {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.2rem;
    text-transform: uppercase; letter-spacing: .04em; margin-bottom: .6rem; color: var(--ball);
  }
  .pin-input-row { display: flex; gap: .5rem; }
  .pin-input-row input { flex: 1; margin-bottom: 0; text-align: center; letter-spacing: .3em; font-family: 'Barlow Condensed', sans-serif; font-size: 1.3rem; }
  .pin-input-row button { width: auto; padding: 0 1.4rem; }
  .banner { background: rgba(212,255,0,.1); border: 1px solid var(--ball); color: var(--ball); padding: .7rem 1rem; border-radius: 10px; font-size: .85rem; margin-bottom: 1rem; }
  .actions { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: 1rem; }
  .actions .btn { width: auto; flex: 1; min-width: 140px; }
  .small { font-size: .8rem; color: var(--muted); margin-top: .6rem; line-height: 1.4; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Rally<span>Point</span></div>
  <div class="tagline">Mijn account</div>

  <div id="bannerSlot"></div>

  <div class="card" id="content" style="display:none">
    <div class="section">
      <h2>Account</h2>
      <div class="row"><span class="row-label">E-mail</span> <span class="row-value" id="userEmail"></span></div>
      <div class="row"><span class="row-label">Geverifieerd</span> <span class="row-value" id="userVerified"></span></div>
    </div>

    <div class="section">
      <h2>Licentie</h2>
      <div id="licenseSlot"></div>
      <div class="actions" id="licenseActions"></div>
    </div>

    <div class="section">
      <h2>Watches</h2>
      <ul class="pin-list" id="pinList"></ul>
      <div class="pin-input-row">
        <input type="text" id="pinInput" placeholder="PIN" maxlength="4" inputmode="numeric" pattern="[0-9]{4}">
        <button class="btn" id="couplePinBtn">Koppel</button>
      </div>
      <div class="small">Vind de PIN bovenaan het Setup-menu van je RallyPoint-app op de watch.</div>
      <div class="err" id="pinErr"></div>
    </div>

    <div class="section">
      <button class="btn secondary" id="logoutBtn">Uitloggen</button>
    </div>
  </div>
</div>
<script>
  const bannerSlot = document.getElementById('bannerSlot');
  const content = document.getElementById('content');
  const userEmail = document.getElementById('userEmail');
  const userVerified = document.getElementById('userVerified');
  const licenseSlot = document.getElementById('licenseSlot');
  const licenseActions = document.getElementById('licenseActions');
  const pinList = document.getElementById('pinList');
  const pinInput = document.getElementById('pinInput');
  const pinErr = document.getElementById('pinErr');

  // Banner (post-actie)
  const q = new URLSearchParams(location.search);
  if (q.get('verified') === '1') bannerSlot.innerHTML = '<div class="banner">E-mail bevestigd. Welkom!</div>';
  else if (q.get('verified') === '0') bannerSlot.innerHTML = '<div class="banner" style="border-color:var(--them);color:var(--them)">Bevestiglink ongeldig of verlopen.</div>';
  else if (q.get('just_signed_up') === '1') bannerSlot.innerHTML = '<div class="banner">Account aangemaakt! Check je inbox voor een bevestigingsmail.</div>';
  else if (q.get('licensed') === '1') bannerSlot.innerHTML = '<div class="banner">Bedankt voor je aankoop!</div>';

  async function load() {
    let me;
    try {
      const r = await fetch('/api/auth/me');
      if (r.status === 401) { window.location = '/account/login'; return; }
      me = await r.json();
    } catch (e) {
      bannerSlot.innerHTML = '<div class="banner" style="border-color:var(--them);color:var(--them)">Kon account niet laden.</div>';
      return;
    }
    content.style.display = '';
    userEmail.textContent = me.email;
    userVerified.innerHTML = me.email_verified
      ? '<span class="status-pill active">Geverifieerd</span>'
      : '<span class="status-pill expired">Niet geverifieerd</span> <a href="#" id="resendVerify" style="color:var(--ball);font-size:.85rem;margin-left:.5rem">resend</a>';

    // License render
    const lic = me.license;
    if (!lic || lic.status === 'none') {
      licenseSlot.innerHTML = '<div class="info">Nog geen licentie. Probeer Pro 3 dagen gratis of koop direct.</div>';
    } else if (lic.status === 'trial') {
      const days = lic.expires_at ? Math.max(0, Math.ceil((lic.expires_at - Date.now()) / 86400000)) : 0;
      licenseSlot.innerHTML = `<div class="row"><span class="row-label">Status</span><span class="status-pill trial">Trial · ${days} dgn</span></div>`;
    } else if (lic.status === 'active' || lic.status === 'cancelled') {
      const label = lic.plan === 'lifetime' ? 'Pro Lifetime' : 'Pro Monthly';
      licenseSlot.innerHTML = `<div class="row"><span class="row-label">Status</span><span class="status-pill active">${label}</span></div>`;
      if (lic.expires_at && lic.plan === 'monthly') {
        const d = new Date(lic.expires_at).toLocaleDateString('nl-NL');
        licenseSlot.innerHTML += `<div class="row"><span class="row-label">Verlengt op</span><span class="row-value">${d}</span></div>`;
      }
    } else {
      licenseSlot.innerHTML = `<div class="row"><span class="row-label">Status</span><span class="status-pill expired">Verlopen</span></div>`;
    }

    // License actions
    licenseActions.innerHTML = '';
    const isActive = lic && (lic.status === 'active' || lic.status === 'cancelled' || lic.status === 'trial');
    if (!isActive) {
      if (!lic || !lic.trial_used) {
        const trialBtn = document.createElement('button');
        trialBtn.className = 'btn'; trialBtn.textContent = 'Start 3 dagen gratis';
        trialBtn.addEventListener('click', async () => {
          trialBtn.disabled = true;
          const r = await fetch('/api/license/start-trial', { method: 'POST' });
          if (r.ok) location.reload();
          else { trialBtn.disabled = false; pinErr.textContent = 'Trial kon niet starten.'; }
        });
        licenseActions.appendChild(trialBtn);
      }
      const m = document.createElement('a');
      m.className = 'btn secondary'; m.textContent = '€2/mnd';
      m.href = '/api/license/checkout?plan=monthly';
      licenseActions.appendChild(m);
      const l = document.createElement('a');
      l.className = 'btn secondary'; l.textContent = '€10 lifetime';
      l.href = '/api/license/checkout?plan=lifetime';
      licenseActions.appendChild(l);
    } else if (lic.plan === 'monthly') {
      const upgr = document.createElement('a');
      upgr.className = 'btn'; upgr.textContent = 'Upgrade naar lifetime';
      upgr.href = '/api/license/checkout?plan=lifetime';
      licenseActions.appendChild(upgr);
    }

    // PIN-lijst
    pinList.innerHTML = '';
    if (!me.pins || !me.pins.length) {
      pinList.innerHTML = '<li style="opacity:.6;font-family:Outfit,sans-serif;font-size:.9rem;letter-spacing:0">Nog geen watches gekoppeld.</li>';
    } else {
      for (const pin of me.pins) {
        const li = document.createElement('li');
        li.innerHTML = `<span>${pin}</span><button data-pin="${pin}">Ontkoppel</button>`;
        pinList.appendChild(li);
      }
    }

    // Resend verify
    const r1 = document.getElementById('resendVerify');
    if (r1) r1.addEventListener('click', async e => {
      e.preventDefault();
      // Geen aparte endpoint nu — voor MVP doe forgot-flow als hint
      alert('Check je inbox of mail support@rallypoint.pro');
    });
  }

  document.getElementById('couplePinBtn').addEventListener('click', async () => {
    pinErr.textContent = '';
    const pin = pinInput.value.trim();
    if (!/^\d{4}$/.test(pin)) { pinErr.textContent = 'PIN moet 4 cijfers zijn.'; return; }
    const r = await fetch('/api/account/couple-pin', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ pin })
    });
    const data = await r.json();
    if (!r.ok) {
      pinErr.textContent = data.error === 'pin_taken' ? 'Deze PIN is al gekoppeld aan een ander account.' : 'Koppelen mislukt.';
      return;
    }
    pinInput.value = '';
    load();
  });

  pinList.addEventListener('click', async e => {
    const btn = e.target.closest('button[data-pin]');
    if (!btn) return;
    if (!confirm(`PIN ${btn.dataset.pin} ontkoppelen van dit account?`)) return;
    await fetch('/api/account/pins/' + btn.dataset.pin, { method: 'DELETE' });
    load();
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location = '/account/login';
  });

  load();
</script>
</body>
</html>
