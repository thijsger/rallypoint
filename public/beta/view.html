<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swing-log — RallyPoint beta</title>
<style>
  body { margin:0; background:#0a0d10; color:#fff; font-family:system-ui,sans-serif; padding:1rem; }
  h1 { font-size:1.1rem; margin:0 0 .25rem; }
  .meta { color:#8b95a3; font-size:.85rem; margin-bottom:1rem; }
  .meta b { color:#c4ff00; }
  canvas { width:100%; height:260px; background:#11161c; border:1px solid #2a3038; border-radius:8px; display:block; margin-bottom:.5rem; }
  .legend { font-size:.8rem; color:#8b95a3; margin:0 0 1.2rem; }
  .legend span { margin-right:1.2rem; }
  .dot { display:inline-block; width:10px; height:3px; vertical-align:middle; margin-right:4px; }
  button { background:#181d24; color:#fff; border:1px solid #2a3038; border-radius:8px; padding:.5rem .9rem; font-size:.85rem; cursor:pointer; }
  button:hover { border-color:#c4ff00; }
  label { font-size:.85rem; color:#8b95a3; margin-left:1rem; }
  h2 { font-size:.8rem; color:#8b95a3; margin:.6rem 0 .2rem; font-weight:500; }
</style>
</head>
<body>
<h1>Swing-log (ruwe per-as data)</h1>
<div class="meta">PIN <b id="pin">—</b> · sensor <b id="mode">—</b> · ~<b id="hz">?</b>Hz · slagen <b id="total">0</b> · samples <b id="samples">0</b> · <span id="upd"></span></div>

<h2>Gyroscoop — rotatiesnelheid per as (forehand/backhand/smash verschillen hier)</h2>
<canvas id="cg" width="2000" height="260"></canvas>
<div class="legend">
  <span><i class="dot" style="background:#c4ff00"></i>gx</span>
  <span><i class="dot" style="background:#4aa8ff"></i>gy</span>
  <span><i class="dot" style="background:#ff6b54"></i>gz</span>
  <span><i class="dot" style="background:#fff;height:14px;width:2px"></i>geteld als slag</span>
</div>

<h2>Versnelling — per as</h2>
<canvas id="ca" width="2000" height="260"></canvas>
<div class="legend">
  <span><i class="dot" style="background:#c4ff00"></i>ax</span>
  <span><i class="dot" style="background:#4aa8ff"></i>ay</span>
  <span><i class="dot" style="background:#ff6b54"></i>az</span>
</div>

<button onclick="load()">Ververs</button>
<button onclick="wipe()">Wis log</button>
<label><input type="checkbox" id="auto" checked> auto-refresh 5s</label>
<label><input type="checkbox" id="tail" checked> alleen laatste 60s</label>

<script>
const PIN = location.pathname.split('/')[3] || '';
const KEY = new URLSearchParams(location.search).get('beta') || '';
document.getElementById('pin').textContent = PIN;

let A = {ax:[],ay:[],az:[],gx:[],gy:[],gz:[],sw:[]};

async function load() {
  try {
    const r = await fetch(`/beta/log/${PIN}?beta=${encodeURIComponent(KEY)}`);
    if (!r.ok) { document.getElementById('upd').textContent = 'geen toegang'; return; }
    const j = await r.json();
    const batches = (j.batches || []).slice().sort((a,b)=>(a.t0||0)-(b.t0||0));
    A = {ax:[],ay:[],az:[],gx:[],gy:[],gz:[],sw:[]};
    let gyro = false, hz = '?';
    for (const b of batches) {
      if (b.g) gyro = true;
      if (b.hz) hz = b.hz;
      const base = A.ax.length;
      // nieuw per-as formaat
      if (Array.isArray(b.ax)) {
        for (let i=0;i<b.ax.length;i++) {
          A.ax.push(b.ax[i]); A.ay.push(b.ay[i]); A.az.push(b.az[i]);
          A.gx.push((b.gx&&b.gx[i])||0); A.gy.push((b.gy&&b.gy[i])||0); A.gz.push((b.gz&&b.gz[i])||0);
        }
        for (const m of (b.sw||[])) A.sw.push(base + m);
      }
    }
    document.getElementById('mode').textContent = gyro ? 'gyro+accel' : 'accel';
    document.getElementById('hz').textContent = hz;
    document.getElementById('total').textContent = A.sw.length;
    document.getElementById('samples').textContent = A.ax.length;
    document.getElementById('upd').textContent = 'bijgewerkt ' + new Date().toLocaleTimeString('nl-NL');
    draw();
  } catch (e) { document.getElementById('upd').textContent = 'fout: ' + e.message; }
}

async function wipe() {
  if (!confirm('Log wissen?')) return;
  await fetch(`/beta/log/${PIN}?beta=${encodeURIComponent(KEY)}`, { method:'DELETE' });
  load();
}

function viewRange() {
  const hz = parseInt(document.getElementById('hz').textContent) || 50;
  if (document.getElementById('tail').checked) {
    const start = Math.max(0, A.ax.length - hz*60);
    return [start, A.ax.length];
  }
  return [0, A.ax.length];
}

function draw() {
  drawCanvas('cg', ['gx','gy','gz'], true);
  drawCanvas('ca', ['ax','ay','az'], false);
}

function drawCanvas(id, keys, showMarks) {
  const cv = document.getElementById(id);
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);
  const [s,e] = viewRange();
  const n = e - s;
  if (n < 2) return;

  // symmetrisch schalen rond 0
  let max = 1;
  for (const k of keys) for (let i=s;i<e;i++){ const v=Math.abs(A[k][i]||0); if(v>max)max=v; }
  const mid = H/2, amp = (H/2 - 8);
  const x = i => ((i-s)/(n-1))*W;
  const y = v => mid - (v/max)*amp;

  // nullijn
  ctx.strokeStyle='#2a3038'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,mid); ctx.lineTo(W,mid); ctx.stroke();

  // slag-markers
  if (showMarks) {
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=1;
    for (const m of A.sw) { if (m>=s && m<e) { ctx.beginPath(); ctx.moveTo(x(m),0); ctx.lineTo(x(m),H); ctx.stroke(); } }
  }

  const colors = {gx:'#c4ff00',gy:'#4aa8ff',gz:'#ff6b54',ax:'#c4ff00',ay:'#4aa8ff',az:'#ff6b54'};
  for (const k of keys) {
    ctx.strokeStyle=colors[k]; ctx.lineWidth=1.3; ctx.beginPath();
    for (let i=s;i<e;i++){ const xx=x(i), yy=y(A[k][i]||0); if(i===s)ctx.moveTo(xx,yy); else ctx.lineTo(xx,yy); }
    ctx.stroke();
  }
}

load();
setInterval(() => { if (document.getElementById('auto').checked) load(); }, 5000);
</script>
</body>
</html>
